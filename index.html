                                    <input type="text" readOnly value={joinUrl} className="flex-1 bg-gray-100 border-none rounded-xl text-sm md:text-base p-3 md:p-4 outline-none text-gray-600" />
                                    <button onClick={copyLink} className="p-3 md:p-4 bg-blue-100 text-blue-600 rounded-xl hover:bg-blue-200 transition"><Copy className="text-xl" /></button>
                                </div>
                            </div>
                            {isHost && (
                                <button onClick={startGame} disabled={isStarting} className="w-full py-5 md:py-6 bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white text-xl md:text-2xl font-extrabold rounded-3xl shadow-2xl transform hover:-translate-y-1 transition flex items-center justify-center animate-pulse disabled:opacity-50 disabled:transform-none">
                                    {isStarting ? <Clock className="animate-spin mr-3 text-2xl" /> : <Play className="mr-3 text-2xl" />} {isStarting ? '載入中...' : '所有人準備好即可開始'}
                                </button>
                            )}
                        </div>

                        <div className="md:col-span-7 lg:col-span-8 bg-white/10 backdrop-blur-md rounded-3xl p-6 md:p-10 border border-white/20 flex flex-col min-h-[50vh]">
                            {isHost && !isPlayer && (
                                <div className="bg-black/20 rounded-3xl p-6 md:p-8 mb-6 md:mb-8 border border-white/10 animate-fade-in-up text-white">
                                    <h3 className="text-xl md:text-2xl font-black text-yellow-400 mb-2">您要一起參與答題嗎？</h3>
                                    <p className="text-white/80 mb-5 text-sm md:text-base font-medium">身為主持人，您目前僅負責控制遊戲流程。若想親自下場比賽，請輸入暱稱加入：</p>
                                    <div className="flex flex-col sm:flex-row gap-3">
                                        <input type="text" maxLength="12" className="flex-1 px-5 py-3 md:py-4 rounded-xl md:rounded-2xl text-gray-800 text-lg font-bold outline-none focus:ring-4 focus:ring-blue-400 transition shadow-inner bg-white" placeholder="輸入您的專屬暱稱..." value={hostNickname} onChange={e => setHostNickname(e.target.value)} />
                                        <button onClick={handleHostJoin} disabled={!hostNickname.trim() || isJoiningHost} className="px-6 py-3 md:py-4 bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white font-bold text-lg rounded-xl md:rounded-2xl shadow-lg transition disabled:opacity-50 flex items-center justify-center whitespace-nowrap">{isJoiningHost ? <Clock className="animate-spin mr-2 text-xl" /> : <Plus className="mr-2 text-xl" />} 成為參賽者</button>
                                    </div>
                                </div>
                            )}

                            <div className="flex items-center justify-between mb-6 md:mb-8 text-white">
                                <h2 className="text-2xl md:text-3xl font-bold text-white flex items-center"><Users className="mr-3 md:mr-4 text-blue-400 text-3xl md:text-4xl" /> 已加入玩家</h2>
                                <span className="px-5 py-2 bg-white/20 rounded-full text-white font-bold text-lg md:text-xl">{playersArray.length} 人</span>
                            </div>

                            {playersArray.length === 0 ? (
                                <div className="flex-1 flex items-center justify-center text-white/50 italic text-xl md:text-2xl">等待玩家加入中...</div>
                            ) : (
                                <div className="flex-1 overflow-y-auto pr-2 custom-scrollbar">
                                    {gameState.mode === 'team' ? (
                                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 md:gap-8">
                                            {Array.from({ length: gameState.teamCount }).map((_, i) => {
                                                const teamName = `隊伍${i + 1}`;
                                                const teamMembers = playersArray.filter(p => p.team === teamName);
                                                return (
                                                    <div key={teamName} className={`bg-white/10 backdrop-blur-md rounded-3xl shadow-lg p-5 md:p-6 border-t-4 transition-all duration-200 ${dragOverTeam === teamName ? 'border-yellow-400 bg-white/20 scale-[1.02]' : 'border-blue-400'}`} onDragOver={(e) => isHost && handleDragOver(e, teamName)} onDragLeave={isHost ? handleDragLeave : undefined} onDrop={(e) => isHost && handleDrop(e, teamName)}>
                                                        <h3 className="font-bold text-xl md:text-2xl text-white mb-4 md:mb-5">{teamName} ({teamMembers.length} 人)</h3>
                                                        <div className="space-y-3 min-h-[80px]">
                                                            {teamMembers.map(p => {
                                                                const isMe = p.uid === user.uid;
                                                                return (
                                                                    <div key={p.uid} draggable={isHost} onDragStart={(e) => isHost && handleDragStart(e, p.uid)} className={`flex items-center justify-between bg-black/20 px-4 py-3 md:py-4 rounded-xl transition-colors ${isMe ? 'border border-blue-400 shadow-[0_0_10px_rgba(59,130,246,0.3)]' : ''} ${isHost ? 'cursor-grab active:cursor-grabbing hover:bg-black/40' : ''}`}>
                                                                        <div className="flex-1 flex items-center overflow-hidden pr-2 text-white">
                                                                            {isHost && <GripVertical className="text-gray-400 mr-2 flex-shrink-0 text-lg" />}
                                                                            {isMe && editingNickname ? (
                                                                                <input type="text" autoFocus className="w-full bg-transparent border-b-2 border-white/50 focus:border-white outline-none font-bold text-lg md:text-xl text-white placeholder-white/50" value={newNickname} onChange={e => setNewNickname(e.target.value)} onBlur={saveNickname} onKeyDown={e => e.key === 'Enter' && saveNickname()} maxLength="12" />
                                                                            ) : (
                                                                                <span className={`text-lg md:text-xl text-white font-bold truncate ${isMe ? 'cursor-pointer hover:text-blue-200 flex items-center gap-2' : ''}`} onClick={() => { if (isMe) { setNewNickname(p.nickname); setEditingNickname(true); } }}>{p.nickname} {isMe && <Edit className="opacity-50 flex-shrink-0 text-base" />}</span>
                                                                            )}
                                                                        </div>
                                                                        {isHost && (
                                                                            <select value={p.team || teamName} onChange={(e) => changePlayerTeam(p.uid, e.target.value)} className="text-sm md:text-base font-bold bg-white/90 text-gray-800 rounded-lg px-2 py-1 md:py-2 outline-none flex-shrink-0 cursor-pointer shadow-sm">
                                                                                {Array.from({ length: gameState.teamCount }).map((_, j) => <option key={j} value={`隊伍${j + 1}`}>移至隊伍{j + 1}</option>)}
                                                                            </select>
                                                                        )}
                                                                    </div>
                                                                )
                                                            })}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    ) : (
                                        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6">
                                            {playersArray.map((p) => {
                                                const isMe = p.uid === user.uid;
                                                return (
                                                    <div key={p.uid} className="bg-white/20 text-white py-4 md:py-5 px-4 rounded-2xl font-bold text-lg md:text-xl text-center truncate shadow-sm border border-white/10 animate-fade-in-up relative group">
                                                        {isMe && editingNickname ? (
                                                            <input type="text" autoFocus className="w-full bg-transparent border-b-2 border-white/50 focus:border-white text-center outline-none font-bold placeholder-white/50" value={newNickname} onChange={e => setNewNickname(e.target.value)} onBlur={saveNickname} onKeyDown={e => e.key === 'Enter' && saveNickname()} maxLength="12" />
                                                        ) : (
                                                            <span className={isMe ? "cursor-pointer hover:text-blue-200 transition flex items-center justify-center gap-2 w-full" : "w-full flex items-center justify-center"} onClick={() => { if (isMe) { setNewNickname(p.nickname); setEditingNickname(true); } }}>
                                                                <span className="truncate">{p.nickname}</span>
                                                                {isMe && <Edit className="opacity-50 group-hover:opacity-100 flex-shrink-0 text-base" />}
                                                            </span>
                                                        )}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function StartingCountdown({ gameState }) {
            const [count, setCount] = useState(3);
            const [timeOffset, setTimeOffset] = useState(0);

            useEffect(() => {
                if (gameState.countdownDeadline) {
                    const expectedRemaining = 3000;
                    const actualRemaining = gameState.countdownDeadline - Date.now();
                    const offset = expectedRemaining - actualRemaining;
                    if (Math.abs(offset) > 1000) setTimeOffset(offset);
                }
            }, []);

            useEffect(() => {
                const timer = setInterval(() => {
                    const remaining = Math.max(0, Math.ceil((gameState.countdownDeadline + timeOffset - Date.now()) / 1000));
                    setCount(prev => prev !== remaining ? remaining : prev);
                }, 250);
                return () => clearInterval(timer);
            }, [gameState.countdownDeadline, timeOffset]);

            return (
                <div className="min-h-screen bg-gray-900 flex flex-col items-center justify-center p-4">
                    <div className="text-center text-white animate-fade-in-up">
                        <h2 className="text-3xl md:text-5xl text-blue-400 font-bold mb-8 md:mb-12 uppercase tracking-widest drop-shadow-md">遊戲即將開始</h2>
                        <div className="w-64 h-64 md:w-80 md:h-80 mx-auto rounded-full border-[16px] border-blue-500 flex items-center justify-center text-8xl md:text-[150px] font-black animate-pulse shadow-[0_0_60px_rgba(59,130,246,0.8)] text-white bg-blue-600/20">
                            {count > 0 ? count : 'GO!'}
                        </div>
                    </div>
                </div>
            );
        }

        const optionColors = [
            { base: 'bg-blue-50 border-blue-200 text-blue-700 hover:bg-blue-100 hover:border-blue-300', selected: 'border-blue-500 bg-blue-100 text-blue-900 shadow-lg shadow-blue-200 transform scale-[1.02]' },
            { base: 'bg-amber-50 border-amber-200 text-amber-700 hover:bg-amber-100 hover:border-amber-300', selected: 'border-amber-500 bg-amber-100 text-amber-900 shadow-lg shadow-amber-200 transform scale-[1.02]' },
            { base: 'bg-violet-50 border-violet-200 text-violet-700 hover:bg-violet-100 hover:border-violet-300', selected: 'border-violet-500 bg-violet-100 text-violet-900 shadow-lg shadow-violet-200 transform scale-[1.02]' },
            { base: 'bg-cyan-50 border-cyan-200 text-cyan-700 hover:bg-cyan-100 hover:border-cyan-300', selected: 'border-cyan-500 bg-cyan-100 text-cyan-900 shadow-lg shadow-cyan-200 transform scale-[1.02]' },
            { base: 'bg-fuchsia-50 border-fuchsia-200 text-fuchsia-700 hover:bg-fuchsia-100 hover:border-fuchsia-300', selected: 'border-fuchsia-500 bg-fuchsia-100 text-fuchsia-900 shadow-lg shadow-fuchsia-200 transform scale-[1.02]' },
            { base: 'bg-orange-50 border-orange-200 text-orange-700 hover:bg-orange-100 hover:border-orange-300', selected: 'border-orange-500 bg-orange-100 text-orange-900 shadow-lg shadow-orange-200 transform scale-[1.02]' }
        ];

        function QuestionPreview({ gameState }) {
            const qIndex = gameState.currentQIndex;
            const currentQ = gameState.questions?.[qIndex] || {};
            const [timeLeft, setTimeLeft] = useState(5);
            const [timeOffset, setTimeOffset] = useState(0);

            useEffect(() => {
                if (gameState.previewDeadline) {
                    const expectedRemaining = 5000;
                    const actualRemaining = gameState.previewDeadline - Date.now();
                    const offset = expectedRemaining - actualRemaining;
                    if (Math.abs(offset) > 1000) setTimeOffset(offset);
                }
            }, []);

            useEffect(() => {
                const timer = setInterval(() => {
                    const remaining = Math.max(0, Math.ceil((gameState.previewDeadline + timeOffset - Date.now()) / 1000));
                    setTimeLeft(prev => prev !== remaining ? remaining : prev);
                }, 250);
                return () => clearInterval(timer);
            }, [gameState.previewDeadline, timeOffset]);

            if (!currentQ) return null;

            return (
                <div className="min-h-screen bg-gray-900 flex flex-col items-center justify-center p-4 md:p-8 relative">
                    <div className="text-center text-white mb-8 animate-fade-in-up w-full max-w-4xl">
                        <h2 className="text-3xl md:text-4xl text-blue-400 font-bold mb-4 uppercase tracking-widest">是時候大展身手了！</h2>
                        <h1 className="text-6xl md:text-7xl font-black mb-8 md:mb-12">第 {qIndex + 1} 題</h1>
                        <div className="bg-white rounded-[2rem] p-10 md:p-16 shadow-2xl w-full border-4 border-blue-500 transform transition-all duration-500 hover:scale-[1.02]">
                            <h2 className="text-4xl md:text-5xl lg:text-6xl font-black text-gray-800 leading-tight"><FormattedText text={currentQ.text} /></h2>
                            {currentQ.imageBase64 && (
                                <div className="mt-10 flex justify-center bg-gray-50 rounded-3xl p-6 border border-gray-100">
                                    <img src={currentQ.imageBase64} alt="題目圖片" className="max-h-72 md:max-h-96 object-contain rounded-2xl shadow-sm" />
                                </div>
                            )}
                        </div>
                        <div className="mt-16 flex justify-center items-center">
                            <div className="w-32 h-32 md:w-40 md:h-40 rounded-full border-8 md:border-[12px] border-blue-500 flex items-center justify-center text-6xl md:text-7xl font-black animate-pulse shadow-[0_0_30px_rgba(59,130,246,0.6)] text-blue-400 bg-gray-800">
                                {timeLeft}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function Gameplay({ user, gameState, gameId }) {
            const qIndex = gameState.currentQIndex;
            const currentQ = gameState.questions?.[qIndex] || {};
            const totalQ = gameState.questions?.length || 0;
            const isHost = user?.uid === gameState.hostId;
            const isPlayer = Boolean(gameState.players?.[user?.uid]);
            
            const totalPlayers = Object.keys(gameState.players || {}).length;
            const answeredCount = Object.keys(gameState.answers?.[qIndex] || {}).length;
            
            const initialTimeLimit = parseInt(currentQ.timeLimit || 20, 10);
            const [timeLeft, setTimeLeft] = useState(initialTimeLimit);
            const [timeOffset, setTimeOffset] = useState(0);
            
            const [selectedOptions, setSelectedOptions] = useState([]);
            const [textAnswer, setTextAnswer] = useState('');
            const [hasSubmitted, setHasSubmitted] = useState(false);
            const [isEnding, setIsEnding] = useState(false);

            const [showMathPanel, setShowMathPanel] = useState(false);
            const [fractionNum, setFractionNum] = useState('');
            const [fractionDen, setFractionDen] = useState('');
            const mathSymbols = ['²', '³', 'ⁿ', '√', '∛', 'π', 'θ', 'α', 'β', '±', '×', '÷', '≈', '≠', '≤', '≥', '∞', '°', '△', '∑'];

            useEffect(() => { setIsEnding(false); }, [qIndex]);

            // 計算本地與主機的時鐘誤差，徹底解決倒數跳 0 的問題
            useEffect(() => {
                if (gameState.deadline) {
                    const expectedRemainingMs = initialTimeLimit * 1000;
                    const actualRemainingMs = gameState.deadline - Date.now();
                    const offset = expectedRemainingMs - actualRemainingMs;
                    // 若時鐘誤差超過 1.5 秒，則啟用補償
                    if (Math.abs(offset) > 1500) setTimeOffset(offset);
                }
            }, [qIndex]); 

            const selectedOptionsRef = useRef(selectedOptions);
            const textAnswerRef = useRef(textAnswer);

            useEffect(() => {
                selectedOptionsRef.current = selectedOptions;
                textAnswerRef.current = textAnswer;
            }, [selectedOptions, textAnswer]);

            useEffect(() => {
                if (!gameState.questions?.[qIndex]) return;
                const ans = gameState.answers?.[qIndex]?.[user.uid];
                if (ans) {
                    setHasSubmitted(true);
                    setSelectedOptions(ans.options || []);
                    setTextAnswer(ans.textAnswer || '');
                } else {
                    setHasSubmitted(false);
                    setSelectedOptions([]);
                    setTextAnswer('');
                }
            }, [qIndex, gameState.answers, gameState.questions, user.uid]);

            useEffect(() => {
                if (!gameState.questions?.[qIndex]) return;
                const timer = setInterval(() => {
                    // 套用時鐘誤差補償
                    const remaining = Math.max(0, Math.ceil((gameState.deadline + timeOffset - Date.now()) / 1000));
                    setTimeLeft(prev => {
                        if (prev !== remaining) return remaining;
                        return prev;
                    });
                    
                    // 當時間到且尚未提交時，自動提交答案
                    if (remaining <= 0 && !hasSubmitted) {
                        submitAnswer(selectedOptionsRef.current, textAnswerRef.current, 0);
                    }
                }, 250);
                return () => clearInterval(timer);
            }, [gameState.deadline, timeOffset, hasSubmitted, qIndex, gameState.questions]); 

            if (!currentQ.type) {
                return <div className="min-h-screen flex items-center justify-center bg-gray-900 text-white font-bold text-xl md:text-2xl"><Clock className="animate-spin mr-3" /> 載入題目資料中...</div>;
            }

            const toggleOption = (optId) => {
                if (hasSubmitted) return;
                if (currentQ.type === 'single') setSelectedOptions([optId]);
                else setSelectedOptions(prev => prev.includes(optId) ? prev.filter(id => id !== optId) : [...prev, optId]);
            };

            const submitAnswer = async (optionsToSubmit = selectedOptions, textToSubmit = textAnswer, forceTime) => {
                if (hasSubmitted) return;
                setHasSubmitted(true);
                
                const finalTimeLeft = forceTime !== undefined ? forceTime : timeLeft;
                const respTime = initialTimeLimit - finalTimeLeft;

                await getGameRef(gameId).update({
                    [`answers.${qIndex}.${user.uid}`]: { 
                        options: optionsToSubmit, 
                        textAnswer: textToSubmit.trim(), 
                        timestamp: Date.now(),
                        timeRemaining: finalTimeLeft,
                        responseTime: respTime
                    }
                });
            };

            const progressPct = (timeLeft / initialTimeLimit) * 100;
            const isTimeLow = timeLeft <= 5;

            return (
                <div className="min-h-screen bg-gray-900 flex flex-col items-center justify-center p-4 md:p-8 relative">
                    {/* --- 主持人專屬：左上角略過等待按鈕 --- */}
                    {isHost && (
                        <button 
                            onClick={async () => { 
                                if (isEnding) return; 
                                setIsEnding(true); 
                                await getGameRef(gameId).update({ deadline: Date.now() - 1000 }); 
                            }} 
                            disabled={isEnding} 
                            className="absolute top-4 left-4 md:top-8 md:left-8 px-5 py-3 bg-red-500/90 hover:bg-red-600 text-white rounded-2xl font-bold transition shadow-xl z-[150] flex items-center border border-red-400 backdrop-blur-md"
                            title="跳過等待，直接結算成績"
                        >
                            <ArrowRight className="mr-2 text-xl" /> 略過等待
                        </button>
                    )}

                    <div className="w-full max-w-4xl">
                        <div className="flex justify-between items-center mb-6 md:mb-8 text-white">
                            <div className="bg-white/10 px-5 py-2.5 rounded-full font-bold text-base md:text-lg tracking-widest uppercase ml-auto md:ml-0">題目 {qIndex + 1} / {totalQ}</div>
                            {isPlayer && (
                                <div className="bg-white/10 px-5 py-2.5 rounded-full font-bold text-base md:text-lg">
                                    你的分數: {gameState.players[user.uid]?.score || 0}
                                    {gameState.mode === 'team' && <span className="ml-3 bg-blue-500 px-3 py-1 rounded-md text-sm md:text-base">{gameState.players[user.uid]?.team}</span>}
                                </div>
                            )}
                        </div>

                        <div className="bg-white/10 h-4 w-full rounded-full mb-8 md:mb-10 overflow-hidden shadow-inner">
                            <div className={`h-full transition-all duration-500 ease-linear ${isTimeLow ? 'bg-red-500' : 'bg-green-400'}`} style={{ width: `${progressPct}%` }} />
                        </div>

                        <div className="bg-white rounded-3xl shadow-2xl p-6 md:p-12 mb-8 text-gray-800">
                            <div className="flex justify-between items-start mb-8">
                                <h2 className="text-3xl md:text-4xl lg:text-5xl font-black text-gray-800 leading-tight md:pr-6"><FormattedText text={currentQ.text} /></h2>
                                {/* --- 雙擊增加時間 --- */}
                                <div 
                                    onDoubleClick={() => {
                                        if (isHost) {
                                            const extra = window.prompt("請輸入要增加的秒數 (例如 10)：", "10");
                                            const extraSecs = parseInt(extra, 10);
                                            if (!isNaN(extraSecs) && extraSecs > 0) {
                                                getGameRef(gameId).update({ deadline: gameState.deadline + (extraSecs * 1000) });
                                            }
                                        }
                                    }}
                                    className={`flex items-center justify-center w-20 h-20 md:w-24 md:h-24 rounded-full border-[6px] md:border-8 font-extrabold text-3xl md:text-4xl flex-shrink-0 ml-4 shadow-md select-none transition-all ${isTimeLow ? 'border-red-500 text-red-500 animate-pulse' : 'border-blue-500 text-blue-600'} ${isHost ? 'cursor-pointer hover:ring-8 hover:ring-blue-200' : ''}`}
                                    title={isHost ? "雙擊以增加時間" : ""}
                                >
                                    {timeLeft}
                                </div>
                            </div>
                            {currentQ.imageBase64 && (<div className="mb-8 flex justify-center bg-gray-50 rounded-3xl p-4 md:p-6 border border-gray-100"><img src={currentQ.imageBase64} alt="題目圖片" className="max-h-64 md:max-h-80 object-contain rounded-2xl shadow-sm" /></div>)}
                            <div className="text-base md:text-lg font-bold text-gray-400 mb-5 uppercase tracking-widest">
                                {isPlayer ? (currentQ.type === 'single' ? '請選擇 1 個答案' : currentQ.type === 'multiple' ? '請選擇所有正確答案 (多選)' : '請在下方輸入你的答案') : '玩家作答中...'}
                            </div>

                            {isPlayer ? (
                                currentQ.type === 'fill' ? (
                                    <div className="mt-6 relative">
                                        <div className="flex gap-3">
                                            <input type="text" value={textAnswer} onChange={e => setTextAnswer(e.target.value)} disabled={hasSubmitted} placeholder="請輸入答案..." className={`flex-1 p-6 text-3xl md:text-4xl font-black rounded-3xl border-[6px] outline-none transition-all duration-200 bg-white ${hasSubmitted ? 'border-gray-200 text-gray-500 cursor-not-allowed' : 'border-blue-200 focus:border-blue-500 text-gray-800 shadow-inner'}`} autoFocus />
                                            
                                            {!hasSubmitted && (
                                                <button type="button" onClick={() => setShowMathPanel(!showMathPanel)} className={`px-6 md:px-8 rounded-3xl border-[6px] font-serif font-black text-2xl md:text-3xl transition-all duration-200 flex items-center justify-center flex-shrink-0 ${showMathPanel ? 'bg-blue-100 text-blue-600 border-blue-400 shadow-inner' : 'bg-gray-50 text-gray-500 border-gray-200 hover:bg-blue-50 hover:text-blue-500 hover:border-blue-300'}`} title="插入數學符號">
                                                    √x
                                                </button>
                                            )}
                                        </div>

                                        {textAnswer.includes('/') && (
                                            <div className="mt-4 p-4 bg-blue-50 border-2 border-blue-200 rounded-2xl flex items-center justify-center text-3xl md:text-4xl font-black text-blue-800 shadow-inner">
                                                預覽: <span className="ml-4"><FormattedText text={textAnswer} /></span>
                                            </div>
                                        )}

                                        {showMathPanel && !hasSubmitted && (
                                            <div className="absolute top-full mt-4 right-0 bg-white p-5 md:p-6 rounded-3xl shadow-[0_15px_50px_rgba(0,0,0,0.25)] border-4 border-blue-100 z-[100] w-full md:w-auto animate-fade-in-up">
                                                <div className="flex justify-between items-center mb-4 pb-3 border-b-2 border-gray-100">
                                                    <span className="text-base font-bold text-gray-500 uppercase tracking-widest">數學符號面板</span>
                                                    <button onClick={() => setShowMathPanel(false)} className="text-gray-400 hover:text-red-500 bg-gray-100 p-2 rounded-full transition"><X className="text-base" /></button>
                                                </div>
                                                <div className="grid grid-cols-6 md:grid-cols-8 gap-2 md:gap-3">
                                                    {mathSymbols.map(sym => (
                                                        <button key={sym} type="button" onClick={() => setTextAnswer(prev => prev + sym)} className="aspect-square w-12 md:w-14 flex items-center justify-center hover:bg-blue-500 hover:text-white rounded-2xl text-gray-800 font-black text-2xl md:text-3xl transition-colors bg-gray-50 border-2 border-gray-100 hover:border-blue-500 shadow-sm">
                                                            {sym}
                                                        </button>
                                                    ))}
                                                </div>
                                                {/* --- 玩家端分數輸入框 --- */}
                                                <div className="col-span-full flex gap-2 items-center bg-gray-50 p-2 rounded-xl mt-3 border border-gray-200">
                                                    <span className="text-sm font-bold text-gray-500 pl-1 whitespace-nowrap">分數</span>
                                                    <input type="number" className="w-14 text-center rounded border border-gray-300 py-1 outline-none focus:border-blue-500 text-lg font-bold" placeholder="分子" value={fractionNum} onChange={e=>setFractionNum(e.target.value)} />
                                                    <span className="font-bold text-gray-400 text-xl">/</span>
                                                    <input type="number" className="w-14 text-center rounded border border-gray-300 py-1 outline-none focus:border-blue-500 text-lg font-bold" placeholder="分母" value={fractionDen} onChange={e=>setFractionDen(e.target.value)} />
                                                    <button type="button" onClick={() => {
                                                        if(fractionNum && fractionDen) {
                                                            setTextAnswer(prev => prev + `${fractionNum}/${fractionDen}`);
                                                            setFractionNum(''); setFractionDen('');
                                                        }
                                                    }} className="ml-auto px-4 py-2 bg-blue-500 text-white rounded font-bold text-base hover:bg-blue-600 transition">插入</button>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                ) : (
                                    <div className="grid sm:grid-cols-2 gap-4 md:gap-6">
                                        {(currentQ.options || []).map((opt, index) => {
                                            const isSelected = selectedOptions.includes(opt.id);
                                            const theme = optionColors[index % optionColors.length];
                                            return (
                                                <button key={opt.id} onClick={() => toggleOption(opt.id)} disabled={hasSubmitted} className={`relative p-6 md:p-8 text-left text-xl md:text-2xl font-bold rounded-3xl border-4 transition-all duration-200 flex flex-col justify-center items-center gap-4 ${isSelected ? theme.selected : theme.base} ${hasSubmitted && !isSelected ? 'opacity-40 grayscale-[50%] cursor-not-allowed' : 'hover:scale-[1.01]'}`}>
                                                    <span className="absolute top-4 left-5 md:top-5 md:left-6 text-2xl md:text-3xl font-black opacity-30">{String.fromCharCode(65 + index)}</span>
                                                    {opt.imageBase64 && <img src={opt.imageBase64} alt="選項圖片" className="max-h-36 md:max-h-48 object-contain rounded-xl shadow-md w-full" />}
                                                    {opt.text && <span className="w-full text-center leading-relaxed"><FormattedText text={opt.text} /></span>}
                                                </button>
                                            );
                                        })}
                                    </div>
                                )
                            ) : (
                                currentQ.type === 'fill' ? (
                                    <div className="p-8 bg-gray-50 border-4 border-gray-200 rounded-3xl text-center">
                                        <Clock className="animate-spin mx-auto text-gray-400 mb-4 text-5xl" />
                                        <p className="text-gray-500 font-bold text-xl md:text-2xl">本題為填空題，等待玩家作答中</p>
                                    </div>
                                ) : (
                                    <div className="grid sm:grid-cols-2 gap-4 md:gap-6">
                                        {(currentQ.options || []).map((opt, index) => {
                                            const theme = optionColors[index % optionColors.length];
                                            return (
                                                <div key={opt.id} className={`relative p-6 md:p-8 text-left text-xl md:text-2xl font-bold rounded-3xl border-4 ${theme.base} opacity-90`}>
                                                    <span className="absolute top-4 left-5 md:top-5 md:left-6 text-2xl md:text-3xl font-black opacity-30">{String.fromCharCode(65 + index)}</span>

        function Result({ user, gameState, gameId }) {
            const [isTransitioning, setIsTransitioning] = useState(false);
            const qIndex = gameState.currentQIndex;
            const currentQ = gameState.questions?.[qIndex] || {}; 
            const answers = gameState.answers?.[qIndex] || {};

            const isPlayer = Boolean(gameState.players?.[user?.uid]);

            const resultStats = useMemo(() => {
                let isCorrect = false;
                let optionStats = [];
                let textStats = [];

                if (currentQ.type === 'fill') {
                    const validAnswers = (currentQ.fillAnswers || (currentQ.fillAnswer ? [currentQ.fillAnswer] : []))
                        .map(a => currentQ.caseSensitive ? a.trim() : a.trim().toLowerCase())
                        .filter(a => a !== '');
                    const userText = currentQ.caseSensitive ? (answers[user?.uid]?.textAnswer || '').trim() : (answers[user?.uid]?.textAnswer || '').trim().toLowerCase();
                    isCorrect = validAnswers.includes(userText) && userText !== '';

                    const counts = {};
                    Object.values(answers).forEach(ans => {
                        const t = (ans.textAnswer || '(未作答)').trim();
                        counts[t] = (counts[t] || 0) + 1;
                    });
                    textStats = Object.entries(counts)
                        .map(([text, count]) => ({ text, count, percentage: totalPlayers ? Math.round((count / totalPlayers) * 100) : 0 }))
                        .sort((a, b) => b.count - a.count);
                } else if (currentQ.type) {
                    const correctOptionIds = (currentQ.options || []).filter(o => o.isCorrect).map(o => o.id);
                    const myAnswer = answers[user?.uid]?.options || [];
                    isCorrect = JSON.stringify([...myAnswer].sort()) === JSON.stringify([...correctOptionIds].sort());

                    optionStats = (currentQ.options || []).map(opt => {
                        let count = 0;
                        Object.values(answers).forEach(ans => { if ((ans.options || []).includes(opt.id)) count++; });
                        return { ...opt, count, percentage: totalPlayers ? Math.round((count / totalPlayers) * 100) : 0 };
                    });
                }
                return { isCorrect, optionStats, textStats, myAnswer: answers[user?.uid]?.options || [] };
            }, [currentQ, JSON.stringify(answers || {}), user?.uid, totalPlayers]);

            const nextAction = async () => {
                if (isTransitioning) return; setIsTransitioning(true);

                                                            <div className="flex items-center gap-4 font-bold text-lg md:text-xl flex-1 pr-4"><span className="text-gray-400 font-black text-2xl">{String.fromCharCode(65 + index)}.</span>{opt.isCorrect ? <CheckCircle2 className="text-green-500 text-2xl flex-shrink-0" /> : <div className="w-6 md:w-8 flex-shrink-0" />}<span className={`truncate ${opt.isCorrect ? 'text-green-800' : 'text-gray-700'}`}><FormattedText text={opt.text || '(純圖片選項)'} /></span>{isSelected && <span className="text-sm px-3 py-1.5 bg-blue-100 text-blue-800 rounded-full ml-3 flex-shrink-0">你的選擇</span>}</div>
                                                            <div className="font-black text-gray-600 flex items-center gap-2 text-lg md:text-xl flex-shrink-0"><Users className="text-gray-400 text-xl"/> {opt.count} 人 ({opt.percentage}%)</div>
                                                        </div>
                                                        {opt.imageBase64 && <div className="pl-[4.5rem] pt-2"><img src={opt.imageBase64} alt="選項圖片" className="max-h-32 md:max-h-40 object-contain rounded-xl border border-gray-200 bg-white shadow-sm" /></div>}

                                                </div>

                        ) : (
                            <div className="bg-white/10 backdrop-blur-md rounded-3xl p-10 shadow-xl mb-8 text-center text-white border border-white/20">
                                <Clock className="animate-spin mx-auto mb-6 text-blue-400 text-5xl" />
                                <h3 className="text-2xl md:text-3xl font-bold">等待主持人檢視作答結果...</h3>
                                <p className="text-white/60 mt-3 md:text-lg">請看大螢幕了解全場統計</p>

                        <div className="text-center mt-8">
                            {isHost ? (
                                <button onClick={nextAction} disabled={isTransitioning} className="w-full md:w-auto md:min-w-[300px] px-12 py-5 md:py-6 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white text-xl md:text-2xl font-black rounded-full shadow-2xl transform hover:-translate-y-1 transition disabled:opacity-50 disabled:transform-none">{isTransitioning ? <span className="flex items-center justify-center"><Clock className="animate-spin mr-3 text-2xl" /> 載入中...</span> : qIndex < (gameState.questions?.length || 0) - 1 ? <span className="flex items-center justify-center">查看目前排名 <Trophy className="ml-3 text-2xl" /></span> : <span className="flex items-center justify-center">查看最終排行榜 <Trophy className="ml-3 text-2xl" /></span>}</button>
                            ) : (
                                <div className="text-white/60 font-bold text-lg md:text-xl flex items-center justify-center">等待主持人進入下一階段...</div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function InterimLeaderboard({ user, gameState, gameId }) {
            const [isTransitioning, setIsTransitioning] = useState(false);
            const isHost = user?.uid === gameState.hostId;
            const qIndex = gameState.currentQIndex;
            
            const playersStr = JSON.stringify(gameState.players || {});
            const players = useMemo(() => Object.values(gameState.players || {}).sort((a, b) => (b.score || 0) - (a.score || 0)), [playersStr]);

            const myRank = players.findIndex(p => p.uid === user?.uid) + 1;
            const myPlayer = players.find(p => p.uid === user?.uid);

            const nextQuestion = async () => {
                if (isTransitioning) return; setIsTransitioning(true);
                const nextQ = gameState.questions?.[qIndex + 1];
                if (!nextQ) { await getGameRef(gameId).update({ status: 'finished' }); return; }
                
                await getGameRef(gameId).update({ 
                    status: 'preview', 
                    currentQIndex: qIndex + 1, 
                    previewDeadline: Date.now() + 5000 
                });
            };

            useEffect(() => {
                if (!isHost) return;
                const handleKeyDown = (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        nextQuestion();
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [isHost, isTransitioning, qIndex, gameId, gameState.questions]); 

            return (
                <div className="min-h-screen bg-gray-900 py-12 px-4 md:px-8 font-sans flex flex-col items-center overflow-hidden">
                    <div className="w-full max-w-4xl z-10">
                        <div className="text-center mb-10 interim-item" style={{ animationDelay: '0.1s' }}>
                            <h2 className="text-2xl md:text-3xl font-bold text-blue-400 mb-3 uppercase tracking-widest">第 {qIndex + 1} 題結束</h2>
                            <h1 className="text-5xl md:text-6xl font-black text-white mb-4 drop-shadow-md">目前分數排名</h1>
                        </div>

                        {isHost ? (
                            <React.Fragment>
                                {gameState.mode === 'team' && <TeamChart players={gameState.players} teamCount={gameState.teamCount} />}
                                <div className="bg-white/10 backdrop-blur-md rounded-[2rem] shadow-2xl p-6 md:p-10 mb-10 border border-white/20 interim-item" style={{ animationDelay: '0.3s' }}>
                                    <div className="space-y-5 max-h-[50vh] overflow-y-auto pr-4 custom-scrollbar">
                                        {players.map((p, index) => {
                                            let badgeColor = 'bg-white/20 text-white'; let border = 'border-white/10 bg-white/5';
                                            if (index === 0) { badgeColor = 'bg-yellow-400 text-yellow-900 shadow-[0_0_15px_rgba(250,204,21,0.5)]'; border = 'border-yellow-400/60 bg-yellow-400/20 shadow-lg'; }
                                            else if (index === 1) { badgeColor = 'bg-gray-300 text-gray-800 shadow-md'; border = 'border-gray-300/60 bg-gray-300/20 shadow-md'; }
                                            else if (index === 2) { badgeColor = 'bg-amber-600 text-amber-50 shadow-md'; border = 'border-amber-600/60 bg-amber-600/20 shadow-md'; }
                                            const isMe = p.uid === user?.uid;

                                            return (
                                                <div key={index} className={`flex items-center justify-between p-5 md:p-6 rounded-2xl border-2 ${border} transition-all interim-item ${isMe ? 'ring-4 ring-blue-400 shadow-[0_0_20px_rgba(96,165,250,0.6)]' : ''}`} style={{ animationDelay: `${0.5 + (index * 0.15)}s` }}>
                                                    <div className="flex items-center gap-5">
                                                        <div className={`w-12 h-12 md:w-16 md:h-16 rounded-full flex items-center justify-center font-black text-xl md:text-3xl ${badgeColor}`}>{index + 1}</div>
                                                        <span className={`text-2xl md:text-3xl font-bold flex items-center flex-wrap gap-3 ${isMe ? 'text-blue-300' : 'text-white'}`}>
                                                            {p.nickname} 
                                                            {gameState.mode === 'team' && <span className="text-sm md:text-base bg-blue-100 text-blue-900 px-3 py-1 rounded-full">{p.team}</span>} 
                                                            {isMe && <span className="text-sm md:text-base bg-blue-500 text-white px-3 py-1 rounded-full shadow">你</span>}
                                                        </span>
                                                    </div>
                                                    <div className="text-3xl md:text-4xl font-black text-white">{p.score || 0} <span className="text-lg md:text-xl font-medium text-white/60">分</span></div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </React.Fragment>
                        ) : (
                            <div className="bg-white/10 backdrop-blur-md rounded-[3rem] shadow-2xl p-10 md:p-16 mb-10 border border-white/20 interim-item text-center w-full max-w-2xl mx-auto" style={{ animationDelay: '0.3s' }}>
                                <h3 className="text-3xl md:text-4xl font-bold text-white mb-6">你的目前排名</h3>
                                <div className="text-7xl md:text-8xl font-black text-yellow-400 drop-shadow-[0_0_20px_rgba(250,204,21,0.4)] mb-8">第 {myRank} 名</div>
                                <div className="text-3xl md:text-4xl font-bold text-white/90">總分: {myPlayer?.score || 0} 分</div>
                                {gameState.mode === 'team' && <div className="mt-8 inline-block px-8 py-3 bg-blue-500/30 border-2 border-blue-400 rounded-full text-blue-100 font-bold text-2xl shadow-lg">{myPlayer?.team}</div>}
                            </div>
                        )}

                        <div className="text-center interim-item mt-10" style={{ animationDelay: `${0.8 + (players.length * 0.15)}s` }}>
                            {isHost ? (
                                <button onClick={nextQuestion} disabled={isTransitioning} className="w-full md:w-auto md:min-w-[350px] px-12 py-5 md:py-6 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white text-xl md:text-3xl font-black rounded-full shadow-2xl transform hover:-translate-y-1 transition disabled:opacity-50 disabled:transform-none flex items-center justify-center mx-auto tracking-widest">{isTransitioning ? <span className="flex items-center"><Clock className="animate-spin mr-3 text-2xl" /> 載入中...</span> : <span className="flex items-center">下一道題 <ArrowRight className="ml-3 text-2xl" /></span>}</button>
                            ) : (
                                <div className="text-white/60 font-bold text-lg md:text-2xl flex items-center justify-center">等待主持人開啟下一題...</div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const Confetti = React.memo(() => {
            const canvasRef = useRef(null);

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const setCanvasSize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
                setCanvasSize(); window.addEventListener('resize', setCanvasSize);

                const particles = [];
                const colors = ['#fce18a', '#ff726d', '#b48def', '#f4306d', '#3f88c5', '#03cea4'];
                for (let i = 0; i < 150; i++) particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height - canvas.height, r: Math.random() * 6 + 2, d: Math.random() * 150 + 10, color: colors[Math.floor(Math.random() * colors.length)], tilt: Math.floor(Math.random() * 10) - 10, tiltAngleIncrement: (Math.random() * 0.07) + 0.05, tiltAngle: 0 });

                let angle = 0; let animationFrameId; const startTime = Date.now();
                const render = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height); angle += 0.01; let stillVisible = false;
                    for (let i = 0; i < particles.length; i++) {
                        const p = particles[i]; p.tiltAngle += p.tiltAngleIncrement; p.y += (Math.cos(angle + p.d) + 1 + p.r / 2) / 2; p.x += Math.sin(angle); p.tilt = Math.sin(p.tiltAngle) * 15;
                        if (p.y <= canvas.height) { stillVisible = true; ctx.beginPath(); ctx.lineWidth = p.r; ctx.strokeStyle = p.color; ctx.moveTo(p.x + p.tilt + p.r, p.y); ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r); ctx.stroke(); }
                        if (p.y > canvas.height && Date.now() - startTime < 7000) { p.x = Math.random() * canvas.width; p.y = -20; p.tilt = Math.floor(Math.random() * 10) - 10; stillVisible = true; }
                    }
                    if (stillVisible) animationFrameId = requestAnimationFrame(render);
                };
                render();
                return () => { cancelAnimationFrame(animationFrameId); window.removeEventListener('resize', setCanvasSize); };
            }, []);

            return <canvas ref={canvasRef} className="fixed inset-0 pointer-events-none z-[100]" />;
        });

        function Leaderboard({ gameState, onBack, onReplay, user }) {
            const isHost = user?.uid === gameState.hostId;
            const playersStr = JSON.stringify(gameState.players || {});
            const players = useMemo(() => Object.values(gameState.players || {}).sort((a, b) => (b.score || 0) - (a.score || 0)), [playersStr]);

            const exportGameStats = () => {
                const { questions, answers, mode } = gameState;
                let csvContent = "\uFEFF"; 
                csvContent += "題目序號,題目內容,題目類型,作答人數,正確人數,正確率(%),最快答題(秒),最慢答題(秒),平均答題(秒),選項與答案統計分析\n";

                if (questions && Array.isArray(questions)) {
                    questions.forEach((q, qIndex) => {
                        const qAnswers = answers?.[qIndex] || {};
                        const answeredUids = Object.keys(qAnswers);
                        const answeredCount = answeredUids.length;

                        if (answeredCount === 0) {
                            csvContent += `${qIndex + 1},"${(q.text || '').replace(/"/g, '""')}",${q.type === 'single' ? '單選' : q.type === 'multiple' ? '多選' : '填空'},0,0,0,N/A,N/A,N/A,無人作答\n`;
                            return;
                        }

                        let correctCount = 0;
                        let times = [];
                        let optionCounts = {}; 
                        let textCounts = {}; 

                        if (q.type !== 'fill') {
                            (q.options || []).forEach((o, i) => {
                                optionCounts[o.id] = { text: o.text || `選項 ${String.fromCharCode(65+i)} (圖片)`, count: 0, isCorrect: o.isCorrect };
                            });
                        }

                        answeredUids.forEach(uid => {
                            const ans = qAnswers[uid];
                            if (ans.responseTime !== undefined) {
                                times.push(ans.responseTime);
                            } else if (ans.timeRemaining !== undefined) {
                                times.push(Math.max(0, (q.timeLimit || 20) - ans.timeRemaining));
                            }

                            if (q.type === 'fill') {
                                const validAnswers = (q.fillAnswers || (q.fillAnswer ? [q.fillAnswer] : [])).map(a => q.caseSensitive ? a.trim() : a.trim().toLowerCase()).filter(a => a !== '');
                                const userText = q.caseSensitive ? (ans.textAnswer || '').trim() : (ans.textAnswer || '').trim().toLowerCase();
                                if (validAnswers.includes(userText) && userText !== '') correctCount++;

                                const rawText = ans.textAnswer || '(未作答)';
                                textCounts[rawText] = (textCounts[rawText] || 0) + 1;
                            } else {
                                const correctOptionIds = (q.options || []).filter(o => o.isCorrect).map(o => o.id).sort();
                                const selected = [...(ans.options || [])].sort();
                                if (JSON.stringify(selected) === JSON.stringify(correctOptionIds)) correctCount++;

                                selected.forEach(optId => {
                                    if (optionCounts[optId]) optionCounts[optId].count++;
                                });
                            }
                        });

                        const correctRate = Math.round((correctCount / answeredCount) * 100);
                        let minTime = 'N/A', maxTime = 'N/A', avgTime = 'N/A';
                        if (times.length > 0) {
                            minTime = Math.min(...times).toFixed(1);
                            maxTime = Math.max(...times).toFixed(1);
                            avgTime = (times.reduce((a,b)=>a+b, 0) / times.length).toFixed(1);
                        }

                        let optionsAnalysis = "";
                        if (q.type === 'fill') {
                            const details = Object.entries(textCounts).map(([txt, c]) => `[${txt}]: ${c}人(${Math.round((c/answeredCount)*100)}%)`);
                            optionsAnalysis = details.join(' | ');
                        } else {
                            const details = Object.values(optionCounts).map(o => `[${o.text}${o.isCorrect?'(正確)':''}] ${o.count}人(${Math.round((o.count/answeredCount)*100)}%)`);
                            optionsAnalysis = details.join(' | ');
                        }

                        csvContent += `${qIndex + 1},"${(q.text || '').replace(/"/g, '""')}",${q.type === 'single' ? '單選' : q.type === 'multiple' ? '多選' : '填空'},${answeredCount},${correctCount},${correctRate},${minTime},${maxTime},${avgTime},"${optionsAnalysis.replace(/"/g, '""')}"\n`;
                    });
                }

                csvContent += "\n\n名次,玩家暱稱,所屬隊伍,總分\n";
                players.forEach((p, idx) => {
                    csvContent += `${idx + 1},"${(p.nickname || '').replace(/"/g, '""')}",${gameState.mode === 'team' ? (p.team || '無') : '-'},${p.score || 0}\n`;
                });

                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                const dateStr = new Date().toLocaleString('zh-TW', { hour12: false }).replace(/[\/:\s]/g, '');
                link.setAttribute('download', `遊戲數據分析_${dateStr}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            return (
                <div className="min-h-screen bg-gray-900 py-12 px-4 md:px-8 font-sans flex flex-col items-center overflow-x-hidden overflow-y-auto relative">
                    <Confetti />
                    <div className="w-full max-w-4xl z-10">
                        <div className="text-center mb-12 leaderboard-item" style={{ animationDelay: '0.1s' }}>
                            <Trophy className="mx-auto text-yellow-400 mb-6 drop-shadow-[0_0_20px_rgba(250,204,21,0.6)] text-7xl md:text-[5rem]" />
                            <h1 className="text-6xl md:text-7xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-yellow-600 mb-4 tracking-wider">遊戲結束</h1>
                            <p className="text-gray-400 text-xl md:text-2xl font-bold">感謝所有玩家的參與！</p>
                        </div>

                        {gameState.mode === 'team' && <TeamChart players={gameState.players} teamCount={gameState.teamCount} />}

                        <div className="bg-white/10 backdrop-blur-md rounded-[2rem] shadow-2xl p-6 md:p-12 mb-10 border border-white/20 leaderboard-item" style={{ animationDelay: '0.3s' }}>
                            <div className="space-y-5">
                                {players.map((p, index) => {
                                    let badgeColor = 'bg-white/20 text-white'; let border = 'border-white/10 bg-white/5';
                                    if (index === 0) { badgeColor = 'bg-yellow-400 text-yellow-900 shadow-[0_0_15px_rgba(250,204,21,0.5)]'; border = 'border-yellow-400/60 bg-yellow-400/20 shadow-lg'; }
                                    else if (index === 1) { badgeColor = 'bg-gray-300 text-gray-800 shadow-md'; border = 'border-gray-300/60 bg-gray-300/20 shadow-md'; }
                                    else if (index === 2) { badgeColor = 'bg-amber-600 text-amber-50 shadow-md'; border = 'border-amber-600/60 bg-amber-600/20 shadow-md'; }

                                    return (
                                        <div key={index} className={`flex items-center justify-between p-5 md:p-6 rounded-2xl border-2 ${border} transition-all hover:scale-[1.02] leaderboard-item`} style={{ animationDelay: `${0.6 + (index * 0.2)}s` }}>
                                            <div className="flex items-center gap-5">
                                                <div className={`w-12 h-12 md:w-16 md:h-16 rounded-full flex items-center justify-center font-black text-xl md:text-3xl ${badgeColor}`}>{index + 1}</div>
                                                <span className="text-2xl md:text-3xl font-bold text-white flex items-center flex-wrap gap-3">
                                                    {p.nickname} 
                                                    {gameState.mode === 'team' && <span className="text-sm md:text-base bg-blue-100 text-blue-900 px-3 py-1 rounded-full shadow">{p.team}</span>}
                                                </span>
                                            </div>
                                            <div className="text-3xl md:text-4xl font-black text-white">{p.score || 0} <span className="text-lg md:text-xl font-medium text-white/60">分</span></div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        <div className="text-center flex flex-col sm:flex-row items-center justify-center gap-4 md:gap-6 leaderboard-item pb-12" style={{ animationDelay: `${0.8 + (players.length * 0.2)}s` }}>
                            {isHost && (
                                <button onClick={exportGameStats} className="w-full sm:w-auto px-8 md:px-10 py-4 md:py-5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-2xl text-lg md:text-xl font-bold shadow-lg transform hover:-translate-y-1 transition flex items-center justify-center">
                                    <Download className="mr-3 text-2xl" /> 下載答題數據報表
                                </button>
                            )}
                            <button onClick={onReplay} className="w-full sm:w-auto px-8 md:px-10 py-4 md:py-5 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white rounded-2xl text-lg md:text-xl font-bold shadow-lg transform hover:-translate-y-1 transition">返回題庫並建立新遊戲</button>
                            <button onClick={onBack} className="w-full sm:w-auto px-8 md:px-10 py-4 md:py-5 bg-white/10 hover:bg-white/20 text-white rounded-2xl text-lg md:text-xl font-bold transition border border-white/20">返回首頁</button>
                        </div>
                    </div>
                </div>
            );
        }

        // --- 啟動 React 應用 ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
