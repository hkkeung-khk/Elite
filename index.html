<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多人連線問答遊戲</title>
    
    <!-- 引入 Tailwind CSS 框架 -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 FontAwesome 作為圖示庫 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 引入 React 與 ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- 引入 Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 引入 Firebase SDK (相容舊版 v8 寫法) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics-compat.js"></script>

    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }
        
        .animate-fade-in-up { animation: fadeInUp 0.6s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideRightFade { 0% { opacity: 0; transform: translateX(-40px) scale(0.95); } 100% { opacity: 1; transform: translateX(0) scale(1); } }
        .interim-item { opacity: 0; animation: slideRightFade 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUpFade { 0% { opacity: 0; transform: translateY(40px) scale(0.95); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
        .leaderboard-item { opacity: 0; animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="bg-gray-900 font-sans antialiased text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- Firebase 初始化設定 ---
        const firebaseConfig = {
            apiKey: "AIzaSyCXwi1vuQ7yyIrAgPxK9P4r9MneAJqXnqU",
            authDomain: "etlite-f7c2a.firebaseapp.com",
            databaseURL: "https://etlite-f7c2a-default-rtdb.firebaseio.com",
            projectId: "etlite-f7c2a",
            storageBucket: "etlite-f7c2a.firebasestorage.app",
            messagingSenderId: "400273321762",
            appId: "1:400273321762:web:e619520536fec308a17f7b",
            measurementId: "G-Q524BFZFB8"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
            if (firebaseConfig.measurementId) firebase.analytics();
        }
        
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'etlite-f7c2a';

        const getGameRef = (gameId) => db.doc(`artifacts/${appId}/public/data/games/${gameId}`);

        // --- 安全更新網址工具 (修復 SecurityError) ---
        const safeUpdateUrl = (gameId) => {
            try {
                if (window.location.protocol === 'blob:' || window.location.protocol === 'data:' || window.location.origin === 'null' || window.location.href.includes('usercontent.goog')) {
                    return; // 避免在特殊沙盒環境觸發 pushState 錯誤
                }
                const newUrl = gameId ? `?gameId=${gameId}` : window.location.pathname;
                window.history.replaceState(null, '', newUrl);
            } catch (e) {
                console.warn("環境不支援更新網址列，忽略操作。");
            }
        };

        // --- 數學排版引擎 (分數轉換) ---
        const FormattedText = ({ text }) => {
            if (typeof text !== 'string') return text;
            // 尋找例如 4/9 的分數格式
            const fractionRegex = /(\d+\/\d+)/g;
            const parts = text.split(fractionRegex);
            return (
                <React.Fragment>
                    {parts.map((part, index) => {
                        const match = part.match(/^(\d+)\/(\d+)$/);
                        if (match) {
                            return (
                                <span key={index} className="inline-flex flex-col items-center justify-center align-middle mx-1 font-bold" style={{ verticalAlign: 'middle', lineHeight: '1.1' }}>
                                    <span className="border-b-[0.12em] border-current px-1 pb-[0.1em] w-full text-center text-[0.8em]">{match[1]}</span>
                                    <span className="pt-[0.1em] px-1 w-full text-center text-[0.8em]">{match[2]}</span>
                                </span>
                            );
                        }
                        return <span key={index}>{part}</span>;
                    })}
                </React.Fragment>
            );
        };

        // --- 虛擬 Icon 元件庫 ---
        const Icon = ({ name, size, className = '', title }) => {
            const faMap = {
                Play: 'fa-play', Plus: 'fa-plus', Trash2: 'fa-trash', Users: 'fa-user-friends',
                Clock: 'fa-clock', Trophy: 'fa-trophy', Share2: 'fa-share-alt', Copy: 'fa-copy',
                CheckCircle2: 'fa-check-circle', XCircle: 'fa-times-circle', ArrowRight: 'fa-arrow-right',
                Download: 'fa-download', Upload: 'fa-upload', FileText: 'fa-file-alt', Edit: 'fa-edit',
                ImagePlus: 'fa-image', X: 'fa-times', GripVertical: 'fa-grip-vertical',
                Volume2: 'fa-volume-up', VolumeX: 'fa-volume-mute', Music: 'fa-music'
            };
            return <i className={`fas ${faMap[name]} ${className} flex items-center justify-center`} style={{ fontSize: size }} title={title}></i>;
        };

        const Play = (props) => <Icon name="Play" {...props} />;
        const Plus = (props) => <Icon name="Plus" {...props} />;
        const Trash2 = (props) => <Icon name="Trash2" {...props} />;
        const Users = (props) => <Icon name="Users" {...props} />;
        const Clock = (props) => <Icon name="Clock" {...props} />;
        const Trophy = (props) => <Icon name="Trophy" {...props} />;
        const Share2 = (props) => <Icon name="Share2" {...props} />;
        const Copy = (props) => <Icon name="Copy" {...props} />;
        const CheckCircle2 = (props) => <Icon name="CheckCircle2" {...props} />;
        const XCircle = (props) => <Icon name="XCircle" {...props} />;
        const ArrowRight = (props) => <Icon name="ArrowRight" {...props} />;
        const Download = (props) => <Icon name="Download" {...props} />;
        const Upload = (props) => <Icon name="Upload" {...props} />;
        const FileText = (props) => <Icon name="FileText" {...props} />;
        const Edit = (props) => <Icon name="Edit" {...props} />;
        const ImagePlus = (props) => <Icon name="ImagePlus" {...props} />;
        const X = (props) => <Icon name="X" {...props} />;
        const GripVertical = (props) => <Icon name="GripVertical" {...props} />;
        const Volume2 = (props) => <Icon name="Volume2" {...props} />;
        const VolumeX = (props) => <Icon name="VolumeX" {...props} />;
        const Music = (props) => <Icon name="Music" {...props} />;

        const compressImage = (file, maxWidth = 400) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const scaleSize = maxWidth / img.width;
                        const width = img.width > maxWidth ? maxWidth : img.width;
                        const height = img.width > maxWidth ? img.height * scaleSize : img.height;
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.6));
                    };
                };
            });
        };

        // --- 主要 App 容器 ---
        function App() {
            const [user, setUser] = useState(null);
            const [gameId, setGameId] = useState(null);
            const [gameState, setGameState] = useState(null);
            const [loading, setLoading] = useState(true);
            const [view, setView] = useState('join');
            const [reusableQuestions, setReusableQuestions] = useState([]);

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        await auth.signInAnonymously();
                    } catch (err) {
                        console.error("Firebase 匿名登入失敗:", err);
                    } finally {
                        setUser(auth.currentUser);
                        setLoading(false);
                    }
                };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged(setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const id = params.get('gameId');
                if (id) {
                    setGameId(id);
                }
            }, []);

            useEffect(() => {
                if (!user || !gameId) return;

                const unsubscribe = getGameRef(gameId).onSnapshot((docSnap) => {
                    if (docSnap.exists) {
                        setGameState({ id: docSnap.id, ...docSnap.data() });
                    } else {
                        setGameState(null);
                        alert("找不到此遊戲房間！");
                        setGameId(null);
                        // 清除網址列中的無效房間代號
                        safeUpdateUrl(null);
                    }
                }, (error) => {
                    console.error("Firestore listen error:", error);
                    alert(`無法連線至房間資料庫！\n錯誤: ${error.message}`);
                    setGameId(null);
                });

                return () => unsubscribe();
            }, [user, gameId]);

            const gameStateRef = useRef(gameState);
            useEffect(() => { gameStateRef.current = gameState; }, [gameState]);

            const evaluatingRef = useRef(false);
            useEffect(() => { evaluatingRef.current = false; }, [gameState?.status]);

            const [musicStatus, setMusicStatus] = useState('loading'); 
            const audioRef = useRef(null);
            const activeTrackRef = useRef(null);
            const userMutedRef = useRef(false);

            const currentTrack = useMemo(() => {
                if (!gameState) return null;
                if (['lobby', 'starting_countdown', 'finished'].includes(gameState.status)) return 'bg1.mp3';
                if (['preview', 'playing', 'result', 'interim_leaderboard'].includes(gameState.status)) return 'bg5.mp3';
                return null;
            }, [gameState?.status]);

            useEffect(() => {
                const isHost = user && gameState && user.uid === gameState.hostId;
                
                if (!isHost || !currentTrack) {
                    if (audioRef.current) {
                        audioRef.current.pause();
                        audioRef.current.src = "";
                        audioRef.current = null;
                        activeTrackRef.current = null;
                    }
                    return;
                }

                if (activeTrackRef.current !== currentTrack) {
                    if (audioRef.current) {
                        audioRef.current.pause();
                        audioRef.current.src = "";
                    }
                    const bgMusic = new Audio(currentTrack);
                    bgMusic.loop = true; bgMusic.volume = 0.5;
                    audioRef.current = bgMusic;
                    activeTrackRef.current = currentTrack;

                    if (!userMutedRef.current) {
                        setMusicStatus('loading');
                        bgMusic.play().then(() => setMusicStatus('playing')).catch(error => setMusicStatus(error.name === 'NotSupportedError' ? 'error' : 'paused'));
                    } else {
                        setMusicStatus('paused');
                    }
                }
            }, [currentTrack, user, gameState?.hostId]);

            const toggleMusic = () => {
                if (!audioRef.current || musicStatus === 'error') return;
                if (musicStatus === 'playing') {
                    audioRef.current.pause();
                    userMutedRef.current = true;
                    setMusicStatus('paused');
                } else {
                    userMutedRef.current = false;
                    audioRef.current.play().then(() => setMusicStatus('playing')).catch(() => setMusicStatus('error'));
                }
            };

            useEffect(() => {
                if (!user || !gameId) return;

                const checkAndEvaluate = async () => {
                    const currentGameState = gameStateRef.current;
                    if (!currentGameState || user.uid !== currentGameState.hostId) return;
                    if (!['starting_countdown', 'preview', 'playing'].includes(currentGameState.status)) return;

                    const qIndex = currentGameState.currentQIndex !== undefined ? currentGameState.currentQIndex : 0;
                    const currentQ = currentGameState.questions?.[qIndex];
                    const gameRef = getGameRef(gameId);

                    if (currentGameState.status === 'starting_countdown' && Date.now() >= currentGameState.countdownDeadline) {
                        if (evaluatingRef.current) return;
                        evaluatingRef.current = true;
                        try { await gameRef.update({ status: 'preview', currentQIndex: 0, previewDeadline: Date.now() + 5000 }); } catch(e) { evaluatingRef.current = false; }
                        return;
                    }

                    if (!currentQ) return;

                    if (currentGameState.status === 'preview' && Date.now() >= currentGameState.previewDeadline) {
                        if (evaluatingRef.current) return;
                        evaluatingRef.current = true;
                        try { await gameRef.update({ status: 'playing', deadline: Date.now() + (parseInt(currentQ.timeLimit || 20, 10) * 1000) }); } catch(e) { evaluatingRef.current = false; }
                        return;
                    }

                    if (currentGameState.status === 'playing') {
                        const answers = currentGameState.answers?.[qIndex] || {};
                        const players = currentGameState.players || {};
                        const playerIds = Object.keys(players);
                        
                        const allAnswered = playerIds.length > 0 && playerIds.every((id) => answers[id]);
                        const timeUp = currentGameState.deadline && Date.now() >= currentGameState.deadline;

                        if (allAnswered || timeUp) {
                            if (evaluatingRef.current) return;
                            evaluatingRef.current = true;

                            let correctSubmissions = [];

                            if (currentQ.type === 'fill') {
                                const validAnswers = (currentQ.fillAnswers || (currentQ.fillAnswer ? [currentQ.fillAnswer] : []))
                                    .map((a) => (currentQ.caseSensitive ? a.trim() : a.trim().toLowerCase()))
                                    .filter((a) => a !== '');
                                
                                Object.entries(answers).forEach(([playerId, ansData]) => {
                                    const userText = currentQ.caseSensitive ? (ansData.textAnswer || '').trim() : (ansData.textAnswer || '').trim().toLowerCase();
                                    if (validAnswers.includes(userText) && userText !== '') correctSubmissions.push({ playerId, timestamp: ansData.timestamp });
                                });
                            } else {
                                const correctOptionIds = (currentQ.options || []).filter((o) => o.isCorrect).map((o) => o.id).sort();
                                Object.entries(answers).forEach(([playerId, ansData]) => {
                                    const selected = [...(ansData.options || [])].sort();
                                    if (JSON.stringify(selected) === JSON.stringify(correctOptionIds)) correctSubmissions.push({ playerId, timestamp: ansData.timestamp });
                                });
                            }

                            correctSubmissions.sort((a, b) => a.timestamp - b.timestamp);
                            const newPlayers = { ...players };
                            const updates = { status: 'result' };
                            
                            correctSubmissions.forEach((sub, index) => {
                                const remainingSecs = Math.max(0, (currentGameState.deadline - sub.timestamp) / 1000);
                                let points = 10;
                                if (index === 0) points += 5;
                                if (remainingSecs >= currentQ.timeLimit / 2) points += 3;
                                else if (remainingSecs >= currentQ.timeLimit / 4) points += 2;
                                else if (remainingSecs >= 3) points += 1;

                                if (newPlayers[sub.playerId]) {
                                    newPlayers[sub.playerId].score = (newPlayers[sub.playerId].score || 0) + points;
                                    updates[`answers.${qIndex}.${sub.playerId}.pointsEarned`] = points;
                                }
                            });

                            updates.players = newPlayers;
                            try { await gameRef.update(updates); } catch(e) { evaluatingRef.current = false; }
                        }
                    }
                };

                const intervalId = setInterval(checkAndEvaluate, 250);
                return () => clearInterval(intervalId);
            }, [user, gameId]);

            if (loading) {
                return <div className="min-h-screen flex items-center justify-center bg-gray-900 text-white font-bold text-xl"><Clock className="animate-spin mr-3" /> 載入中...</div>;
            }

            if (!gameId) {
                if (view === 'create') return <CreateGame user={user} onGameCreated={setGameId} onBack={() => setView('join')} initialQuestions={reusableQuestions} />;
                return <JoinGame user={user} onSetGameId={setGameId} onNavigateCreate={() => { setReusableQuestions([]); setView('create'); }} />;
            }

            if (gameState && !gameState.players?.[user.uid] && gameState.hostId !== user.uid) {
                return <JoinGame user={user} initialGameId={gameId} onSetGameId={setGameId} onNavigateCreate={() => { setReusableQuestions([]); setView('create'); }} gameState={gameState} />;
            }

            if (gameState) {
                const isHost = user && user.uid === gameState.hostId;
                return (
                    <React.Fragment>
                        {isHost && (
                            <button
                                onClick={toggleMusic}
                                disabled={musicStatus === 'error'}
                                className={`fixed top-4 right-4 md:top-8 md:right-8 p-3 md:p-5 bg-white/10 hover:bg-white/20 border border-white/20 rounded-full text-white backdrop-blur-md transition flex items-center justify-center z-[200] shadow-2xl group ${musicStatus === 'error' ? 'opacity-50 cursor-not-allowed' : ''}`}
                                title={musicStatus === 'playing' ? "暫停音樂" : musicStatus === 'error' ? "無法載入音樂檔案" : "播放音樂"}
                            >
                                {musicStatus === 'playing' ? <Volume2 className="w-6 h-6 md:w-8 md:h-8 text-green-400 group-hover:scale-110 transition-transform" /> :
                                 musicStatus === 'paused' ? <VolumeX className="w-6 h-6 md:w-8 md:h-8 text-yellow-400 group-hover:scale-110 transition-transform" /> :
                                 musicStatus === 'error' ? <VolumeX className="w-6 h-6 md:w-8 md:h-8 text-red-500" /> :
                                 <Music className="w-6 h-6 md:w-8 md:h-8 text-gray-400 animate-pulse" />}
                            </button>
                        )}
                        {(() => {
                            switch (gameState.status) {
                                case 'lobby': return <Lobby user={user} gameState={gameState} gameId={gameId} />;
                                case 'starting_countdown': return <StartingCountdown gameState={gameState} />;
                                case 'preview': return <QuestionPreview gameState={gameState} />;
                                case 'playing': return <Gameplay user={user} gameState={gameState} gameId={gameId} />;
                                case 'result': return <Result user={user} gameState={gameState} gameId={gameId} />;
                                case 'interim_leaderboard': return <InterimLeaderboard user={user} gameState={gameState} gameId={gameId} />;
                                case 'finished': return <Leaderboard gameState={gameState} user={user} onBack={() => { setReusableQuestions([]); setView('join'); setGameId(null); safeUpdateUrl(null); }} onReplay={() => { setReusableQuestions(gameState.questions); setView('create'); setGameId(null); safeUpdateUrl(null); }} />;
                                default: return <div>狀態錯誤</div>;
                            }
                        })()}
                    </React.Fragment>
                );
            }

            return <div className="min-h-screen flex items-center justify-center bg-gray-900 text-white font-bold text-xl"><Clock className="animate-spin mr-3" /> 載入遊戲中...</div>;
        }

        // --- 子元件定義 ---
        const TeamChart = React.memo(({ players, teamCount }) => {
            const { maxTeamScore, sortedTeams } = useMemo(() => {
                const teamScores = {};
                for (let i = 1; i <= teamCount; i++) teamScores[`隊伍${i}`] = 0;
                Object.values(players).forEach(p => { if (p.team) teamScores[p.team] = (teamScores[p.team] || 0) + p.score; });
                const maxScore = Math.max(...Object.values(teamScores).map(Number), 1); 
                const sorted = Object.entries(teamScores).sort((a, b) => a[0].localeCompare(b[0], undefined, { numeric: true }));
                return { maxTeamScore: maxScore, sortedTeams: sorted };
            }, [players, teamCount]);

            const podiumColors = ['bg-[#e21b3c]', 'bg-[#1368ce]', 'bg-[#d89e00]', 'bg-[#26890c]', 'bg-[#864cbf]', 'bg-[#00a8ce]'];

            return (
                <div className="w-full max-w-4xl mb-10 bg-white/10 backdrop-blur-md p-6 md:p-10 rounded-3xl border border-white/20 animate-fade-in-up overflow-x-auto custom-scrollbar">
                    <h3 className="text-center text-white font-black mb-8 tracking-widest text-2xl md:text-3xl drop-shadow-md">隊伍總排名</h3>
                    <div className="flex items-end justify-center gap-4 md:gap-6 min-w-[500px] h-64 md:h-80 border-b-4 border-white/30 pb-0">
                        {sortedTeams.map(([teamName, score], index) => {
                            const heightPercentage = score === 0 ? 8 : Math.max((score / maxTeamScore) * 100, 8); 
                            const barColor = podiumColors[index % podiumColors.length];
                            return (
                                <div key={teamName} className="flex flex-col items-center flex-1 max-w-[120px] group h-full justify-end">
                                    <span className="text-white font-black text-3xl md:text-5xl mb-2 drop-shadow-lg group-hover:-translate-y-2 transition-transform">{score}</span>
                                    <div className={`w-full ${barColor} transition-all duration-1000 ease-out shadow-lg relative flex flex-col items-center justify-end pb-4`} style={{ height: `${heightPercentage}%` }}>
                                        <span className="text-white font-bold text-lg md:text-2xl drop-shadow-md whitespace-nowrap">{teamName}</span>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        });

        function CreateGame({ user, onGameCreated, onBack, initialQuestions }) {
            const [questions, setQuestions] = useState(initialQuestions || []);
            const fileInputRef = useRef(null);
            const [editingId, setEditingId] = useState(null);
            const [isCreating, setIsCreating] = useState(false);
            const [importFiles, setImportFiles] = useState(null);
            const [customAlert, setCustomAlert] = useState(null);
            
            const [gameMode, setGameMode] = useState('solo');
            const [teamCount, setTeamCount] = useState(2);

            const [activeMathPanel, setActiveMathPanel] = useState(null);
            const [fractionNum, setFractionNum] = useState('');
            const [fractionDen, setFractionDen] = useState('');
            const mathSymbols = ['²', '³', 'ⁿ', '√', '∛', 'π', 'θ', 'α', 'β', '±', '×', '÷', '≈', '≠', '≤', '≥', '∞', '°', '△', '∑'];

            const defaultQ = { text: '', type: 'single', timeLimit: 20, options: [{ id: '1', text: '', isCorrect: false, imageBase64: '' }, { id: '2', text: '', isCorrect: false, imageBase64: '' }], fillAnswers: [''], imageBase64: '', caseSensitive: false };
            const [currentQ, setCurrentQ] = useState(defaultQ);

            const addOption = () => setCurrentQ({ ...currentQ, options: [...currentQ.options, { id: Date.now().toString(), text: '', isCorrect: false, imageBase64: '' }] });
            const updateOption = (id, field, value) => {
                setCurrentQ({ ...currentQ, options: currentQ.options.map(o => { if (o.id !== id) return currentQ.type === 'single' && field === 'isCorrect' && value ? { ...o, isCorrect: false } : o; return { ...o, [field]: value }; }) });
            };
            const removeOption = (id) => {
                if (currentQ.options.length <= 2) return;
                setCurrentQ({ ...currentQ, options: currentQ.options.filter(o => o.id !== id) });
            };
            const cancelEdit = () => {
                setEditingId(null);
                setCurrentQ({ ...defaultQ, options: [{ id: Date.now() + '1', text: '', isCorrect: false, imageBase64: '' }, { id: Date.now() + '2', text: '', isCorrect: false, imageBase64: '' }]});
            };

            const saveQuestion = () => {
                if (!currentQ.text.trim() && !currentQ.imageBase64) return setCustomAlert("請輸入題目內容或上傳題目圖片！");
                if (currentQ.type === 'fill') {
                    if (!currentQ.fillAnswers || currentQ.fillAnswers.every(a => !a.trim())) return setCustomAlert("請至少輸入一個填空題的正確答案！");
                } else {
                    if (currentQ.options.some(o => !o.text.trim() && !o.imageBase64)) return setCustomAlert("請確保所有選項都有內容（文字或圖片）！");
                    if (!currentQ.options.some(o => o.isCorrect)) return setCustomAlert("請至少選擇一個正確答案！");
                }

                const sanitizedQ = { ...currentQ };
                if (sanitizedQ.type === 'fill') sanitizedQ.fillAnswers = sanitizedQ.fillAnswers.filter(a => a.trim() !== '');

                if (editingId) {
                    setQuestions(questions.map(q => q.id === editingId ? { ...sanitizedQ, id: editingId } : q));
                    setEditingId(null);
                } else {
                    setQuestions([...questions, { ...sanitizedQ, id: Date.now().toString() }]);
                }
                cancelEdit();
            };

            const downloadFile = (content, filename) => {
                const blob = new Blob(["\uFEFF" + content], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url; link.setAttribute('download', filename);
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
            };

            const exportQuestions = () => {
                if (questions.length === 0) return alert("目前沒有題目可以匯出！");
                const csvHeaders = ['題目類型(single/multiple/fill)', '題目內容', '題目圖片Base64', '限時(秒)', '填空題答案(多個請用|隔開)', '區分大小寫(true/false)', '選項1', '選項1正確(true/false)', '選項1圖片Base64', '選項2', '選項2正確(true/false)', '選項2圖片Base64', '選項3', '選項3正確(true/false)', '選項3圖片Base64', '選項4', '選項4正確(true/false)', '選項4圖片Base64', '選項5', '選項5正確(true/false)', '選項5圖片Base64', '選項6', '選項6正確(true/false)', '選項6圖片Base64'];
                const rows = questions.map(q => {
                    const fillAnsJoined = (q.fillAnswers || (q.fillAnswer ? [q.fillAnswer] : [])).join('|');
                    const row = [q.type, `"${q.text.replace(/"/g, '""')}"`, `"${(q.imageBase64 || '').replace(/"/g, '""')}"`, q.timeLimit, `"${fillAnsJoined.replace(/"/g, '""')}"`, q.caseSensitive ? 'true' : 'false'];
                    if (q.type !== 'fill') {
                        q.options.forEach(opt => row.push(`"${(opt.text || '').replace(/"/g, '""')}"`, opt.isCorrect ? 'true' : 'false', `"${(opt.imageBase64 || '').replace(/"/g, '""')}"`));
                    }
                    return row.join(',');
                });
                downloadFile(csvHeaders.join(',') + '\n' + rows.join('\n'), '我的題庫.csv');
            };

            const importQuestions = (e) => {
                const files = e.target.files;
                if (!files || files.length === 0) return;
                setImportFiles(Array.from(files));
                e.target.value = null;
            };

            const processImportFiles = async (mode) => {
                let allNewQuestions = [];
                for (const file of importFiles) {
                    const text = await new Promise(resolve => {
                        const reader = new FileReader();
                        reader.onload = (event) => resolve(event.target.result);
                        reader.readAsText(file);
                    });
                    const lines = text.split(/\r?\n/);
                    const newQuestions = [];
                    const isOldFormat = lines[0] && lines[0].indexOf('選項1圖片Base64') === -1;
                    const step = isOldFormat ? 2 : 3;

                    for (let i = 1; i < lines.length; i++) {
                        if (!lines[i].trim()) continue;
                        const row = []; let current = ''; let inQuotes = false;
                        for (let j = 0; j < lines[i].length; j++) {
                            const char = lines[i][j];
                            if (char === '"' && lines[i][j+1] === '"') { current += '"'; j++; }
                            else if (char === '"') inQuotes = !inQuotes;
                            else if (char === ',' && !inQuotes) { row.push(current); current = ''; }
                            else current += char;
                        }
                        row.push(current);

                        const type = row[0]?.trim() || 'single';
                        const textStr = row[1]?.trim() || '';
                        const imageBase64 = row[2]?.trim() || '';
                        const timeLimit = parseInt(row[3]) || 20;
                        const fillAnswersRaw = row[4]?.trim() || '';
                        const caseSensitive = row[5]?.trim().toLowerCase() === 'true';
                        const fillAnswers = fillAnswersRaw ? fillAnswersRaw.split('|').map(s => s.trim()).filter(Boolean) : [''];

                        if (!textStr && !imageBase64 && type === 'fill' && fillAnswers.every(a => !a)) continue;

                        const options = [];
                        if (type !== 'fill') {
                            for (let j = 6; j < row.length; j += step) {
                                const optText = row[j]?.trim();
                                const isCorrect = row[j+1]?.trim().toLowerCase() === 'true';
                                const optImageBase64 = isOldFormat ? '' : (row[j+2]?.trim() || '');
                                if (optText || optImageBase64) options.push({ id: Date.now().toString() + Math.random(), text: optText || '', isCorrect, imageBase64: optImageBase64 });
                            }
                            if (options.length === 0) continue; 
                        }
                        newQuestions.push({ id: Date.now().toString() + Math.random(), type, text: textStr, imageBase64, timeLimit, fillAnswers, caseSensitive, options });
                    }
                    allNewQuestions = [...allNewQuestions, ...newQuestions];
                }
                if (allNewQuestions.length > 0) {
                    mode === 'replace' ? setQuestions(allNewQuestions) : setQuestions(prev => [...prev, ...allNewQuestions]);
                    setCustomAlert(`成功匯入 ${allNewQuestions.length} 道題目！`);
                } else {
                    setCustomAlert("找不到有效的題目，請檢查格式是否正確。");
                }
                setImportFiles(null);
            };

            const createGame = async () => {
                if (questions.length === 0) { setCustomAlert('請先在題庫中至少新增一道題目！'); return; }
                if (isCreating) return;
                
                if (!user) {
                    setCustomAlert('❌ 無法建立房間！\n\n原因：系統無法獲取您的登入狀態。\n\n請確保 Firebase 後台的 Authentication ➔ Sign-in method 中，已經啟用了「匿名 (Anonymous)」登入功能！');
                    return;
                }

                setIsCreating(true);
                try {
                    const newGameId = Math.random().toString(36).substr(2, 6).toUpperCase();
                    const gameData = JSON.parse(JSON.stringify({
                        pin: newGameId, hostId: user.uid, status: 'lobby', questions: questions, currentQIndex: 0,
                        mode: gameMode, teamCount: gameMode === 'team' ? teamCount : 0, players: {}, answers: {}, createdAt: Date.now()
                    }));

                    const setPromise = getGameRef(newGameId).set(gameData);
                    
                    await Promise.race([
                        setPromise,
                        new Promise((_, reject) => setTimeout(() => reject(new Error("資料庫連線逾時 (Timeout)。\n\n請前往 Firebase 後台確認：\n1. 是否已點擊「建立 Firestore Database」\n2. 規則是否已設定為 allow read, write: if true;")), 8000))
                    ]);
                    
                    // 安全地更新網址列，防止跨域或 Blob 環境報錯
                    safeUpdateUrl(newGameId);

                    onGameCreated(newGameId);
                } catch (error) {
                    console.error("建立遊戲失敗:", error);
                    setCustomAlert(`❌ 建立遊戲失敗！\n\n詳細錯誤: ${error.message}`);
                    setIsCreating(false);
                }
            };

            return (
                <div className="min-h-screen bg-gray-50 p-4 md:p-8 font-sans text-gray-800">
                    <div className="max-w-6xl mx-auto space-y-6 md:space-y-8">
                        <div className="flex justify-between items-center mb-4 md:mb-8 relative">
                            <button onClick={onBack} className="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold rounded-xl transition flex items-center absolute left-0"><ArrowRight className="mr-2 rotate-180 text-lg" /> 返回首頁</button>
                            <div className="text-center w-full">
                                <h1 className="text-3xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600 mb-2">建立你的問答遊戲</h1>
                                <p className="text-sm md:text-base text-gray-500">設計題目，邀請朋友挑戰！</p>
                            </div>
                        </div>

                        <div className="bg-white p-6 md:p-8 rounded-2xl shadow-xl border border-gray-100 mb-6 md:mb-8 flex flex-col gap-4">
                            <h2 className="text-xl md:text-2xl font-bold text-gray-800 flex items-center">選擇遊戲模式</h2>
                            <div className="flex flex-col sm:flex-row gap-4 sm:gap-8">
                                <label className="flex items-center gap-3 cursor-pointer p-3 rounded-lg hover:bg-gray-50 transition"><input type="radio" value="solo" checked={gameMode === 'solo'} onChange={() => setGameMode('solo')} className="w-6 h-6 text-blue-600" /><span className="font-medium text-gray-700 text-lg md:text-xl">單人比拼模式</span></label>
                                <label className="flex items-center gap-3 cursor-pointer p-3 rounded-lg hover:bg-gray-50 transition"><input type="radio" value="team" checked={gameMode === 'team'} onChange={() => setGameMode('team')} className="w-6 h-6 text-blue-600" /><span className="font-medium text-gray-700 text-lg md:text-xl">組隊模式</span></label>
                            </div>
                            {gameMode === 'team' && (
                                <div className="flex items-center gap-4 mt-2 p-4 md:p-6 bg-blue-50 rounded-xl border border-blue-100">
                                    <label className="text-blue-800 font-bold text-lg md:text-xl">設定隊伍數量：</label>
                                    <input type="number" min="2" max="10" value={teamCount} onChange={(e) => setTeamCount(parseInt(e.target.value) || 2)} className="border-2 border-blue-200 rounded-lg px-4 py-2 w-24 text-center font-bold text-xl text-blue-900 focus:outline-none focus:border-blue-500" />
                                </div>
                            )}
                        </div>

                        <div className="grid lg:grid-cols-2 gap-6 md:gap-8">
                            <div className="bg-white p-6 md:p-8 rounded-2xl shadow-xl border border-gray-100">
                                <div className="flex justify-between items-center mb-6"><h2 className="text-xl md:text-2xl font-bold text-gray-800 flex items-center">{editingId ? <Edit className="mr-2 text-blue-500 text-2xl" /> : <Plus className="mr-2 text-blue-500 text-2xl" />} {editingId ? '編輯題目' : '新增題目'}</h2></div>
                                <div className="space-y-6">
                                    <div>
                                        <label className="block text-sm md:text-base font-medium text-gray-700 mb-2">題目內容</label>
                                        <textarea className="w-full p-4 md:p-5 text-lg border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" rows="3" value={currentQ.text} onChange={e => setCurrentQ({...currentQ, text: e.target.value})} placeholder="例如：圖片中的是哪一種動物？" />
                                    </div>
                                    <div>
                                        <label className="block text-sm md:text-base font-medium text-gray-700 mb-2">題目圖片 (選填，從本機上傳)</label>
                                        <input type="file" accept="image/*" className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100" onChange={async e => { const file = e.target.files[0]; if (file) { const base64 = await compressImage(file, 500); setCurrentQ({...currentQ, imageBase64: base64}); } e.target.value = null; }} />
                                        {currentQ.imageBase64 && (
                                            <div className="mt-3 relative inline-block border border-gray-200 rounded-lg p-2 bg-gray-50"><img src={currentQ.imageBase64} alt="預覽" className="max-h-40 object-contain rounded" /><button onClick={() => setCurrentQ({...currentQ, imageBase64: ''})} className="absolute -top-3 -right-3 bg-red-500 hover:bg-red-600 text-white rounded-full p-1.5 shadow transition"><X className="text-sm" /></button></div>
                                        )}
                                    </div>
                                    <div className="flex flex-col sm:flex-row gap-4 md:gap-6">
                                        <div className="flex-1"><label className="block text-sm md:text-base font-medium text-gray-700 mb-2">題目類型</label><select className="w-full p-3 text-lg border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white" value={currentQ.type} onChange={e => { const newType = e.target.value; setCurrentQ({...currentQ, type: newType, options: currentQ.options.map((o, i) => ({ ...o, isCorrect: newType === 'single' ? i === 0 : o.isCorrect })) }); }}><option value="single">單選題</option><option value="multiple">多選題</option><option value="fill">填空題</option></select></div>
                                        <div className="flex-1"><label className="block text-sm md:text-base font-medium text-gray-700 mb-2">限時 (秒)</label><input type="number" min="5" max="120" className="w-full p-3 text-lg border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" value={currentQ.timeLimit} onChange={e => setCurrentQ({...currentQ, timeLimit: parseInt(e.target.value) || 20})} /></div>
                                    </div>

                                    {currentQ.type === 'fill' ? (
                                        <div>
                                            <label className="block text-sm md:text-base font-medium text-gray-700 mb-2">正確答案設定 (可加入多個同義詞/別稱)</label>
                                            <div className="space-y-3">
                                                {(currentQ.fillAnswers && currentQ.fillAnswers.length > 0 ? currentQ.fillAnswers : ['']).map((ans, idx) => (
                                                    <div key={idx} className="flex items-center gap-3 relative">
                                                        <input type="text" className="flex-1 p-3 md:p-4 text-lg border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder={`可接受的答案 ${idx + 1}`} value={ans} onChange={e => { const newAns = [...(currentQ.fillAnswers || [''])]; newAns[idx] = e.target.value; setCurrentQ({...currentQ, fillAnswers: newAns}); }} />
                                                        
                                                        <button type="button" onClick={() => setActiveMathPanel(activeMathPanel === idx ? null : idx)} className={`p-3 md:p-4 transition rounded-lg border flex-shrink-0 font-serif font-bold text-lg md:text-xl flex items-center justify-center ${activeMathPanel === idx ? 'bg-blue-100 text-blue-600 border-blue-400 shadow-inner' : 'bg-gray-50 text-gray-500 border-gray-200 hover:bg-blue-50 hover:text-blue-600 hover:border-blue-300'}`} title="插入數學符號">
                                                            √x
                                                        </button>
                                                        
                                                        {(currentQ.fillAnswers?.length > 1) && (<button onClick={() => setCurrentQ({...currentQ, fillAnswers: currentQ.fillAnswers.filter((_, i) => i !== idx)})} className="p-3 md:p-4 text-gray-400 hover:text-red-500 transition bg-gray-50 hover:bg-red-50 rounded-lg border border-gray-200 flex-shrink-0" title="移除此答案"><Trash2 className="text-xl" /></button>)}

                                                        {activeMathPanel === idx && (
                                                            <div className="absolute top-full mt-2 right-0 md:right-16 bg-white p-4 rounded-2xl shadow-[0_10px_40px_rgba(0,0,0,0.2)] border-2 border-blue-100 z-[100] w-[320px] animate-fade-in-up">
                                                                <div className="flex justify-between items-center mb-3 pb-2 border-b border-gray-100">
                                                                    <span className="text-sm font-bold text-gray-500 uppercase tracking-widest">數學符號面板</span>
                                                                    <button onClick={() => setActiveMathPanel(null)} className="text-gray-400 hover:text-red-500 bg-gray-100 p-1.5 rounded-full transition"><X className="text-base" /></button>
                                                                </div>
                                                                <div className="grid grid-cols-6 gap-2">
                                                                    {mathSymbols.map(sym => (
                                                                        <button key={sym} type="button" onClick={() => {
                                                                            const newAns = [...(currentQ.fillAnswers || [''])];
                                                                            newAns[idx] = (newAns[idx] || '') + sym;
                                                                            setCurrentQ({...currentQ, fillAnswers: newAns});
                                                                        }} className="aspect-square flex items-center justify-center hover:bg-blue-500 hover:text-white rounded-xl text-gray-800 font-black text-xl transition-colors bg-gray-50 border border-gray-200 hover:border-blue-500 shadow-sm">
                                                                            {sym}
                                                                        </button>
                                                                    ))}
                                                                </div>
                                                                <div className="col-span-full flex gap-2 items-center bg-gray-50 p-2 rounded-xl mt-3 border border-gray-200">
                                                                    <span className="text-sm font-bold text-gray-500 pl-1 whitespace-nowrap">分數</span>
                                                                    <input type="number" className="w-12 text-center rounded border border-gray-300 py-1 outline-none focus:border-blue-500" placeholder="分子" value={fractionNum} onChange={e=>setFractionNum(e.target.value)} />
                                                                    <span className="font-bold text-gray-400">/</span>
                                                                    <input type="number" className="w-12 text-center rounded border border-gray-300 py-1 outline-none focus:border-blue-500" placeholder="分母" value={fractionDen} onChange={e=>setFractionDen(e.target.value)} />
                                                                    <button type="button" onClick={() => {
                                                                        if(fractionNum && fractionDen) {
                                                                            const newAns = [...(currentQ.fillAnswers || [''])];
                                                                            newAns[idx] = (newAns[idx] || '') + `${fractionNum}/${fractionDen}`;
                                                                            setCurrentQ({...currentQ, fillAnswers: newAns});
                                                                            setFractionNum(''); setFractionDen('');
                                                                        }
                                                                    }} className="ml-auto px-3 py-1.5 bg-blue-500 text-white rounded font-bold text-sm hover:bg-blue-600 transition">插入</button>
                                                                </div>
                                                            </div>
                                                        )}
                                                    </div>
                                                ))}
                                            </div>
                                            <button onClick={() => setCurrentQ({...currentQ, fillAnswers: [...(currentQ.fillAnswers || ['']), '']})} className="mt-4 text-base text-blue-600 font-bold hover:text-blue-800 flex items-center"><Plus className="mr-1 text-lg" /> 新增其他可接受的答案</button>
                                            <div className="flex items-center mt-6 bg-gray-50 p-4 rounded-xl border border-gray-200"><input type="checkbox" id="caseSensitive" checked={currentQ.caseSensitive || false} onChange={e => setCurrentQ({...currentQ, caseSensitive: e.target.checked})} className="w-6 h-6 text-blue-600 rounded border-gray-300 focus:ring-blue-500 cursor-pointer" /><label htmlFor="caseSensitive" className="ml-3 text-base font-medium text-gray-700 cursor-pointer">答案必須區分大小寫</label></div>
                                        </div>
                                    ) : (
                                        <div>
                                            <label className="block text-sm md:text-base font-medium text-gray-700 mb-3">選項設定 (勾選為正確答案)</label>
                                            <div className="space-y-4">
                                                {currentQ.options.map((opt, index) => (
                                                    <div key={opt.id} className={`flex flex-col gap-3 p-4 rounded-xl border-2 ${opt.isCorrect ? 'border-green-400 bg-green-50' : 'border-gray-200'}`}>
                                                        <div className="flex items-center gap-3">
                                                            <input type={currentQ.type === 'single' ? 'radio' : 'checkbox'} name="correctAnswer" className="w-6 h-6 text-green-600 focus:ring-green-500 cursor-pointer flex-shrink-0" checked={opt.isCorrect} onChange={(e) => updateOption(opt.id, 'isCorrect', e.target.checked)} />
                                                            <input type="text" className="flex-1 p-3 text-lg bg-white border border-gray-200 rounded-md outline-none focus:border-blue-500 transition" placeholder={`選項 ${String.fromCharCode(65 + index)} 文字 (選填)`} value={opt.text} onChange={e => updateOption(opt.id, 'text', e.target.value)} />
                                                            <label className="cursor-pointer p-3 bg-gray-100 hover:bg-blue-100 text-gray-500 hover:text-blue-600 rounded-md transition flex-shrink-0" title="加入選項圖片"><ImagePlus className="text-xl" /><input type="file" accept="image/*" className="hidden" onChange={async (e) => { const file = e.target.files[0]; if (file) { const base64 = await compressImage(file, 250); updateOption(opt.id, 'imageBase64', base64); } e.target.value = null; }} /></label>
                                                            <button onClick={() => removeOption(opt.id)} className="p-3 text-gray-400 hover:text-red-500 transition flex-shrink-0"><Trash2 className="text-xl" /></button>
                                                        </div>
                                                        {opt.imageBase64 && (<div className="relative inline-block ml-10 border border-gray-200 rounded p-2 bg-white w-max"><img src={opt.imageBase64} className="h-20 object-contain rounded" alt="預覽" /><button onClick={() => updateOption(opt.id, 'imageBase64', '')} className="absolute -top-3 -right-3 bg-red-500 hover:bg-red-600 text-white rounded-full p-1.5 shadow transition"><X className="text-sm" /></button></div>)}
                                                    </div>
                                                ))}
                                            </div>
                                            <button onClick={addOption} className="mt-4 text-base text-blue-600 font-bold hover:text-blue-800 flex items-center"><Plus className="mr-1 text-lg" /> 加入更多選項</button>
                                        </div>
                                    )}

                                    <div className="flex gap-3 pt-4">
                                        {editingId && <button onClick={cancelEdit} className="w-1/3 py-4 bg-gray-200 hover:bg-gray-300 text-gray-700 text-lg font-bold rounded-xl transition">取消</button>}
                                        <button onClick={saveQuestion} className={`${editingId ? 'w-2/3 bg-blue-600 hover:bg-blue-700' : 'w-full bg-gray-800 hover:bg-gray-900'} py-4 text-white text-lg font-bold rounded-xl transition shadow-md`}>{editingId ? '更新題目' : '儲存題目至題庫'}</button>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-white p-6 md:p-8 rounded-2xl shadow-xl border border-gray-100 flex flex-col">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl md:text-2xl font-bold text-gray-800 flex items-center"><CheckCircle2 className="mr-2 text-green-500 text-2xl" /> 已建立題庫 ({questions.length})</h2>
                                    <div className="flex gap-3 relative">
                                        <button onClick={() => {
                                            const content = csvHeaders.join(',') + '\nsingle,太陽從哪邊升起？,,20,,false,東邊,true,,西邊,false,,南邊,false,,北邊,false,';
                                            downloadFile(content, '題庫格式範本.csv');
                                        }} title="下載 Excel/CSV 格式範本" className="p-3 text-gray-500 hover:text-blue-600 bg-gray-100 hover:bg-blue-50 rounded-xl transition"><FileText className="text-lg" /></button>
                                        <button onClick={() => fileInputRef.current.click()} title="從 Excel 匯入" className="p-3 text-gray-500 hover:text-green-600 bg-gray-100 hover:bg-green-50 rounded-xl transition"><Upload className="text-lg" /></button>
                                        <input type="file" accept=".csv" multiple ref={fileInputRef} onChange={importQuestions} className="hidden" />
                                        <button onClick={exportQuestions} title="將題庫匯出至 Excel" className="p-3 text-gray-500 hover:text-purple-600 bg-gray-100 hover:bg-purple-50 rounded-xl transition"><Download className="text-lg" /></button>
                                    </div>
                                </div>
                                
                                <div className="flex-1 overflow-y-auto space-y-4 mb-6 min-h-[300px] lg:max-h-[600px] pr-2 custom-scrollbar">
                                    {questions.length === 0 ? (
                                        <div className="h-full flex flex-col items-center justify-center text-gray-400 italic text-lg">尚未加入任何題目</div>
                                    ) : (
                                        questions.map((q, i) => (
                                            <div key={q.id} onClick={() => { setEditingId(q.id); setCurrentQ(JSON.parse(JSON.stringify(q))); }} className={`p-5 md:p-6 border-2 cursor-pointer relative group transition-all rounded-2xl ${editingId === q.id ? 'border-blue-400 bg-blue-50 shadow-md ring-2 ring-blue-400' : 'border-gray-100 bg-gray-50 hover:border-blue-300 hover:bg-blue-50/50'}`}>
                                                <span className="absolute top-3 right-3 text-sm font-bold px-3 py-1 bg-blue-100 text-blue-800 rounded-full">{q.type === 'single' ? '單選' : q.type === 'multiple' ? '多選' : '填空'}</span>
                                                <h3 className="text-lg md:text-xl font-bold text-gray-800 mb-3 pr-16 leading-relaxed">Q{i + 1}. <FormattedText text={q.text || '(圖片題)'} /></h3>
                                                {q.imageBase64 && <div className="text-sm text-blue-500 mb-3 font-bold flex items-center">📎 包含題目圖片</div>}
                                                <div className="text-base text-gray-600 flex flex-col gap-2">
                                                    {q.type === 'fill' ? (
                                                        <div className="text-green-700 font-bold break-all bg-green-50 p-2 rounded flex items-center gap-2 flex-wrap">正確答案: {(q.fillAnswers || []).map((ans, aIdx) => <React.Fragment key={aIdx}><FormattedText text={ans} />{aIdx < (q.fillAnswers.length - 1) ? ' / ' : ''}</React.Fragment>)} {q.caseSensitive && <span className="text-xs bg-green-200 text-green-900 px-2 py-0.5 rounded ml-2 whitespace-nowrap">區分大小寫</span>}</div>
                                                    ) : (
                                                        q.options.map((o, oi) => (
                                                            <div key={oi} className={`flex items-center gap-2 ${o.isCorrect ? 'text-green-700 font-bold bg-green-50 p-2 rounded' : 'p-2'}`}>
                                                                <span className="truncate max-w-[250px] md:max-w-[350px]">{String.fromCharCode(65 + oi)}. <FormattedText text={o.text || '(圖片選項)'} /> {o.isCorrect && '✓'}</span>
                                                                {o.imageBase64 && <span className="text-xs bg-gray-200 text-gray-500 px-2 py-1 rounded flex-shrink-0 font-bold">圖</span>}
                                                            </div>
                                                        ))
                                                    )}
                                                </div>
                                                <div className={`absolute bottom-3 right-3 flex gap-3 transition ${editingId === q.id ? 'opacity-100' : 'opacity-0 group-hover:opacity-100'}`}>
                                                    <button onClick={(e) => { e.stopPropagation(); const duplicatedQ = JSON.parse(JSON.stringify(q)); duplicatedQ.id = Date.now().toString() + Math.random(); setQuestions([...questions, duplicatedQ]); setEditingId(duplicatedQ.id); setCurrentQ(duplicatedQ); }} className="p-2.5 bg-blue-100 text-blue-600 hover:bg-blue-200 rounded-xl transition" title="複製題目"><Copy className="text-base" /></button>
                                                    <button onClick={(e) => { e.stopPropagation(); setQuestions(questions.filter(xq => xq.id !== q.id)); if (editingId === q.id) cancelEdit(); }} className="p-2.5 bg-red-100 text-red-600 hover:bg-red-200 rounded-xl transition" title="刪除題目"><Trash2 className="text-base" /></button>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>

                                <button onClick={createGame} disabled={questions.length === 0 || isCreating} className={`w-full py-5 md:py-6 font-black rounded-2xl flex justify-center items-center text-xl md:text-2xl transition shadow-xl ${questions.length > 0 && !isCreating ? 'bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white transform hover:-translate-y-1' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}>
                                    {isCreating ? <><Clock className="animate-spin mr-3 text-2xl" /> 正在生成房間...</> : <><Play className="mr-3 text-2xl" /> 開始遊戲並生成連結</>}
                                </button>
                            </div>
                        </div>
                    </div>

                    {importFiles && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
                            <div className="bg-white p-8 md:p-10 rounded-3xl shadow-2xl max-w-lg w-full animate-fade-in-up">
                                <h3 className="text-3xl font-black text-gray-800 mb-4">匯入題目</h3>
                                <p className="mb-8 text-gray-600 font-medium text-lg">已選擇 {importFiles.length} 份檔案。請問要如何處理這些題目？</p>
                                <div className="flex flex-col gap-4">
                                    <button onClick={() => processImportFiles('replace')} className="w-full py-5 bg-red-500 hover:bg-red-600 text-white text-xl font-bold rounded-2xl shadow-lg transform hover:-translate-y-0.5 transition flex items-center justify-center"><Trash2 className="mr-3 text-2xl" /> 替換並清空現有題庫</button>
                                    <button onClick={() => processImportFiles('append')} className="w-full py-5 bg-blue-600 hover:bg-blue-700 text-white text-xl font-bold rounded-2xl shadow-lg transform hover:-translate-y-0.5 transition flex items-center justify-center"><Plus className="mr-3 text-2xl" /> 直接加入現有題庫</button>
                                </div>
                                <button onClick={() => setImportFiles(null)} className="mt-6 w-full py-4 text-gray-500 text-xl font-bold hover:bg-gray-100 rounded-2xl transition">取消</button>
                            </div>
                        </div>
                    )}

                    {customAlert && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
                            <div className="bg-white p-8 md:p-10 rounded-3xl shadow-2xl max-w-md w-full text-center animate-fade-in-up">
                                <h3 className="text-2xl md:text-3xl font-bold text-gray-800 mb-8 whitespace-pre-wrap">{customAlert}</h3>
                                <button onClick={() => setCustomAlert(null)} className="w-full py-4 md:py-5 bg-blue-600 hover:bg-blue-700 text-white text-xl font-bold rounded-2xl shadow-md transition">確定</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function JoinGame({ user, initialGameId, onSetGameId, onNavigateCreate, gameState }) {
            const [nickname, setNickname] = useState('');
            const [pin, setPin] = useState(initialGameId || '');
            const [isJoining, setIsJoining] = useState(false);

            const handleJoin = async (e) => {
                e.preventDefault();
                if (!nickname.trim() || !pin.trim() || isJoining) return;
                setIsJoining(true);

                try {
                    const targetGameId = pin.trim().toUpperCase();
                    const gameRef = getGameRef(targetGameId);
                    
                    const getPromise = gameRef.get();
                    const gameSnap = await Promise.race([
                        getPromise,
                        new Promise((_, reject) => setTimeout(() => reject(new Error("資料庫連線逾時，請確認 Firestore 已啟用且網路連線正常。")), 8000))
                    ]);
                    
                    if (!gameSnap.exists) {
                        alert("找不到此遊戲房間代碼，請確認後再試！");
                        setIsJoining(false); 
                        return;
                    }

                    const gameData = gameSnap.data();
                    let assignedTeam = null;
                    if (gameData.mode === 'team') {
                        const teamTotals = {};
                        for (let i = 1; i <= (gameData.teamCount || 2); i++) teamTotals[`隊伍${i}`] = 0;
                        Object.values(gameData.players || {}).forEach(p => { if (p.team && teamTotals[p.team] !== undefined) teamTotals[p.team]++; });
                        assignedTeam = Object.keys(teamTotals).reduce((a, b) => teamTotals[a] < teamTotals[b] ? a : b);
                    }

                    const newPlayerData = { nickname: nickname.trim(), score: 0, joinedAt: Date.now() };
                    if (assignedTeam) newPlayerData.team = assignedTeam;

                    await gameRef.update({ [`players.${user.uid}`]: newPlayerData });

                    if (!initialGameId) {
                        safeUpdateUrl(targetGameId);
                        onSetGameId(targetGameId);
                    }
                } catch (error) {
                    alert(`加入遊戲失敗：\n${error.message}`);
                    setIsJoining(false);
                }
            };

            return (
                <div className="min-h-screen bg-gray-900 flex flex-col items-center justify-center p-4 md:p-8 text-white">
                    <div className="bg-white max-w-md md:max-w-lg w-full p-8 md:p-12 rounded-3xl shadow-2xl text-gray-800">
                        <div className="text-center mb-8 md:mb-10">
                            <div className="inline-flex items-center justify-center w-20 h-20 md:w-24 md:h-24 rounded-full bg-blue-100 text-blue-600 mb-6"><Trophy className="text-4xl md:text-5xl" /></div>
                            <h1 className="text-3xl md:text-4xl font-extrabold text-gray-800">準備加入遊戲！</h1>
                            {gameState ? <p className="text-gray-500 mt-3 md:text-lg">目前已有 {Object.keys(gameState.players || {}).length} 位玩家在等待室</p> : <p className="text-gray-500 mt-3 md:text-lg">輸入暱稱即刻加入對戰</p>}
                        </div>

                        <form onSubmit={handleJoin} className="space-y-6 md:space-y-8">
                            {!initialGameId ? (
                                <div>
                                    <label className="block text-base md:text-lg font-bold text-gray-700 mb-3">輸入遊戲房間代碼 (PIN)</label>
                                    <input type="text" className="w-full px-5 py-4 md:py-5 text-xl md:text-2xl border-2 border-gray-200 rounded-2xl focus:border-blue-500 focus:ring-0 outline-none text-center font-bold text-gray-800 placeholder-gray-300 transition uppercase tracking-widest bg-white" placeholder="例如：123456" value={pin} onChange={e => setPin(e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, ''))} />
                                </div>
                            ) : (
                                <div className="mb-6 p-4 bg-blue-50 rounded-2xl border border-blue-100 text-center">
                                    <p className="text-blue-800 font-bold text-lg">即將加入房間：<span className="text-2xl ml-2 tracking-widest">{initialGameId}</span></p>
                                </div>
                            )}
                            <div>
                                <label className="block text-base md:text-lg font-bold text-gray-700 mb-3">輸入你的專屬暱稱</label>
                                <input type="text" maxLength="12" className="w-full px-5 py-4 md:py-5 text-xl md:text-2xl border-2 border-gray-200 rounded-2xl focus:border-blue-500 focus:ring-0 outline-none text-center font-bold text-gray-800 placeholder-gray-300 transition bg-white" placeholder="例如：遊戲大師" value={nickname} onChange={e => setNickname(e.target.value)} autoFocus={!!initialGameId} />
                            </div>
                            <button type="submit" disabled={!nickname.trim() || !pin.trim() || isJoining} className="w-full py-5 md:py-6 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white text-xl md:text-2xl font-bold rounded-2xl shadow-xl transform hover:-translate-y-1 transition disabled:opacity-50 disabled:transform-none disabled:cursor-not-allowed">
                                {isJoining ? <span className="flex items-center justify-center"><Clock className="animate-spin mr-3 text-2xl" /> 加入中...</span> : "確認加入"}
                            </button>
                        </form>
                    </div>
                    
                    {!initialGameId && (
                        <div className="mt-10 text-center">
                            <p className="text-gray-400 mb-3 md:text-lg">我是主持人？</p>
                            <button onClick={onNavigateCreate} className="px-8 py-3 bg-white/10 hover:bg-white/20 text-white text-lg rounded-2xl font-bold transition border border-white/20">建立新遊戲 / 題庫</button>
                        </div>
                    )}
                </div>
            );
        }

        function Lobby({ user, gameState, gameId }) {
            const joinUrl = `${window.location.origin}${window.location.pathname}?gameId=${gameId}`;
            
            const playersStr = JSON.stringify(gameState.players || {});
            const playersArray = useMemo(() => Object.entries(gameState.players || {}).map(([uid, data]) => ({ uid, ...data })), [playersStr]);
            
            const [editingNickname, setEditingNickname] = useState(false);
            const [newNickname, setNewNickname] = useState('');
            const [dragOverTeam, setDragOverTeam] = useState(null);
            const [isStarting, setIsStarting] = useState(false);
            const isHost = user.uid === gameState.hostId;
            const isPlayer = Boolean(gameState.players?.[user.uid]);
            const [hostNickname, setHostNickname] = useState('');
            const [isJoiningHost, setIsJoiningHost] = useState(false);

            const hasPreloaded = useRef(false);
            useEffect(() => {
                if (hasPreloaded.current || !gameState?.questions) return;
                hasPreloaded.current = true;
                gameState.questions.forEach(q => {
                    if (q.imageBase64) { const img = new Image(); img.src = q.imageBase64; }
                    if (q.options) { q.options.forEach(opt => { if (opt.imageBase64) { const img = new Image(); img.src = opt.imageBase64; } }); }
                });
            }, [gameState?.questions]);

            useEffect(() => {
                if (!isHost || gameState.mode !== 'team') return;
                const timeoutId = setTimeout(() => {
                    const updates = {};
                    let changed = false;
                    const teamTotals = {};
                    for (let i = 1; i <= gameState.teamCount; i++) teamTotals[`隊伍${i}`] = 0;

                    playersArray.forEach(p => { if (p.team) teamTotals[p.team]++; });

                    Object.entries(gameState.players || {}).forEach(([uid, p]) => {
                        if (!p.team) {
                            const minTeam = Object.keys(teamTotals).reduce((a, b) => teamTotals[a] < teamTotals[b] ? a : b);
                            updates[`players.${uid}.team`] = minTeam;
                            teamTotals[minTeam]++;
                            changed = true;
                        }
                    });
                    if (changed) getGameRef(gameId).update(updates);
                }, 800); 
                return () => clearTimeout(timeoutId);
            }, [playersStr, isHost, gameState.mode, gameId, gameState.teamCount]); 

            const changePlayerTeam = async (uid, newTeam) => {
                await getGameRef(gameId).update({ [`players.${uid}.team`]: newTeam });
            };

            const handleDragStart = (e, uid) => e.dataTransfer.setData('text/plain', uid);
            const handleDragOver = (e, teamName) => { e.preventDefault(); if (dragOverTeam !== teamName) setDragOverTeam(teamName); };
            const handleDragLeave = (e) => { e.preventDefault(); setDragOverTeam(null); };
            const handleDrop = async (e, teamName) => {
                e.preventDefault(); setDragOverTeam(null);
                const uid = e.dataTransfer.getData('text/plain');
                if (uid && gameState.players[uid]?.team !== teamName) await changePlayerTeam(uid, teamName);
            };
            
            const handleHostJoin = async () => {
                if (!hostNickname.trim() || isJoiningHost) return;
                setIsJoiningHost(true);
                try {
                    const gameRef = getGameRef(gameId);
                    let assignedTeam = null;
                    if (gameState.mode === 'team') {
                        const teamTotals = {};
                        for (let i = 1; i <= (gameState.teamCount || 2); i++) teamTotals[`隊伍${i}`] = 0;
                        Object.values(gameState.players || {}).forEach(p => { if (p.team && teamTotals[p.team] !== undefined) teamTotals[p.team]++; });
                        assignedTeam = Object.keys(teamTotals).reduce((a, b) => teamTotals[a] < teamTotals[b] ? a : b);
                    }
                    const newPlayerData = { nickname: hostNickname.trim(), score: 0, joinedAt: Date.now() };
                    if (assignedTeam) newPlayerData.team = assignedTeam;
                    await gameRef.update({ [`players.${user.uid}`]: newPlayerData });
                } catch (error) {
                    alert("加入遊戲失敗，請重試");
                } finally {
                    setIsJoiningHost(false);
                }
            };

            const saveNickname = async () => {
                if (newNickname.trim() && newNickname.trim() !== gameState.players[user.uid].nickname) {
                    await getGameRef(gameId).update({ [`players.${user.uid}.nickname`]: newNickname.trim() });
                }
                setEditingNickname(false);
            };

            const startGame = async () => {
                if (playersArray.length === 0) return alert("至少需要一位玩家才能開始！");
                if (isStarting) return; setIsStarting(true);
                
                await getGameRef(gameId).update({
                    status: 'starting_countdown', countdownDeadline: Date.now() + 3000
                });
            };

            const copyLink = () => {
                const textArea = document.createElement("textarea"); textArea.value = joinUrl; document.body.appendChild(textArea); textArea.select();
                try { document.execCommand('copy'); alert('連結已複製！'); } catch (err) {}
                document.body.removeChild(textArea);
            };

            if (!isHost) {
                return (
                    <div className="min-h-screen bg-gray-900 flex flex-col items-center justify-center p-4 md:p-8 relative overflow-hidden text-white">
                        <div className="absolute top-[-10%] left-[-10%] w-96 h-96 bg-blue-600/20 rounded-full blur-[100px] pointer-events-none"></div>
                        <div className="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-indigo-600/20 rounded-full blur-[100px] pointer-events-none"></div>

                        <div className="bg-white/10 backdrop-blur-xl rounded-[3rem] shadow-2xl p-10 md:p-16 text-center border border-white/20 animate-fade-in-up w-full max-w-md z-10">
                            <div className="relative w-24 h-24 md:w-32 md:h-32 mx-auto mb-8">
                                <div className="absolute inset-0 border-4 md:border-8 border-blue-500/20 rounded-full"></div>
                                <div className="absolute inset-0 border-4 md:border-8 border-blue-400 rounded-full border-t-transparent animate-spin"></div>
                                <Music className="absolute inset-0 m-auto text-blue-400 animate-pulse text-4xl" />
                            </div>
                            
                            <h2 className="text-3xl md:text-4xl font-bold text-white mb-3">等待遊戲開始</h2>
                            <p className="text-lg md:text-xl text-blue-200/80 mb-10 font-medium">請注意看主持人的大螢幕！<br/><span className="text-sm">圖片與資源已在背景載入中...</span></p>
                            
                            <div className="bg-black/30 rounded-2xl p-6 border border-white/10 shadow-inner text-gray-800">
                                <p className="text-sm md:text-base text-gray-400 font-bold mb-2 uppercase tracking-widest">你的參賽身分</p>
                                <p className="text-3xl md:text-4xl font-black text-white">{gameState.players[user.uid]?.nickname}</p>
                                {gameState.mode === 'team' && (
                                    <div className="mt-4 inline-block px-5 py-2 bg-blue-500/30 border border-blue-400 rounded-full text-blue-100 font-bold text-lg shadow-lg">
                                        {gameState.players[user.uid]?.team}
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gray-900 py-8 md:py-12 px-4 md:px-8 font-sans flex flex-col items-center relative">
                    <div className="w-full max-w-7xl grid md:grid-cols-12 gap-6 md:gap-8">
                        <div className="md:col-span-5 lg:col-span-4 space-y-6 md:space-y-8">
                            <div className="bg-white p-6 md:p-8 rounded-3xl shadow-xl text-center text-gray-800">
                                <h2 className="text-lg md:text-xl font-bold text-gray-500 mb-2 md:mb-4 uppercase tracking-wider">遊戲房間代碼 (PIN)</h2>
                                <div className="text-5xl md:text-6xl lg:text-7xl font-black tracking-widest text-blue-600 mb-6 md:mb-8 bg-blue-50 py-4 md:py-6 rounded-2xl border-2 border-blue-200 inline-block w-full">{gameState.pin || gameId}</div>
                                <div className="w-full h-px bg-gray-200 mb-6 md:mb-8"></div>
                                <h3 className="text-base md:text-lg font-bold text-gray-800 mb-4">或掃描 QR Code 加入</h3>
                                <div className="bg-gray-100 p-4 md:p-6 rounded-3xl inline-block mb-4 md:mb-6 border-2 border-dashed border-gray-300"><img src={`https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(joinUrl)}&margin=10`} alt="QR Code" className="w-40 h-40 md:w-48 md:h-48 lg:w-56 lg:h-56 rounded-xl mx-auto object-contain" /></div>
                                <div className="flex items-center gap-2 mt-2">
