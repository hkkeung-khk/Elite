                                            return (
                                                <div key={teamId} className="bg-black/30 rounded-2xl p-5 border-t-4 border-blue-500" onDragOver={(e)=>e.preventDefault()} onDrop={(e)=>handleDrop(e, teamId)}>
                                                    {/* 隊伍名稱編輯 */}
                                                    {editingTeamId === teamId ? (
                                                        <input type="text" autoFocus className="w-full bg-transparent border-b-2 border-white/50 text-xl font-bold outline-none mb-4" value={editNameValue} onChange={e=>setEditNameValue(e.target.value)} onBlur={()=>saveTeamName(teamId)} onKeyDown={e=>e.key==='Enter'&&saveTeamName(teamId)} />
                                                    ) : (
                                                        <h3 className="font-bold text-xl mb-4 cursor-pointer hover:text-blue-300 flex items-center gap-2 group" onClick={()=>{setEditNameValue(teamName); setEditingTeamId(teamId);}}>{teamName} ({members.length}) <Edit size={16} className="opacity-0 group-hover:opacity-100"/></h3>
                                                    )}
                                                    
                                                    <div className="space-y-2 min-h-[50px]">
                                                        {members.map(p => (
                                                            <div key={p.uid} draggable onDragStart={(e)=>e.dataTransfer.setData('text/plain', p.uid)} className="flex items-center justify-between bg-white/10 px-3 py-2 rounded-lg cursor-grab active:cursor-grabbing hover:bg-white/20 group">
                                                                <div className="flex items-center">
                                                                    <GripVertical size={16} className="text-gray-400 mr-2" />
                                                                    {editingUid === p.uid ? (
                                                                        <input type="text" autoFocus className="w-24 bg-transparent border-b border-white outline-none" value={editNameValue} onChange={e=>setEditNameValue(e.target.value)} onBlur={()=>saveNickname(p.uid)} onKeyDown={e=>e.key==='Enter'&&saveNickname(p.uid)}/>
                                                                    ) : (
                                                                        <span className="font-bold truncate">{p.nickname}</span>
                                                                    )}
                                                                </div>
                                                                <div className="flex items-center gap-3">
                                                                    <Edit size={16} className="opacity-0 group-hover:opacity-100 cursor-pointer text-blue-300 hover:text-blue-400" onClick={()=>{setEditNameValue(p.nickname); setEditingUid(p.uid);}}/>
                                                                    {isHost && (
                                                                        <Trash2 size={16} className="opacity-0 group-hover:opacity-100 cursor-pointer text-red-400 hover:text-red-500" onClick={() => removePlayer(p.uid, p.nickname)} title="移除玩家" />
                                                                    )}
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                ) : (
                                    <div className="flex flex-wrap gap-4">
                                        {playersArray.map((p) => (
                                            <div key={p.uid} className="bg-white/20 py-3 px-5 rounded-2xl font-bold text-lg group flex items-center justify-center gap-2 relative min-w-[120px]">
                                                {editingUid === p.uid ? (
                                                    <input type="text" autoFocus className="w-24 bg-transparent border-b border-white outline-none text-center" value={editNameValue} onChange={e=>setEditNameValue(e.target.value)} onBlur={()=>saveNickname(p.uid)} onKeyDown={e=>e.key==='Enter'&&saveNickname(p.uid)}/>
                                                ) : (
                                                    <Fragment>
                                                        <span>{p.nickname}</span>
                                                        <Edit size={16} className="opacity-0 group-hover:opacity-100 cursor-pointer text-blue-300 hover:text-blue-400" onClick={()=>{setEditNameValue(p.nickname); setEditingUid(p.uid);}}/>
                                                        {isHost && (
                                                            <Trash2 size={16} className="opacity-0 group-hover:opacity-100 cursor-pointer text-red-400 hover:text-red-500 absolute right-3" onClick={() => removePlayer(p.uid, p.nickname)} title="移除玩家" />
                                                        )}
                                                    </Fragment>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function StartingCountdown({ gameState }) {
            const [count, setCount] = useState(3);
            useEffect(() => {
                const timer = setInterval(() => {
                    const remaining = Math.max(0, Math.ceil((gameState.countdownDeadline - Date.now()) / 1000));
                    setCount(prev => prev !== remaining ? remaining : prev);
                }, 100);
                return () => clearInterval(timer);
            }, [gameState.countdownDeadline]);
            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-4">
                    <h2 className="text-4xl text-blue-400 font-bold mb-12 tracking-widest">遊戲即將開始</h2>
                    <div className="w-80 h-80 rounded-full border-[16px] border-blue-500 flex items-center justify-center text-[150px] font-black animate-pulse shadow-[0_0_60px_rgba(59,130,246,0.8)] bg-blue-600/20 text-white">{count > 0 ? count : 'GO!'}</div>
                </div>
            );
        }

        function QuestionPreview({ gameState }) {
            const qIndex = gameState.currentQIndex;
            const currentQ = gameState.questions?.[qIndex];
            const [timeLeft, setTimeLeft] = useState(5);
            useEffect(() => {
                const timer = setInterval(() => { setTimeLeft(Math.max(0, Math.ceil((gameState.previewDeadline - Date.now()) / 1000))); }, 100);
                return () => clearInterval(timer);
            }, [gameState.previewDeadline]);

            if (!currentQ) return null;
            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-8">
                    <div className="text-center w-full max-w-4xl animate-fade-in-up">
                        <h2 className="text-3xl text-blue-400 font-bold mb-4 tracking-widest">是時候大展身手了！</h2>
                        <h1 className="text-6xl font-black mb-8 text-white">第 {qIndex + 1} 題</h1>
                        <div className="bg-white rounded-[2rem] p-12 shadow-2xl border-4 border-blue-500 text-gray-800">
                            <h2 className="text-5xl font-black leading-tight"><FormattedText text={currentQ.text} /></h2>
                            {currentQ.imageBase64 && <div className="mt-10 flex justify-center"><img src={currentQ.imageBase64} className="max-h-96 rounded-xl shadow-sm" /></div>}
                        </div>
                        <div className="mt-12 w-32 h-32 mx-auto rounded-full border-8 border-blue-500 flex items-center justify-center text-6xl font-black animate-pulse text-blue-400 bg-gray-800">{timeLeft}</div>
                    </div>
                </div>
            );
        }

        function Gameplay({ user, gameState, gameId, db, appId }) {
            const qIndex = gameState.currentQIndex;
            const currentQ = gameState.questions?.[qIndex] || {};
            const isHost = user?.uid === gameState.hostId;
            const isPlayer = Boolean(gameState.players?.[user?.uid]);
            
            const [timeLeft, setTimeLeft] = useState(parseInt(currentQ.timeLimit || 20));
            const [selectedOptions, setSelectedOptions] = useState([]);
            const [textAnswer, setTextAnswer] = useState('');
            const [hasSubmitted, setHasSubmitted] = useState(false);
            
            const [showMathPanel, setShowMathPanel] = useState(false);
            const [fractionNum, setFractionNum] = useState('');
            const [fractionDen, setFractionDen] = useState('');
            const mathSymbols = ['²', '³', 'ⁿ', '√', '∛', 'π', 'θ', 'α', 'β', '±', '×', '÷', '≈', '≠', '≤', '≥', '∞', '°', '△', '∑'];

            const [showProgressModal, setShowProgressModal] = useState(false);

            // 確保本地同步
            const refs = useRef({ selected: selectedOptions, text: textAnswer, time: timeLeft });
            useEffect(() => { refs.current = { selected: selectedOptions, text: textAnswer, time: timeLeft }; }, [selectedOptions, textAnswer, timeLeft]);

            useEffect(() => { setHasSubmitted(Boolean(gameState.answers?.[qIndex]?.[user.uid])); }, [qIndex, gameState.answers, user.uid]);

            // 倒數計時器
            useEffect(() => {
                const timer = setInterval(() => {
                    const remaining = Math.max(0, Math.ceil((gameState.deadline - Date.now()) / 1000));
                    setTimeLeft(prev => {
                        if (prev !== remaining) return remaining;
                        return prev;
                    });
                    if (remaining <= 0 && !hasSubmitted && isPlayer) submitAnswer(refs.current.selected, refs.current.text, 0);
                }, 200);
                return () => clearInterval(timer);
            }, [gameState.deadline, hasSubmitted, isPlayer]);

            // Enter 送出快捷鍵
            useEffect(() => {
                if (isHost || hasSubmitted) return;
                const handleKeyDown = (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        if (currentQ.type === 'fill' && refs.current.text.trim() !== '') submitAnswer(refs.current.selected, refs.current.text, refs.current.time);
                        else if (currentQ.type !== 'fill' && refs.current.selected.length > 0) submitAnswer(refs.current.selected, refs.current.text, refs.current.time);
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [isHost, hasSubmitted, currentQ.type]);

            const submitAnswer = async (opts = selectedOptions, txt = textAnswer, time = timeLeft) => {
                if (hasSubmitted) return; setHasSubmitted(true);
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId), {
                    [`answers.${qIndex}.${user.uid}`]: { options: opts, textAnswer: txt.trim(), timestamp: Date.now(), timeRemaining: time }
                });
            };

            const toggleOption = (id) => {
                if (hasSubmitted) return;
                if (currentQ.type === 'single') setSelectedOptions([id]);
                else setSelectedOptions(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
            };

            const optionColors = ['bg-blue-100 border-blue-400 text-blue-900', 'bg-yellow-100 border-yellow-400 text-yellow-900', 'bg-purple-100 border-purple-400 text-purple-900', 'bg-cyan-100 border-cyan-400 text-cyan-900', 'bg-fuchsia-100 border-fuchsia-400 text-fuchsia-900', 'bg-orange-100 border-orange-400 text-orange-900'];

            const answeredCount = Object.keys(gameState.answers?.[qIndex] || {}).length;
            const totalPlayers = Object.keys(gameState.players || {}).length;

            return (
                <div className="min-h-screen p-4 md:p-8 flex flex-col items-center justify-center relative text-white">
                    {/* 主持人左上角略過按鈕 */}
                    {isHost && (
                        <button onClick={() => { if(window.confirm("確定略過等待，直接結算成績？")) updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId), { deadline: Date.now() - 1000 }); }} className="absolute top-6 left-6 px-4 py-2 bg-red-500 hover:bg-red-600 rounded-xl font-bold flex items-center shadow-lg"><SkipForward className="mr-2"/> 略過等待</button>
                    )}
                    {/* 主持人左下角結束遊戲按鈕 */}
                    {isHost && (
                        <button onClick={() => { if(window.confirm("確定要立刻結束這場遊戲，直接看總排名嗎？")) updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId), { status: 'finished' }); }} className="absolute bottom-6 left-6 px-4 py-2 bg-gray-700 hover:bg-red-700 rounded-xl font-bold flex items-center border border-gray-500"><XCircle className="mr-2"/> 提前結束遊戲</button>
                    )}

                    <div className="w-full max-w-5xl">
                        <div className="flex justify-between items-center mb-6">
                            <div className="bg-white/10 px-5 py-2 rounded-full font-bold text-lg">第 {qIndex + 1} 題 / 共 {gameState.questions?.length} 題</div>
                            {isPlayer && <div className="bg-white/10 px-5 py-2 rounded-full font-bold text-lg">總分: {gameState.players[user.uid]?.score || 0}</div>}
                        </div>

                        <div className="bg-white rounded-3xl shadow-2xl p-8 mb-8 text-gray-800">
                            <div className="flex justify-between items-start mb-6">
                                <h2 className="text-4xl font-black leading-tight pr-6"><FormattedText text={currentQ.text} /></h2>
                                {/* 雙擊加時 */}
                                <div onDoubleClick={() => { if (isHost) { const extra = prompt("請輸入要增加的秒數 (如 10)：", "10"); if (!isNaN(extra) && extra > 0) updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId), { deadline: gameState.deadline + (extra * 1000) }); } }} className={`w-24 h-24 rounded-full border-8 font-black text-4xl flex items-center justify-center flex-shrink-0 shadow-md ${timeLeft <= 5 ? 'border-red-500 text-red-500 animate-pulse' : 'border-blue-500 text-blue-600'} ${isHost && 'cursor-pointer hover:ring-8'}`} title={isHost ? "雙擊增加時間" : ""}>{timeLeft}</div>
                            </div>
                            {currentQ.imageBase64 && <img src={currentQ.imageBase64} className="max-h-72 object-contain mx-auto rounded-xl border p-2 mb-6" />}
                            
                            {/* 玩家作答區 */}
                            {isPlayer ? (
                                currentQ.type === 'fill' ? (
                                    <div className="mt-4 relative">
                                        <div className="flex gap-3">
                                            <input type="text" value={textAnswer} onChange={e=>setTextAnswer(e.target.value)} disabled={hasSubmitted} className={`flex-1 p-6 text-3xl font-black rounded-2xl border-4 outline-none ${hasSubmitted?'bg-gray-100 text-gray-500 border-gray-200':'border-blue-300 focus:border-blue-500'}`} placeholder="輸入答案 (按 Enter 送出)"/>
                                            {!hasSubmitted && <button onClick={()=>setShowMathPanel(!showMathPanel)} className={`px-6 rounded-2xl border-4 font-serif font-black text-3xl ${showMathPanel?'bg-blue-100 border-blue-400 text-blue-600':'bg-gray-50 border-gray-200 text-gray-500'}`}>√x</button>}
                                        </div>
                                        {textAnswer.includes('/') && <div className="mt-3 p-3 bg-blue-50 border-2 border-blue-200 rounded-xl text-3xl font-black text-blue-800 text-center">預覽: <FormattedText text={textAnswer} /></div>}
                                        
                                        {showMathPanel && !hasSubmitted && (
                                            <div className="absolute top-full right-0 mt-3 bg-white p-5 rounded-2xl shadow-2xl border-2 border-blue-100 z-50">
                                                <div className="grid grid-cols-5 gap-2 mb-3">
                                                    {mathSymbols.map(sym => <button key={sym} onClick={()=>setTextAnswer(p=>p+sym)} className="w-12 h-12 bg-gray-50 border hover:bg-blue-500 hover:text-white rounded-xl text-2xl font-black">{sym}</button>)}
                                                </div>
                                                <div className="flex gap-2 items-center bg-gray-50 p-2 rounded-xl border">
                                                    <span className="font-bold text-sm">分數</span>
                                                    <input type="number" className="w-12 border rounded text-center p-1" value={fractionNum} onChange={e=>setFractionNum(e.target.value)} placeholder="分子"/>
                                                    <span>/</span>
                                                    <input type="number" className="w-12 border rounded text-center p-1" value={fractionDen} onChange={e=>setFractionDen(e.target.value)} placeholder="分母"/>
                                                    <button onClick={()=>{ if(fractionNum&&fractionDen){ setTextAnswer(p=>p+`${fractionNum}/${fractionDen}`); setFractionNum(''); setFractionDen('');} }} className="px-3 py-1 bg-blue-500 text-white rounded font-bold">插入</button>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-2 gap-4">
                                        {(currentQ.options || []).map((opt, i) => {
                                            const isSelected = selectedOptions.includes(opt.id);
                                            const color = optionColors[i % optionColors.length];
                                            return (
                                                <button key={opt.id} onClick={()=>toggleOption(opt.id)} disabled={hasSubmitted} className={`relative p-6 text-2xl font-bold rounded-2xl border-4 transition-transform flex flex-col items-center justify-center min-h-[120px] ${color} ${isSelected ? 'ring-4 ring-offset-2 ring-gray-400 scale-[1.02]' : ''} ${hasSubmitted && !isSelected ? 'opacity-40 grayscale' : ''}`}>
                                                    <span className="absolute top-3 left-4 text-2xl opacity-40 font-black">{String.fromCharCode(65+i)}</span>
                                                    {opt.imageBase64 && <img src={opt.imageBase64} className="max-h-32 mb-2 rounded shadow-sm" />}
                                                    {opt.text && <FormattedText text={opt.text}/>}
                                                </button>
                                            );
                                        })}
                                    </div>
                                )
                            ) : (
                                <div className="p-8 text-center bg-gray-50 rounded-2xl border">
                                    <h3 className="text-2xl font-bold text-gray-500">玩家作答中，請看螢幕等待結果...</h3>
                                </div>
                            )}
                        </div>

                        <div className="text-center">
                            {isPlayer && (
                                !hasSubmitted ? (
                                    <button onClick={()=>submitAnswer()} disabled={currentQ.type==='fill'?!textAnswer.trim():!selectedOptions.length} className="px-16 py-5 bg-gradient-to-r from-blue-600 to-indigo-600 text-white text-2xl font-black rounded-full shadow-xl disabled:opacity-50">確認提交</button>
                                ) : (
                                    <div className="inline-block px-10 py-4 bg-white/20 rounded-full text-xl font-bold border border-white/20"><Clock className="inline animate-spin mr-2"/> 已提交，等待其他玩家</div>
                                )
                            )}
                            {isHost && (
                                <div className="relative">
                                    <button onClick={()=>setShowProgressModal(true)} className="px-8 py-4 bg-blue-900/60 rounded-2xl text-xl font-bold hover:bg-blue-800 transition"><Users className="inline mr-2"/> 全場作答進度：{answeredCount} / {totalPlayers}</button>
                                    {showProgressModal && (
                                        <div className="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4" onClick={()=>setShowProgressModal(false)}>
                                            <div className="bg-white p-8 rounded-3xl max-w-md w-full text-gray-800" onClick={e=>e.stopPropagation()}>
                                                <div className="flex justify-between items-center mb-4 border-b pb-2"><h3 className="text-2xl font-black">作答詳情</h3><button onClick={()=>setShowProgressModal(false)}><X/></button></div>
                                                <div className="space-y-4">
                                                    <div>
                                                        <h4 className="text-green-600 font-bold mb-2">已答題</h4>
                                                        <div className="flex flex-wrap gap-2">{Object.keys(gameState.players).filter(id=>gameState.answers?.[qIndex]?.[id]).map(id=><span key={id} className="bg-green-100 text-green-800 px-3 py-1 rounded-lg font-bold">{gameState.players[id].nickname}</span>)}</div>
                                                    </div>
                                                    <div>
                                                        <h4 className="text-red-500 font-bold mb-2">未答題</h4>
                                                        <div className="flex flex-wrap gap-2">{Object.keys(gameState.players).filter(id=>!gameState.answers?.[qIndex]?.[id]).map(id=><span key={id} className="bg-red-100 text-red-800 px-3 py-1 rounded-lg font-bold">{gameState.players[id].nickname}</span>)}</div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function Result({ user, gameState, gameId, db, appId }) {
            const [isTransitioning, setIsTransitioning] = useState(false);
            const qIndex = gameState.currentQIndex;
            const currentQ = gameState.questions?.[qIndex] || {}; 
            const answers = gameState.answers?.[qIndex] || {};
            const isHost = user?.uid === gameState.hostId;
            const isPlayer = Boolean(gameState.players?.[user?.uid]);
            const totalPlayers = Object.keys(gameState.players || {}).length;

            const myData = gameState.players?.[user?.uid];
            const pointsEarned = answers[user?.uid]?.pointsEarned || 0;
            const myTeamTotal = useMemo(() => {
                if(!myData || gameState.mode !== 'team') return 0;
                return Object.values(gameState.players).filter(p=>p.team===myData.team).reduce((sum, p)=>sum+p.score, 0);
            }, [gameState.players, myData]);

            const stats = useMemo(() => {
                let isCorrect = false;
                let optionStats = []; let textStats = [];
                if (currentQ.type === 'fill') {
                    const validAnswers = (currentQ.fillAnswers || []).map(a => currentQ.caseSensitive ? a.trim() : a.trim().toLowerCase()).filter(a => a !== '');
                    const userText = currentQ.caseSensitive ? (answers[user?.uid]?.textAnswer || '').trim() : (answers[user?.uid]?.textAnswer || '').trim().toLowerCase();
                    isCorrect = validAnswers.includes(userText) && userText !== '';

                    const counts = {};
                    Object.values(answers).forEach(ans => { const t = (ans.textAnswer || '(未答)').trim(); counts[t] = (counts[t] || 0) + 1; });
                    textStats = Object.entries(counts).map(([text, count]) => ({ text, count, percentage: totalPlayers ? Math.round((count / totalPlayers) * 100) : 0 })).sort((a, b) => b.count - a.count);
                } else if (currentQ.type) {
                    const correctIds = (currentQ.options || []).filter(o => o.isCorrect).map(o => o.id).sort();
                    const myAns = [...(answers[user?.uid]?.options || [])].sort();
                    isCorrect = JSON.stringify(myAns) === JSON.stringify(correctIds);

                    optionStats = (currentQ.options || []).map(opt => {
                        let count = 0;
                        Object.values(answers).forEach(ans => { if ((ans.options || []).includes(opt.id)) count++; });
                        return { ...opt, count, percentage: totalPlayers ? Math.round((count / totalPlayers) * 100) : 0 };
                    });
                }
                return { isCorrect, optionStats, textStats, myAnswer: answers[user?.uid]?.options || [] };
            }, [currentQ, answers, user?.uid, totalPlayers]);

            const nextAction = async () => {
                if (isTransitioning) return; setIsTransitioning(true);
                const nextState = qIndex < (gameState.questions?.length || 0) - 1 ? 'interim_leaderboard' : 'finished';
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId), { status: nextState });
            };

            // 主持人 Enter 鍵快轉
            useEffect(() => {
                if (!isHost) return;
                const handleKey = (e) => { if (e.key === 'Enter') { e.preventDefault(); nextAction(); } };
                window.addEventListener('keydown', handleKey);
                return () => window.removeEventListener('keydown', handleKey);
            }, [isHost, isTransitioning]);

            return (
                <div className="min-h-screen p-4 md:p-8 flex flex-col items-center justify-center relative text-white">
                    {isHost && <button onClick={() => { if(window.confirm("結束這場遊戲，看總排名？")) updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId), { status: 'finished' }); }} className="absolute bottom-6 left-6 px-4 py-2 bg-gray-700 hover:bg-red-700 rounded-xl font-bold flex items-center border border-gray-500"><XCircle className="mr-2"/> 提前結束遊戲</button>}
                    
                    <div className="w-full max-w-4xl">
                        {isPlayer && (
                            <div className={`rounded-3xl p-10 mb-8 text-center shadow-2xl transform transition-transform scale-100 ${stats.isCorrect ? 'bg-green-500' : 'bg-red-500'}`}>
                                <div className="flex justify-center mb-4">{stats.isCorrect ? <CheckCircle2 size={80}/> : <XCircle size={80}/>}</div>
                                <h2 className="text-5xl font-black mb-4">{stats.isCorrect ? '答對了！' : '答錯了...'}</h2>
                                <p className="text-3xl font-bold mb-4">{stats.isCorrect ? `本次獲得 +${pointsEarned} 分` : '獲得 0 分'}</p>
                                <p className="text-xl font-bold bg-black/20 inline-block px-6 py-2 rounded-full">{gameState.mode === 'team' ? '隊伍總分' : '個人總分'}: {gameState.mode === 'team' ? myTeamTotal : myData?.score} 分</p>
                            </div>
                        )}

                        {isHost ? (
                            <div className="bg-white rounded-3xl p-10 shadow-2xl mb-8 text-gray-800">
                                <h3 className="text-3xl font-black mb-6"><FormattedText text={currentQ.text} /></h3>
                                {currentQ.imageBase64 && <img src={currentQ.imageBase64} className="max-h-64 object-contain mx-auto mb-6 rounded-xl border p-2" />}
                                
                                <div className="space-y-6">
                                    {currentQ.type === 'fill' ? (
                                        <>
                                            <div className="p-6 bg-green-50 border-4 border-green-200 rounded-2xl">
                                                <p className="text-lg text-green-700 font-bold mb-2">正確答案 {currentQ.caseSensitive && <span className="bg-green-200 text-green-900 px-2 py-1 rounded text-sm">區分大小寫</span>}</p>
                                                <p className="text-3xl font-black text-green-800 flex flex-wrap gap-2">{(currentQ.fillAnswers||[]).map((a,i)=><Fragment key={i}><FormattedText text={a}/>{i<currentQ.fillAnswers.length-1?' 或 ':''}</Fragment>)}</p>
                                            </div>
                                            <div className="space-y-4">
                                                {stats.textStats.map((s, idx) => {
                                                    const valid = (currentQ.fillAnswers||[]).map(a=>currentQ.caseSensitive?a.trim():a.trim().toLowerCase());
                                                    const st = currentQ.caseSensitive ? s.text.trim() : s.text.trim().toLowerCase();
                                                    const isCorr = valid.includes(st) && st !== '';
                                                    return (
                                                        <div key={idx} className="relative">
                                                            <div className={`flex justify-between items-center p-5 rounded-2xl border-4 z-10 relative bg-white/50 ${isCorr?'border-green-400':'border-gray-200'}`}>
                                                                <div className="font-bold text-xl flex items-center gap-3">{isCorr && <CheckCircle2 className="text-green-500"/>} <span className={isCorr?'text-green-800':'text-gray-700'}><FormattedText text={s.text}/></span></div>
                                                                <div className="font-black text-gray-600 text-xl"><Users className="inline mr-2"/> {s.count} 人 ({s.percentage}%)</div>
                                                            </div>
                                                            <div className={`absolute inset-y-0 left-0 rounded-2xl opacity-20 ${isCorr?'bg-green-500':'bg-gray-400'}`} style={{width: `${s.percentage}%`}}></div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </>
                                    ) : (
                                        stats.optionStats.map((opt, i) => (
                                            <div key={opt.id} className="relative mb-4">
                                                <div className={`flex justify-between items-center p-5 rounded-2xl border-4 z-10 relative bg-white/50 ${opt.isCorrect?'border-green-400':'border-gray-200'}`}>
                                                    <div className="font-bold text-xl flex items-center gap-3"><span className="text-gray-400 font-black text-2xl">{String.fromCharCode(65+i)}.</span> {opt.isCorrect && <CheckCircle2 className="text-green-500"/>} <span className={opt.isCorrect?'text-green-800':'text-gray-700'}><FormattedText text={opt.text||'(圖片)'}/></span></div>
                                                    <div className="font-black text-gray-600 text-xl"><Users className="inline mr-2"/> {opt.count} 人 ({opt.percentage}%)</div>
                                                </div>
                                                <div className={`absolute inset-y-0 left-0 rounded-2xl opacity-20 ${opt.isCorrect?'bg-green-500':'bg-gray-400'}`} style={{width: `${opt.percentage}%`}}></div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        ) : (
                            <div className="bg-white/10 rounded-3xl p-10 text-center border border-white/20">
                                <Clock className="animate-spin mx-auto mb-6 text-blue-400 w-16 h-16" />
                                <h3 className="text-3xl font-bold">請看大螢幕等待排名更新...</h3>
                            </div>
                        )}

                        {isHost && (
                            <div className="text-center">
                                <button onClick={nextAction} disabled={isTransitioning} className="px-12 py-5 bg-gradient-to-r from-blue-600 to-indigo-600 text-white text-2xl font-black rounded-full shadow-xl">
                                    {isTransitioning ? "載入中..." : `查看排名 (Enter) ${qIndex < (gameState.questions?.length || 0) - 1 ? '➡' : '🏆'}`}
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const useRankings = (gameState, answers, userUid) => {
            return useMemo(() => {
                const players = Object.entries(gameState.players || {}).map(([uid, p]) => ({ uid, ...p }));
                
                // 個人數據
                const pData = players.map(p => {
                    const earned = answers?.[p.uid]?.pointsEarned || 0;
                    return { id: p.uid, name: p.nickname, currScore: p.score || 0, prevScore: (p.score || 0) - earned, isMe: p.uid === userUid };
                });
                const pInit = [...pData].sort((a,b)=>b.prevScore - a.prevScore);
                const pFinal = [...pData].sort((a,b)=>b.currScore - a.currScore);

                // 隊伍數據
                const tData = [];
                if (gameState.mode === 'team') {
                    const teams = {};
                    Object.keys(gameState.teamNames || {}).forEach(tid => {
                        teams[tid] = { id: tid, name: gameState.teamNames[tid], currScore: 0, prevScore: 0, members: [] };
                    });
                    players.forEach(p => {
                        if (p.team && teams[p.team]) {
                            const earned = answers?.[p.uid]?.pointsEarned || 0;
                            teams[p.team].currScore += p.score || 0;
                            teams[p.team].prevScore += ((p.score || 0) - earned);
                            teams[p.team].members.push(p.nickname);
                        }
                    });
                    tData.push(...Object.values(teams));
                }
                const tInit = [...tData].sort((a,b)=>b.prevScore - a.prevScore);
                const tFinal = [...tData].sort((a,b)=>b.currScore - a.currScore);

                return { pData, pInit, pFinal, tData, tInit, tFinal };
            }, [gameState.players, gameState.teamNames, answers, userUid, gameState.mode]);
        };

        // 動畫排行榜組件 (包含柱狀圖與名單)
        const AnimatedRankings = ({ isTeamMode, ranks, phase, isFinal = false }) => {
            const { pInit, pFinal, tInit, tFinal } = ranks;
            const [selectedTeam, setSelectedTeam] = useState(null);
            
            const maxScore = isTeamMode ? Math.max(...ranks.tData.map(t=>Math.max(t.currScore, t.prevScore)), 1) : Math.max(...ranks.pData.map(p=>Math.max(p.currScore, p.prevScore)), 1);
            const podiumColors = ['bg-red-600 shadow-red-500/50', 'bg-blue-500 shadow-blue-500/50', 'bg-yellow-400 shadow-yellow-500/50', 'bg-green-500 shadow-green-500/50', 'bg-purple-500', 'bg-cyan-500'];

            const getOrderIndex = (id, type) => {
                if(type === 'team') return phase === 'reordered' ? tFinal.findIndex(t=>t.id===id) : tInit.findIndex(t=>t.id===id);
                return phase === 'reordered' ? pFinal.findIndex(p=>p.id===id) : pInit.findIndex(p=>p.id===id);
            };

            return (
                <div className="w-full flex flex-col gap-10">
                    {/* 隊伍柱狀圖 */}
                    {isTeamMode && (
                        <div className="flex flex-col lg:flex-row gap-6 items-start justify-center">
                            {/* 第一名揭曉卡 */}
                            {(phase === 'reordered' || isFinal) && tFinal.length > 0 && (
                                <div className="lg:w-1/4 w-full bg-gradient-to-b from-yellow-400/20 to-yellow-600/5 border-2 border-yellow-400 rounded-3xl p-6 text-center animate-fade-in-up min-h-[300px] flex flex-col items-center justify-center">
                                    <Trophy className="text-yellow-400 mx-auto mb-4" size={64}/>
                                    <h4 className="text-yellow-300 font-black text-xl mb-2">目前領先</h4>
                                    <h3 className="text-white font-black text-4xl mb-6">{tFinal[0].name}</h3>
                                    <div className="flex flex-wrap justify-center gap-2">{tFinal[0].members.map(n=><span key={n} className="bg-white/20 px-3 py-1 rounded-lg font-bold">{n}</span>)}</div>
                                </div>
                            )}
                            
                            <div className="flex-1 w-full bg-white/10 rounded-3xl p-8 border border-white/20 overflow-x-auto custom-scrollbar">
                                <h3 className="text-center font-black text-2xl mb-8 tracking-widest text-blue-300">隊伍總排名</h3>
                                <div className="relative w-full h-80 border-b-4 border-white/30" style={{minWidth: `${ranks.tData.length * 80}px`}}>
                                    {ranks.tData.map((team, idx) => {
                                        const oIdx = getOrderIndex(team.id, 'team');
                                        const left = `${(oIdx * 100) / ranks.tData.length}%`;
                                        const width = `${100 / ranks.tData.length}%`;
                                        const color = podiumColors[idx % podiumColors.length] || 'bg-gray-500';
                                        
                                        return (
                                            <div key={team.id} className="absolute bottom-0 flex flex-col items-center justify-end h-full transition-all duration-1000 ease-in-out cursor-pointer group" style={{left, width}} onClick={()=>setSelectedTeam(selectedTeam===team.id?null:team.id)}>
                                                {selectedTeam === team.id && (
                                                    <div className="absolute bottom-full mb-10 bg-white text-gray-800 p-3 rounded-xl shadow-2xl z-50 w-max text-center">
                                                        <div className="font-bold border-b pb-1 mb-1">{team.name} 隊員</div>
                                                        {team.members.map(m=><div key={m} className="font-bold text-sm">{m}</div>)}
                                                    </div>
                                                )}
                                                <span className="font-black text-3xl mb-3"><RollingNumber start={team.prevScore} end={team.currScore} phase={phase}/></span>
                                                <div className={`w-[80%] mx-auto ${color} shadow-lg relative flex items-end justify-center pb-4 transition-all`} style={{height: Math.max(((phase==='reordered'?team.currScore:team.prevScore)/maxScore)*100, 8)+'%'}}>
                                                    <span className="font-bold text-lg whitespace-nowrap text-white text-shadow">{team.name}</span>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                                <p className="text-center text-white/50 text-sm mt-4 font-bold">👆 點擊柱子查看名單</p>
                            </div>
                        </div>
                    )}

                    {/* 個人排名列表 */}
                    <div className="max-w-4xl mx-auto w-full bg-white/10 rounded-3xl p-8 border border-white/20">
                        <h3 className="text-center font-black text-2xl mb-8 tracking-widest text-blue-300">玩家個人排名</h3>
                        <div className="relative" style={{height: `${ranks.pData.length * 80}px`}}>
                            {ranks.pData.map((p, idx) => {
                                const oIdx = getOrderIndex(p.id, 'player');
                                let badge = 'bg-white/20'; let border = 'border-white/10 bg-white/5';
                                if(oIdx===0){ badge='bg-yellow-400 text-yellow-900'; border='border-yellow-400/60 bg-yellow-400/20'; }
                                else if(oIdx===1){ badge='bg-gray-300 text-gray-900'; border='border-gray-300/60 bg-gray-300/20'; }
                                else if(oIdx===2){ badge='bg-amber-600 text-white'; border='border-amber-600/60 bg-amber-600/20'; }
                                
                                return (
                                    <div key={p.id} className={`absolute w-full flex items-center justify-between p-5 rounded-2xl border-2 transition-all duration-1000 ease-in-out ${border} ${p.isMe?'ring-4 ring-blue-400 shadow-[0_0_20px_rgba(96,165,250,0.6)]':''}`} style={{top: `${oIdx * 80}px`}}>
                                        <div className="flex items-center gap-4">
                                            <div className={`w-10 h-10 rounded-full flex items-center justify-center font-black text-xl ${badge}`}>{oIdx+1}</div>
                                            <span className="font-bold text-2xl">{p.name} {p.isMe&&<span className="ml-2 text-sm bg-blue-500 px-2 py-1 rounded-full text-white">你</span>}</span>
                                        </div>
                                        <div className="font-black text-3xl"><RollingNumber start={p.prevScore} end={p.currScore} phase={phase}/> <span className="text-lg font-medium text-white/60">分</span></div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        function InterimLeaderboard({ user, gameState, gameId, db, appId }) {
            const [isTransitioning, setIsTransitioning] = useState(false);
            const isHost = user?.uid === gameState.hostId;
            const qIndex = gameState.currentQIndex;
            const isTeamMode = gameState.mode === 'team';
            
            const [phase, setPhase] = useState('initial');
            useEffect(() => {
                const t1 = setTimeout(() => setPhase('rolling'), 1000);
                const t2 = setTimeout(() => setPhase('reordered'), 2500);
                return () => { clearTimeout(t1); clearTimeout(t2); };
            }, []);

            const ranks = useRankings(gameState, gameState.answers?.[qIndex], user?.uid);
            
            // 玩家自己的數據展示
            const myTData = isTeamMode ? ranks.tData.find(t=>t.id===gameState.players[user?.uid]?.team) : null;
            const myPData = ranks.pData.find(p=>p.id===user?.uid);
            
            const nextAction = async () => {
                if (isTransitioning) return; setIsTransitioning(true);
                const nextQ = gameState.questions?.[qIndex + 1];
                if (!nextQ) { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId), { status: 'finished' }); return; }
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId), { status: 'preview', currentQIndex: qIndex + 1, previewDeadline: Date.now() + 5000 });
            };

            useEffect(() => {
                if (!isHost) return;
                const hk = (e) => { if(e.key==='Enter'){ e.preventDefault(); nextAction(); } };
                window.addEventListener('keydown', hk);
                return () => window.removeEventListener('keydown', hk);
            }, [isHost, isTransitioning, qIndex, gameState.questions]); 

            return (
                <div className="min-h-screen p-4 md:p-8 flex flex-col items-center overflow-x-hidden relative text-white">
                    {isHost && <button onClick={() => { if(window.confirm("確定結束遊戲看總排名？")) updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId), { status: 'finished' }); }} className="absolute bottom-6 left-6 px-4 py-2 bg-gray-700 hover:bg-red-700 rounded-xl font-bold flex items-center border border-gray-500 z-[100]"><XCircle className="mr-2"/> 提前結束遊戲</button>}
                    
                    <div className="w-full max-w-7xl">
                        <div className="text-center mb-10 interim-item">
                            <h2 className="text-3xl font-bold text-blue-400 mb-2 tracking-widest">第 {qIndex + 1} 題結束</h2>
                            <h1 className="text-6xl font-black">目前分數排名</h1>
                        </div>

                        {isHost ? (
                            <AnimatedRankings isTeamMode={isTeamMode} ranks={ranks} phase={phase} />
                        ) : (
                            <div className="max-w-2xl mx-auto bg-white/10 rounded-[3rem] shadow-2xl p-12 text-center border border-white/20 interim-item">
                                {isTeamMode && (
                                    <div className="mb-8 border-b border-white/20 pb-8">
                                        <h3 className="text-3xl font-bold mb-4">隊伍排名</h3>
                                        <div className="text-7xl font-black text-yellow-400 mb-4">第 {phase==='reordered' ? ranks.tFinal.findIndex(t=>t.id===myTData?.id)+1 : ranks.tInit.findIndex(t=>t.id===myTData?.id)+1} 名</div>
                                        <div className="text-3xl font-bold">隊伍總分: <RollingNumber start={myTData?.prevScore||0} end={myTData?.currScore||0} phase={phase}/></div>
                                        <div className="mt-4 bg-blue-500/30 px-6 py-2 rounded-full font-bold text-xl inline-block">{myTData?.name}</div>
                                    </div>
                                )}
                                <div>
                                    <h3 className="text-2xl font-bold text-white/70 mb-4">你的個人排名</h3>
                                    <div className="text-5xl font-black text-blue-300 mb-4">第 {phase==='reordered' ? ranks.pFinal.findIndex(p=>p.id===myPData?.id)+1 : ranks.pInit.findIndex(p=>p.id===myPData?.id)+1} 名</div>
                                    <div className="text-2xl font-bold text-white/90">個人總分: <RollingNumber start={myPData?.prevScore||0} end={myPData?.currScore||0} phase={phase}/></div>
                                </div>
                            </div>
                        )}

                        <div className="text-center mt-12 interim-item">
                            {isHost ? (
                                <button onClick={nextAction} disabled={isTransitioning} className="px-16 py-6 bg-gradient-to-r from-blue-600 to-indigo-600 text-white text-3xl font-black rounded-full shadow-2xl hover:-translate-y-1 transition disabled:opacity-50">
                                    {isTransitioning ? "載入中..." : "下一道題 (Enter) ➡"}
                                </button>
                            ) : (
                                <div className="text-xl font-bold text-white/60">等待主持人開啟下一題...</div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const Confetti = () => {
            const canvasRef = useRef(null);
            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                canvas.width = window.innerWidth; canvas.height = window.innerHeight;
                
                const particles = [];
                const colors = ['#facc15', '#ef4444', '#3b82f6', '#10b981', '#a855f7'];
                for(let i=0; i<150; i++) {
                    particles.push({
                        x: Math.random() * canvas.width, y: Math.random() * canvas.height - canvas.height,
                        w: Math.random() * 10 + 5, h: Math.random() * 10 + 5,
                        dx: Math.random() * 4 - 2, dy: Math.random() * 4 + 2,
                        color: colors[Math.floor(Math.random() * colors.length)],
                        tilt: Math.random() * 10, tiltAngle: 0, tiltAngleInc: (Math.random() * 0.07) + 0.05
                    });
                }
                
                let animationId;
                const startTime = Date.now();
                const render = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    let activeCount = 0;
                    
                    particles.forEach(p => {
                        p.tiltAngle += p.tiltAngleInc;
                        p.y += p.dy; p.x += Math.sin(p.tiltAngle) * 2;
                        
                        // 7秒內循環，超過7秒就讓它掉出去不重置
                        if (Date.now() - startTime < 7000) {
                            if(p.y > canvas.height) { p.x = Math.random()*canvas.width; p.y = -20; }
                        }
                        
                        if (p.y <= canvas.height) activeCount++;

                        ctx.beginPath();
                        ctx.lineWidth = p.w; ctx.strokeStyle = p.color;
                        ctx.moveTo(p.x + p.tilt + p.w, p.y);
                        ctx.lineTo(p.x + p.tilt, p.y + p.h);
                        ctx.stroke();
                    });
                    
                    if(activeCount > 0) animationId = requestAnimationFrame(render);
                };
                render();
                return () => cancelAnimationFrame(animationId);
            }, []);
            return <canvas ref={canvasRef} className="fixed inset-0 pointer-events-none z-50"/>;
        };

        function Leaderboard({ gameState, user, gameId, db, appId, onBack, onReplay }) {
            const isHost = user?.uid === gameState.hostId;
            const isTeamMode = gameState.mode === 'team';
            // 由於是最終畫面，把當前答案傳 null，因為分數已經全結算了
            const ranks = useRankings(gameState, null, user?.uid); 
            
            const exportGameStats = () => {
                const { questions, answers } = gameState;
                let csvContent = "\uFEFF題目序號,題目內容,類型,作答人數,正確人數,正確率(%),最快(秒),最慢(秒),平均(秒),選項與答案統計分析\n";

                (questions || []).forEach((q, qIndex) => {
                    const qAnswers = answers?.[qIndex] || {};
                    const answeredUids = Object.keys(qAnswers);
                    const count = answeredUids.length;

                    if (count === 0) {
                        csvContent += `${qIndex + 1},"${(q.text || '').replace(/"/g, '""')}",${q.type},0,0,0,N/A,N/A,N/A,無人作答\n`;
                        return;
                    }

                    let correct = 0; let times = []; let oCounts = {}; let tCounts = {};
                    if (q.type !== 'fill') (q.options||[]).forEach((o,i) => oCounts[o.id] = { t: o.text||`選項${String.fromCharCode(65+i)}`, c: 0, ic: o.isCorrect });

                    answeredUids.forEach(uid => {
                        const ans = qAnswers[uid];
                        if (ans.responseTime !== undefined) times.push(ans.responseTime);
                        else if (ans.timeRemaining !== undefined) times.push(Math.max(0, (q.timeLimit||20) - ans.timeRemaining));

                        if (q.type === 'fill') {
                            const valids = (q.fillAnswers || []).map(a=>q.caseSensitive?a.trim():a.trim().toLowerCase());
                            const ut = q.caseSensitive ? (ans.textAnswer||'').trim() : (ans.textAnswer||'').trim().toLowerCase();
                            if (valids.includes(ut) && ut !== '') correct++;
                            tCounts[ans.textAnswer||'(未答)'] = (tCounts[ans.textAnswer||'(未答)']||0) + 1;
                        } else {
                            const cIds = (q.options||[]).filter(o=>o.isCorrect).map(o=>o.id).sort();
                            const sel = [...(ans.options||[])].sort();
                            if (JSON.stringify(sel) === JSON.stringify(cIds)) correct++;
                            sel.forEach(id => { if (oCounts[id]) oCounts[id].c++; });
                        }
                    });

                    const rate = Math.round((correct/count)*100);
                    let min='N/A', max='N/A', avg='N/A';
                    if (times.length > 0) { min=Math.min(...times).toFixed(1); max=Math.max(...times).toFixed(1); avg=(times.reduce((a,b)=>a+b,0)/times.length).toFixed(1); }

                    let analysis = "";
                    if (q.type === 'fill') analysis = Object.entries(tCounts).map(([t,c])=>`[${t}]: ${c}人(${Math.round(c/count*100)}%)`).join(' | ');
                    else analysis = Object.values(oCounts).map(o=>`[${o.t}${o.ic?'(正確)':''}] ${o.c}人(${Math.round(o.c/count*100)}%)`).join(' | ');

                    csvContent += `${qIndex + 1},"${(q.text || '').replace(/"/g, '""')}",${q.type},${count},${correct},${rate},${min},${max},${avg},"${analysis.replace(/"/g, '""')}"\n`;
                });

                csvContent += "\n\n名次,玩家暱稱,所屬隊伍,總分\n";
                ranks.pFinal.forEach((p, idx) => csvContent += `${idx + 1},"${(p.name || '').replace(/"/g, '""')}",${gameState.players[p.id]?.team ? gameState.teamNames?.[gameState.players[p.id].team] : '-'},${p.currScore}\n`);

                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a'); link.href = url; link.download = `遊戲報表_${new Date().getTime()}.csv`;
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
            };

            const handleLeaveAndDestroy = async (actionFn) => {
                if (isHost) {
                    if(!window.confirm("離開後將會徹底刪除這個遊戲房間的所有數據（釋放雲端空間），連結也會立刻失效。\n\n確定要離開嗎？")) return;
                    try { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId)); } catch (e) { console.error(e); }
                }
                actionFn();
            };

            return (
                <div className="min-h-screen py-12 px-4 flex flex-col items-center relative text-white">
                    <Confetti />
                    <div className="w-full max-w-7xl z-10">
                        <div className="text-center mb-16 leaderboard-item">
                            <Trophy className="mx-auto text-yellow-400 mb-6 drop-shadow-[0_0_30px_rgba(250,204,21,0.8)]" size={100} />
                            <h1 className="text-7xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-yellow-600 mb-4">遊戲圓滿結束</h1>
                            <p className="text-gray-400 text-2xl font-bold">感謝所有天才的參與！</p>
                        </div>

                        <AnimatedRankings isTeamMode={isTeamMode} ranks={ranks} phase={'reordered'} isFinal={true} />

                        <div className="mt-16 flex flex-wrap justify-center gap-6 leaderboard-item" style={{animationDelay: '1s'}}>
                            {isHost ? (
                                <Fragment>
                                    <button onClick={exportGameStats} className="px-8 py-5 bg-emerald-600 hover:bg-emerald-700 rounded-2xl text-xl font-bold flex items-center shadow-lg"><Download className="mr-3" /> 下載答題數據報表</button>
                                    <button onClick={()=>handleLeaveAndDestroy(onReplay)} className="px-8 py-5 bg-gradient-to-r from-blue-600 to-indigo-600 rounded-2xl text-xl font-bold shadow-lg">返回題庫並建立新遊戲</button>
                                    <button onClick={()=>handleLeaveAndDestroy(onBack)} className="px-8 py-5 bg-white/10 hover:bg-white/20 border border-white/20 rounded-2xl text-xl font-bold">返回首頁並清除房間</button>
                                </Fragment>
                            ) : (
                                <button onClick={onBack} className="px-10 py-5 bg-white/10 hover:bg-white/20 border border-white/20 rounded-2xl text-2xl font-bold">返回首頁</button>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        /* 渲染入口 */
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
