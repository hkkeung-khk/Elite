<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>數學天才培養室</title>
    
    <!-- 引入 Tailwind CSS 進行快速樣式排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 Babel 讓瀏覽器可以直接編譯 React (JSX) 語法 -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 定義全域樣式與動畫 -->
    <style>
        /* 縮小整個介面 5% 以適配畫面 */
        html { font-size: 95%; }
        
        body { 
            background-color: #111827; /* Tailwind gray-900 */
            color: white;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* 自定義捲軸 */
        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.5); }

        /* 動畫定義 */
        .animate-fade-in-up { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeInUp { 
            0% { opacity: 0; transform: translateY(30px) scale(0.95); } 
            100% { opacity: 1; transform: translateY(0) scale(1); } 
        }
        
        .interim-item { opacity: 0; animation: slideRightFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideRightFade { 
            0% { opacity: 0; transform: translateX(-40px); } 
            100% { opacity: 1; transform: translateX(0); } 
        }

        .leaderboard-item { opacity: 0; animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>

    <!-- 
        使用 Import Maps：這是現代瀏覽器原生支援模組 (ES Modules) 的方法。
        我們透過 esm.sh CDN 直接載入 React、Lucide 圖示庫，
        並使用 Google 官方 gstatic CDN 載入 Firebase 確保相容性。
    -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.344.0",
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js"
        }
    }
    </script>
</head>
<body>
    <!-- React 應用的掛載點 -->
    <div id="root"></div>

    <!-- 
        主程式碼區塊：
        使用 type="text/babel" 讓 Babel 編譯 JSX，
        使用 data-type="module" 允許使用 import 語法引入套件。
    -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo, useRef, useCallback, Fragment } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Play, Plus, Minus, Trash2, Users, Clock, Trophy, Share2, Copy, CheckCircle2, XCircle, ArrowRight, Download, Upload, FileText, Edit, ImagePlus, X, GripVertical, Volume2, VolumeX, Music, Keyboard, SkipForward } from 'lucide-react';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, deleteDoc, deleteField } from 'firebase/firestore';

        // --- Firebase 初始化 ---
        const firebaseConfig = {
            apiKey: "AIzaSyCXwi1vuQ7yyIrAgPxK9P4r9MneAJqXnqU",
            authDomain: "etlite-f7c2a.firebaseapp.com",
            databaseURL: "https://etlite-f7c2a-default-rtdb.firebaseio.com",
            projectId: "etlite-f7c2a",
            storageBucket: "etlite-f7c2a.firebasestorage.app",
            messagingSenderId: "400273321762",
            appId: "1:400273321762:web:e619520536fec308a17f7b",
            measurementId: "G-Q524BFZFB8"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'etlite-f7c2a'; 

        // 安全更新網址工具 (防止 SecurityError 崩潰)
        const safeUpdateUrl = (gameId) => {
            try {
                if (window.self !== window.top) return; 
                const url = new URL(window.location.href);
                if (gameId) url.searchParams.set('gameId', gameId);
                else url.searchParams.delete('gameId');
                window.history.replaceState(null, '', url.toString());
            } catch (e) {
                console.warn("環境不支援更新網址列，使用純 React 路由。");
            }
        };

        // 圖片自動壓縮工具
        const compressImage = (file, maxWidth = 600) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const scaleSize = maxWidth / img.width;
                        const width = img.width > maxWidth ? maxWidth : img.width;
                        const height = img.width > maxWidth ? img.height * scaleSize : img.height;
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.6));
                    };
                };
            });
        };

        // CSV 解析工具 (支援處理引號與換行)
        const parseCSV = (text) => {
            const rows = [];
            let current = '';
            let row = [];
            let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                if (char === '"') {
                    if (inQuotes && text[i + 1] === '"') { current += '"'; i++; } 
                    else { inQuotes = !inQuotes; }
                } else if (char === ',' && !inQuotes) {
                    row.push(current); current = '';
                } else if ((char === '\n' || char === '\r') && !inQuotes) {
                    if (char === '\r' && text[i + 1] === '\n') i++; 
                    row.push(current);
                    if (row.some(col => col !== '')) rows.push(row);
                    row = []; current = '';
                } else {
                    current += char;
                }
            }
            if (current || row.length > 0) {
                row.push(current);
                if (row.some(col => col !== '')) rows.push(row);
            }
            return rows;
        };

        // 數字滾動動畫元件
        const RollingNumber = ({ start, end, phase }) => {
            const [value, setValue] = useState(start);
            useEffect(() => {
                if (phase === 'initial') setValue(start);
                else if (phase === 'rolling' || phase === 'reordered') {
                    let startTimestamp = null;
                    const duration = 1500;
                    const step = (timestamp) => {
                        if (!startTimestamp) startTimestamp = timestamp;
                        const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                        const ease = 1 - Math.pow(1 - progress, 4);
                        setValue(Math.floor(start + (end - start) * ease));
                        if (progress < 1) window.requestAnimationFrame(step);
                        else setValue(end);
                    };
                    window.requestAnimationFrame(step);
                }
            }, [phase, start, end]);
            return <Fragment>{value}</Fragment>;
        };

        // 數學排版引擎 (自動轉換分數格式)
        const FormattedText = ({ text }) => {
            if (typeof text !== 'string') return text;
            const fractionRegex = /(\d+\/\d+)/g;
            const parts = text.split(fractionRegex);
            return (
                <Fragment>
                    {parts.map((part, index) => {
                        const match = part.match(/^(\d+)\/(\d+)$/);
                        if (match) {
                            return (
                                <span key={index} className="inline-flex flex-col items-center justify-center align-middle mx-1 font-bold" style={{ verticalAlign: 'middle', lineHeight: '1.1' }}>
                                    <span className="border-b-[0.12em] border-current px-1 pb-[0.1em] w-full text-center text-[0.8em]">{match[1]}</span>
                                    <span className="pt-[0.1em] px-1 w-full text-center text-[0.8em]">{match[2]}</span>
                                </span>
                            );
                        }
                        return <span key={index}>{part}</span>;
                    })}
                </Fragment>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [gameId, setGameId] = useState(null);
            const [gameState, setGameState] = useState(null);
            const [loading, setLoading] = useState(true);
            const [view, setView] = useState('join');
            const [reusableQuestions, setReusableQuestions] = useState([]); // 題庫預設空白

            // 初始化 Firebase 匿名登入
            useEffect(() => {
                const initAuth = async () => {
                    try { await signInAnonymously(auth); } 
                    catch (err) { console.error("Firebase 匿名登入失敗:", err); } 
                    finally { setUser(auth.currentUser); setLoading(false); }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            // 讀取網址的 gameId
            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const id = params.get('gameId');
                if (id) setGameId(id);
            }, []);

            // 監聽遊戲房間狀態與銷毀事件
            useEffect(() => {
                if (!user || !gameId) return;
                const gameRef = doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId);
                const unsubscribe = onSnapshot(gameRef, (docSnap) => {
                    if (docSnap.exists()) {
                        setGameState({ id: docSnap.id, ...docSnap.data() });
                    } else {
                        // 房間被刪除時的提示
                        if (gameStateRef.current && gameStateRef.current.status === 'finished') {
                            alert("遊戲已圓滿結束，房間數據已由主持人清除並釋放空間。");
                        } else if (gameStateRef.current) {
                            alert("房間已被主持人關閉！");
                        } else {
                            alert("找不到此遊戲房間或連結已失效！");
                        }
                        setGameState(null);
                        setGameId(null);
                        safeUpdateUrl(null);
                    }
                }, (error) => {
                    console.error("Firestore error:", error);
                    alert(`連線錯誤: ${error.message}`);
                    setGameId(null);
                });
                return () => unsubscribe();
            }, [user, gameId]);

            const gameStateRef = useRef(gameState);
            useEffect(() => { gameStateRef.current = gameState; }, [gameState]);

            const [musicStatus, setMusicStatus] = useState('paused'); 
            const audioRef = useRef(null);
            const userMutedRef = useRef(true); // 預設靜音，需手動點擊或互動播放
            const isHost = user && gameState && user.uid === gameState.hostId;

            // 根據遊戲狀態決定播放哪首音樂
            const currentTrack = useMemo(() => {
                if (!gameState) return null;
                if (['lobby', 'starting_countdown', 'finished'].includes(gameState.status)) return 'bg1.mp3';
                if (['preview', 'playing', 'result', 'interim_leaderboard'].includes(gameState.status)) return 'bg5.mp3';
                return null;
            }, [gameState?.status]);

            // 音樂播放引擎
            useEffect(() => {
                if (!isHost || !currentTrack) {
                    if (audioRef.current) {
                        audioRef.current.pause();
                        audioRef.current = null;
                        setMusicStatus('paused');
                    }
                    return;
                }

                const playAudio = async () => {
                    if (audioRef.current) { audioRef.current.pause(); }
                    
                    const audio = new Audio(currentTrack);
                    audio.volume = 0.4;
                    // 自行實作完美的無縫循環，解決部分瀏覽器 loop=true 失效的問題
                    audio.addEventListener('ended', function() {
                        this.currentTime = 0;
                        this.play();
                    }, false);

                    audioRef.current = audio;

                    if (!userMutedRef.current) {
                        setMusicStatus('loading');
                        try {
                            await audio.play();
                            setMusicStatus('playing');
                        } catch (err) {
                            console.warn("音樂被瀏覽器阻擋:", err);
                            setMusicStatus('paused');
                        }
                    } else {
                        setMusicStatus('paused');
                    }
                };
                playAudio();
            }, [currentTrack, isHost]);

            const toggleMusic = () => {
                if (!audioRef.current) return;
                if (musicStatus === 'playing') {
                    audioRef.current.pause();
                    userMutedRef.current = true;
                    setMusicStatus('paused');
                } else {
                    userMutedRef.current = false;
                    audioRef.current.play().then(() => setMusicStatus('playing')).catch(() => setMusicStatus('error'));
                }
            };

            const evaluatingRef = useRef(false);
            useEffect(() => { evaluatingRef.current = false; }, [gameState?.status, gameState?.currentQIndex]);

            useEffect(() => {
                if (!user || !gameId) return;

                const checkAndEvaluate = async () => {
                    const currentState = gameStateRef.current;
                    if (!currentState || user.uid !== currentState.hostId) return;
                    if (!['starting_countdown', 'preview', 'playing'].includes(currentState.status)) return;

                    const qIndex = currentState.currentQIndex || 0;
                    const currentQ = currentState.questions?.[qIndex];
                    const gameRef = doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId);

                    // 處理 3-2-1 倒數結束 -> 進入預覽
                    if (currentState.status === 'starting_countdown' && Date.now() >= currentState.countdownDeadline) {
                        if (evaluatingRef.current) return;
                        evaluatingRef.current = true;
                        try { await updateDoc(gameRef, { status: 'preview', currentQIndex: 0, previewDeadline: Date.now() + 5000 }); } catch(e) { evaluatingRef.current = false; }
                        return;
                    }

                    if (!currentQ) return;

                    // 處理預覽結束 -> 進入答題
                    if (currentState.status === 'preview' && Date.now() >= currentState.previewDeadline) {
                        if (evaluatingRef.current) return;
                        evaluatingRef.current = true;
                        try { await updateDoc(gameRef, { status: 'playing', deadline: Date.now() + (parseInt(currentQ.timeLimit || 20, 10) * 1000) }); } catch(e) { evaluatingRef.current = false; }
                        return;
                    }

                    // 處理答題結束 -> 進入結算成績 (熱血計分公式)
                    if (currentState.status === 'playing') {
                        const answers = currentState.answers?.[qIndex] || {};
                        const players = currentState.players || {};
                        const playerIds = Object.keys(players);
                        
                        const allAnswered = playerIds.length > 0 && playerIds.every((id) => answers[id]);
                        const timeUp = currentState.deadline && Date.now() >= currentState.deadline;

                        if (allAnswered || timeUp) {
                            if (evaluatingRef.current) return;
                            evaluatingRef.current = true;

                            let correctSubmissions = [];

                            // 判斷哪些人答對
                            if (currentQ.type === 'fill') {
                                const validAnswers = (currentQ.fillAnswers || (currentQ.fillAnswer ? [currentQ.fillAnswer] : []))
                                    .map((a) => (currentQ.caseSensitive ? a.trim() : a.trim().toLowerCase()))
                                    .filter((a) => a !== '');
                                
                                Object.entries(answers).forEach(([playerId, ansData]) => {
                                    const userText = currentQ.caseSensitive ? (ansData.textAnswer || '').trim() : (ansData.textAnswer || '').trim().toLowerCase();
                                    if (validAnswers.includes(userText) && userText !== '') correctSubmissions.push({ playerId, timestamp: ansData.timestamp });
                                });
                            } else {
                                const correctOptionIds = (currentQ.options || []).filter((o) => o.isCorrect).map((o) => o.id).sort();
                                Object.entries(answers).forEach(([playerId, ansData]) => {
                                    const selected = [...(ansData.options || [])].sort();
                                    if (JSON.stringify(selected) === JSON.stringify(correctOptionIds)) correctSubmissions.push({ playerId, timestamp: ansData.timestamp });
                                });
                            }

                            // 依照時間排序，進行給分
                            correctSubmissions.sort((a, b) => a.timestamp - b.timestamp);
                            const newPlayers = { ...players };
                            const updates = { status: 'result' };
                            
                            correctSubmissions.forEach((sub, index) => {
                                const remainingSecs = Math.max(0, (currentState.deadline - sub.timestamp) / 1000);
                                let points = 39; // 基礎分
                                if (index === 0) points += 40; // 第一名
                                if (remainingSecs >= currentQ.timeLimit / 2) points += 30; // 剩一半以上
                                else if (remainingSecs >= currentQ.timeLimit / 4) points += 20; // 剩 1/4 以上
                                else if (remainingSecs > 3) points += 10; // 大於 3 秒

                                if (newPlayers[sub.playerId]) {
                                    newPlayers[sub.playerId].score = (newPlayers[sub.playerId].score || 0) + points;
                                    updates[`answers.${qIndex}.${sub.playerId}.pointsEarned`] = points;
                                }
                            });

                            updates.players = newPlayers;
                            try { await updateDoc(gameRef, updates); } catch(e) { evaluatingRef.current = false; }
                        }
                    }
                };

                const intervalId = setInterval(checkAndEvaluate, 250);
                return () => clearInterval(intervalId);
            }, [user, gameId]);

            if (loading) {
                return <div className="min-h-screen flex items-center justify-center font-bold text-2xl text-blue-400"><Clock className="animate-spin mr-3" /> 系統載入中...</div>;
            }

            if (!gameId) {
                if (view === 'create') return <CreateGame user={user} onGameCreated={setGameId} onBack={() => setView('join')} initialQuestions={reusableQuestions} db={db} appId={appId} safeUpdateUrl={safeUpdateUrl} />;
                return <JoinGame user={user} onSetGameId={setGameId} onNavigateCreate={() => { setReusableQuestions([]); setView('create'); }} db={db} appId={appId} safeUpdateUrl={safeUpdateUrl} gameState={gameState} />;
            }

            if (gameState) {
                const isHostMode = user && user.uid === gameState.hostId;
                
                return (
                    <div className="bg-gray-900 text-gray-800 font-sans antialiased min-h-screen w-full relative">
                        {isHostMode && (
                            <button
                                onClick={toggleMusic}
                                className={`fixed top-4 right-4 md:top-8 md:right-8 p-3 md:p-5 bg-white/10 hover:bg-white/20 border border-white/20 rounded-full text-white backdrop-blur-md transition flex items-center justify-center z-[200] shadow-2xl group ${musicStatus === 'error' ? 'opacity-50 cursor-not-allowed' : ''}`}
                                title={musicStatus === 'playing' ? "暫停音樂" : "播放音樂"}
                            >
                                {musicStatus === 'playing' ? <Volume2 className="w-6 h-6 md:w-8 md:h-8 text-green-400 group-hover:scale-110 transition-transform" /> :
                                 musicStatus === 'paused' ? <VolumeX className="w-6 h-6 md:w-8 md:h-8 text-red-400 group-hover:scale-110 transition-transform" /> :
                                 <Music className="w-6 h-6 md:w-8 md:h-8 text-gray-400 animate-pulse" />}
                            </button>
                        )}
                        {(() => {
                            switch (gameState.status) {
                                case 'lobby': return <Lobby user={user} gameState={gameState} gameId={gameId} db={db} appId={appId} />;
                                case 'starting_countdown': return <StartingCountdown gameState={gameState} />;
                                case 'preview': return <QuestionPreview gameState={gameState} />;
                                case 'playing': return <Gameplay user={user} gameState={gameState} gameId={gameId} db={db} appId={appId} />;
                                case 'result': return <Result user={user} gameState={gameState} gameId={gameId} db={db} appId={appId} />;
                                case 'interim_leaderboard': return <InterimLeaderboard user={user} gameState={gameState} gameId={gameId} db={db} appId={appId} />;
                                case 'finished': return <Leaderboard gameState={gameState} user={user} gameId={gameId} db={db} appId={appId} onBack={() => { setReusableQuestions([]); setView('join'); setGameId(null); safeUpdateUrl(null); }} onReplay={() => { setReusableQuestions(gameState.questions); setView('create'); setGameId(null); safeUpdateUrl(null); }} />;
                                default: return <div className="text-white p-10 text-xl">系統狀態異常</div>;
                            }
                        })()}
                    </div>
                );
            }

            return <div className="min-h-screen flex items-center justify-center font-bold text-2xl text-blue-400"><Clock className="animate-spin mr-3" /> 連線至房間中...</div>;
        }

        function CreateGame({ user, onGameCreated, onBack, initialQuestions, db, appId, safeUpdateUrl }) {
            const [questions, setQuestions] = useState(initialQuestions || []);
            const fileInputRef = useRef(null);
            const [editingId, setEditingId] = useState(null);
            const [isCreating, setIsCreating] = useState(false);
            const [importFiles, setImportFiles] = useState(null);
            const [customAlert, setCustomAlert] = useState(null);
            
            const [gameMode, setGameMode] = useState('solo');
            const [teamCount, setTeamCount] = useState(2);

            // 數學符號面板狀態
            const [activeMathPanel, setActiveMathPanel] = useState(null);
            const [fractionNum, setFractionNum] = useState('');
            const [fractionDen, setFractionDen] = useState('');
            const mathSymbols = ['²', '³', 'ⁿ', '√', '∛', 'π', 'θ', 'α', 'β', '±', '×', '÷', '≈', '≠', '≤', '≥', '∞', '°', '△', '∑'];

            // 拖曳題庫排序狀態
            const [draggedQIndex, setDraggedQIndex] = useState(null);
            const [dragOverQIndex, setDragOverQIndex] = useState(null);

            const handleQDragStart = (e, index) => { draggedQIndex !== index && setDraggedQIndex(index); };
            const handleQDragEnter = (e, index) => { e.preventDefault(); dragOverQIndex !== index && setDragOverQIndex(index); };
            const handleQDragEnd = () => {
                if (draggedQIndex !== null && dragOverQIndex !== null && draggedQIndex !== dragOverQIndex) {
                    const newQuestions = [...questions];
                    const draggedItem = newQuestions[draggedQIndex];
                    newQuestions.splice(draggedQIndex, 1);
                    newQuestions.splice(dragOverQIndex, 0, draggedItem);
                    setQuestions(newQuestions);
                }
                setDraggedQIndex(null); setDragOverQIndex(null);
            };

            const defaultQ = { text: '', type: 'single', timeLimit: 30, options: [{ id: '1', text: '', isCorrect: false, imageBase64: '' }, { id: '2', text: '', isCorrect: false, imageBase64: '' }], fillAnswers: [''], imageBase64: '', caseSensitive: false };
            const [currentQ, setCurrentQ] = useState(defaultQ);

            const addOption = () => setCurrentQ({ ...currentQ, options: [...currentQ.options, { id: Date.now().toString(), text: '', isCorrect: false, imageBase64: '' }] });
            const updateOption = (id, field, value) => {
                setCurrentQ({ ...currentQ, options: currentQ.options.map(o => { if (o.id !== id) return currentQ.type === 'single' && field === 'isCorrect' && value ? { ...o, isCorrect: false } : o; return { ...o, [field]: value }; }) });
            };
            const removeOption = (id) => { if (currentQ.options.length > 2) setCurrentQ({ ...currentQ, options: currentQ.options.filter(o => o.id !== id) }); };
            const cancelEdit = () => { setEditingId(null); setCurrentQ(defaultQ); };

            const saveQuestion = () => {
                if (!currentQ.text.trim() && !currentQ.imageBase64) return setCustomAlert("請輸入題目內容或上傳圖片！");
                if (currentQ.type === 'fill') {
                    if (!currentQ.fillAnswers || currentQ.fillAnswers.every(a => !a.trim())) return setCustomAlert("請至少輸入一個正確答案！");
                } else {
                    if (currentQ.options.some(o => !o.text.trim() && !o.imageBase64)) return setCustomAlert("所有選項都必須有內容！");
                    if (!currentQ.options.some(o => o.isCorrect)) return setCustomAlert("請至少選擇一個正確答案！");
                }

                const sanitizedQ = { ...currentQ };
                if (sanitizedQ.type === 'fill') sanitizedQ.fillAnswers = sanitizedQ.fillAnswers.filter(a => a.trim() !== '');

                if (editingId) {
                    setQuestions(questions.map(q => q.id === editingId ? { ...sanitizedQ, id: editingId } : q));
                    setEditingId(null);
                } else {
                    setQuestions([...questions, { ...sanitizedQ, id: Date.now().toString() }]);
                }
                cancelEdit();
            };

            const downloadFile = (content, filename) => {
                const blob = new Blob(["\uFEFF" + content], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url; link.setAttribute('download', filename);
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
            };

            const exportQuestions = () => {
                if (questions.length === 0) return alert("沒有題目可以匯出！");
                const csvHeaders = ['題目類型(single/multiple/fill)', '題目內容', '題目圖片Base64', '限時(秒)', '填空題答案(用|隔開)', '區分大小寫(true/false)', '選項1', '選項1正確', '選項1圖片Base64', '選項2', '選項2正確', '選項2圖片Base64', '選項3', '選項3正確', '選項3圖片Base64', '選項4', '選項4正確', '選項4圖片Base64', '選項5', '選項5正確', '選項5圖片Base64', '選項6', '選項6正確', '選項6圖片Base64'];
                const rows = questions.map(q => {
                    const fillAnsJoined = (q.fillAnswers || (q.fillAnswer ? [q.fillAnswer] : [])).join('|');
                    const row = [q.type, `"${q.text.replace(/"/g, '""')}"`, `"${(q.imageBase64 || '').replace(/"/g, '""')}"`, q.timeLimit, `"${fillAnsJoined.replace(/"/g, '""')}"`, q.caseSensitive ? 'true' : 'false'];
                    if (q.type !== 'fill') {
                        q.options.forEach(opt => row.push(`"${(opt.text || '').replace(/"/g, '""')}"`, opt.isCorrect ? 'true' : 'false', `"${(opt.imageBase64 || '').replace(/"/g, '""')}"`));
                    }
                    return row.join(',');
                });
                downloadFile(csvHeaders.join(',') + '\n' + rows.join('\n'), '我的題庫.csv');
            };

            const processImportFiles = async (mode) => {
                let allNewQuestions = [];
                for (const file of importFiles) {
                    const text = await new Promise(resolve => {
                        const reader = new FileReader();
                        reader.onload = (event) => resolve(event.target.result);
                        reader.readAsText(file);
                    });
                    
                    const rows = parseCSV(text);
                    if (rows.length < 2) continue;
                    const isOldFormat = rows[0].indexOf('選項1圖片Base64') === -1;
                    const step = isOldFormat ? 2 : 3;

                    let newQuestionsForFile = []; // 修復 newQuestions 未定義的錯誤
                    for (let i = 1; i < rows.length; i++) {
                        const row = rows[i];
                        if (row.length === 0 || (!row[0] && !row[1])) continue;
                        const type = row[0]?.trim() || 'single';
                        const textStr = row[1]?.trim() || '';
                        const imageBase64 = row[2]?.trim() || '';
                        const timeLimit = parseInt(row[3]) || 20;
                        const fillAnswersRaw = row[4]?.trim() || '';
                        const caseSensitive = row[5]?.trim().toLowerCase() === 'true';
                        const fillAnswers = fillAnswersRaw ? fillAnswersRaw.split('|').map(s => s.trim()).filter(Boolean) : [''];

                        if (!textStr && !imageBase64 && type === 'fill' && fillAnswers.length === 0) continue;

                        const options = [];
                        if (type !== 'fill') {
                            for (let j = 6; j < row.length; j += step) {
                                const optText = row[j]?.trim();
                                const isCorrect = row[j+1]?.trim().toLowerCase() === 'true';
                                let optImageBase64 = isOldFormat ? '' : (row[j+2]?.trim() || '');
                                if (optImageBase64 && !optImageBase64.startsWith('data:image/')) optImageBase64 = '';
                                if (optText || optImageBase64) options.push({ id: Date.now().toString() + Math.random(), text: optText || '', isCorrect, imageBase64: optImageBase64 });
                            }
                            if (options.length === 0) continue; 
                        }
                        
                        let safeImageBase64 = imageBase64;
                        if (safeImageBase64 && !safeImageBase64.startsWith('data:image/')) safeImageBase64 = '';

                        newQuestionsForFile.push({ id: Date.now().toString() + Math.random(), type, text: textStr, imageBase64: safeImageBase64, timeLimit, fillAnswers, caseSensitive, options });
                    }
                    allNewQuestions = [...allNewQuestions, ...newQuestionsForFile];
                }
                
                if (allNewQuestions.length > 0) {
                    mode === 'replace' ? setQuestions(allNewQuestions) : setQuestions(prev => [...prev, ...allNewQuestions]);
                    setCustomAlert(`成功匯入 ${allNewQuestions.length} 道題目！`);
                } else { setCustomAlert("找不到有效的題目。"); }
                setImportFiles(null);
            };

            const createGame = async () => {
                if (questions.length === 0) return setCustomAlert('請先至少新增一道題目！');
                if (isCreating || !user) return;
                setIsCreating(true);

                try {
                    const newGameId = Math.random().toString(36).substr(2, 6).toUpperCase();
                    // 建立動態隊伍名稱 Map
                    const teamNames = {};
                    if (gameMode === 'team') {
                        for(let i = 1; i <= teamCount; i++) teamNames[`team_${i}`] = `隊伍${i}`;
                    }

                    const gameData = JSON.parse(JSON.stringify({
                        pin: newGameId, hostId: user.uid, status: 'lobby', questions: questions, currentQIndex: 0,
                        mode: gameMode, teamCount: gameMode === 'team' ? teamCount : 0, teamNames: teamNames,
                        players: {}, answers: {}, createdAt: Date.now()
                    }));

                    const setPromise = setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', newGameId), gameData);
                    await Promise.race([ setPromise, new Promise((_, r) => setTimeout(() => r(new Error("Timeout")), 8000)) ]);
                    
                    safeUpdateUrl(newGameId);
                    onGameCreated(newGameId);
                } catch (error) {
                    setCustomAlert(`建立遊戲失敗: ${error.message}`);
                    setIsCreating(false);
                }
            };

            return (
                <div className="min-h-screen bg-gray-50 text-gray-800 p-4 md:p-8">
                    <div className="max-w-6xl mx-auto space-y-6 md:space-y-8">
                        <div className="flex justify-between items-center relative">
                            <button onClick={onBack} className="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold rounded-xl transition flex items-center absolute left-0 z-10"><ArrowRight className="mr-2 rotate-180" size={18} /> 返回</button>
                            <div className="text-center w-full">
                                <h1 className="text-3xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600 mb-2">數學天才培養室</h1>
                                <p className="text-gray-500">設計題目，準備挑戰</p>
                            </div>
                        </div>

                        {/* 遊戲模式選擇 */}
                        <div className="bg-white p-6 md:p-8 rounded-2xl shadow-xl border border-gray-100 flex flex-col gap-4">
                            <h2 className="text-xl md:text-2xl font-bold flex items-center">選擇遊戲模式</h2>
                            <div className="flex flex-col sm:flex-row gap-4 sm:gap-8">
                                <label className="flex items-center gap-3 cursor-pointer p-3 rounded-lg hover:bg-gray-50"><input type="radio" value="solo" checked={gameMode === 'solo'} onChange={() => setGameMode('solo')} className="w-6 h-6" /><span className="font-medium text-lg">單人比拼模式</span></label>
                                <label className="flex items-center gap-3 cursor-pointer p-3 rounded-lg hover:bg-gray-50"><input type="radio" value="team" checked={gameMode === 'team'} onChange={() => setGameMode('team')} className="w-6 h-6" /><span className="font-medium text-lg">組隊模式</span></label>
                            </div>
                            {gameMode === 'team' && (
                                <div className="flex items-center gap-4 mt-2 p-4 bg-blue-50 rounded-xl border border-blue-100">
                                    <label className="text-blue-800 font-bold text-lg">設定隊伍數量：</label>
                                    <input type="number" min="2" max="10" value={teamCount} onChange={(e) => setTeamCount(parseInt(e.target.value) || 2)} className="border-2 border-blue-200 rounded-lg px-4 py-2 w-24 text-center font-bold text-xl text-blue-900 focus:outline-none" />
                                </div>
                            )}
                        </div>

                        <div className="grid lg:grid-cols-2 gap-6 md:gap-8">
                            {/* 左側：編輯區 */}
                            <div className="bg-white p-6 md:p-8 rounded-2xl shadow-xl border border-gray-100 h-max">
                                <h2 className="text-xl md:text-2xl font-bold text-gray-800 flex items-center mb-6">{editingId ? <Edit className="mr-2 text-blue-500" /> : <Plus className="mr-2 text-blue-500" />} {editingId ? '編輯題目' : '新增題目'}</h2>
                                <div className="space-y-6">
                                    <div>
                                        <label className="block text-sm md:text-base font-medium text-gray-700 mb-2">題目內容</label>
                                        <textarea className="w-full p-4 text-lg border border-gray-300 rounded-lg outline-none focus:border-blue-500 transition" rows="3" value={currentQ.text} onChange={e => setCurrentQ({...currentQ, text: e.target.value})} placeholder="例如：計算下圖中的未知數" />
                                    </div>
                                    <div>
                                        <label className="block text-sm md:text-base font-medium text-gray-700 mb-2">題目附圖 (選填)</label>
                                        <input type="file" accept="image/*" className="w-full p-2 border border-gray-300 rounded-lg" onChange={async e => { const file = e.target.files[0]; if (file) setCurrentQ({...currentQ, imageBase64: await compressImage(file)}); e.target.value = null; }} />
                                        {currentQ.imageBase64 && (<div className="mt-3 relative inline-block"><img src={currentQ.imageBase64} className="max-h-40 rounded shadow" /><button onClick={() => setCurrentQ({...currentQ, imageBase64: ''})} className="absolute -top-3 -right-3 bg-red-500 text-white rounded-full p-1"><X size={14} /></button></div>)}
                                    </div>
                                    <div className="flex gap-4">
                                        <div className="flex-1"><label className="block text-sm font-medium text-gray-700 mb-2">類型</label><select className="w-full p-3 border border-gray-300 rounded-lg outline-none" value={currentQ.type} onChange={e => setCurrentQ({...currentQ, type: e.target.value, options: currentQ.options.map((o, i) => ({ ...o, isCorrect: e.target.value === 'single' ? i === 0 : o.isCorrect })) })}><option value="single">單選題</option><option value="multiple">多選題</option><option value="fill">填空題</option></select></div>
                                        <div className="flex-1"><label className="block text-sm font-medium text-gray-700 mb-2">限時(秒)</label><input type="number" className="w-full p-3 border border-gray-300 rounded-lg outline-none" value={currentQ.timeLimit} onChange={e => setCurrentQ({...currentQ, timeLimit: parseInt(e.target.value) || 20})} /></div>
                                    </div>

                                    {/* 選項/填空設定區 */}
                                    {currentQ.type === 'fill' ? (
                                        <div>
                                            <label className="block font-medium text-gray-700 mb-2">正確答案設定 (可輸入多個同義詞)</label>
                                            <div className="space-y-3">
                                                {(currentQ.fillAnswers && currentQ.fillAnswers.length > 0 ? currentQ.fillAnswers : ['']).map((ans, idx) => (
                                                    <div key={idx} className="flex flex-col gap-2 relative">
                                                        <div className="flex items-center gap-3">
                                                            <input type="text" className="flex-1 p-3 text-lg border border-gray-300 rounded-lg outline-none" placeholder={`答案 ${idx + 1}`} value={ans} onChange={e => { const newAns = [...(currentQ.fillAnswers || [''])]; newAns[idx] = e.target.value; setCurrentQ({...currentQ, fillAnswers: newAns}); }} />
                                                            <button type="button" onClick={() => setActiveMathPanel(activeMathPanel === idx ? null : idx)} className={`p-3 rounded-lg border font-serif font-bold text-xl flex-shrink-0 ${activeMathPanel === idx ? 'bg-blue-100 text-blue-600 border-blue-400' : 'bg-gray-50 text-gray-500'}`} title="插入數學符號">√x</button>
                                                            {currentQ.fillAnswers?.length > 1 && <button onClick={() => setCurrentQ({...currentQ, fillAnswers: currentQ.fillAnswers.filter((_, i) => i !== idx)})} className="p-3 text-red-500 bg-red-50 rounded-lg"><Trash2 size={24} /></button>}
                                                        </div>
                                                        {ans.includes('/') && <div className="text-blue-600 text-sm font-bold bg-blue-50 w-max px-3 py-1 rounded">預覽: <span className="text-lg"><FormattedText text={ans} /></span></div>}
                                                        
                                                        {/* 數學符號面板 */}
                                                        {activeMathPanel === idx && (
                                                            <div className="absolute top-full mt-2 right-0 bg-white p-4 rounded-2xl shadow-2xl border-2 border-blue-100 z-50 w-[320px] animate-fade-in-up">
                                                                <div className="flex justify-between items-center mb-3 border-b pb-2"><span className="font-bold text-gray-500">數學面板</span><button onClick={() => setActiveMathPanel(null)} className="text-gray-400 hover:text-red-500"><X size={16} /></button></div>
                                                                <div className="grid grid-cols-6 gap-2">
                                                                    {mathSymbols.map(sym => <button key={sym} type="button" onClick={() => { const newAns = [...(currentQ.fillAnswers || [''])]; newAns[idx] = (newAns[idx] || '') + sym; setCurrentQ({...currentQ, fillAnswers: newAns}); }} className="p-2 bg-gray-50 hover:bg-blue-500 hover:text-white rounded font-black text-xl transition-colors">{sym}</button>)}
                                                                </div>
                                                                <div className="flex items-center gap-2 mt-3 bg-gray-50 p-2 rounded">
                                                                    <span className="text-sm font-bold text-gray-500">分數</span>
                                                                    <input type="number" className="w-12 text-center rounded border p-1 outline-none" placeholder="分子" value={fractionNum} onChange={e=>setFractionNum(e.target.value)} />
                                                                    <span className="font-bold text-gray-400">/</span>
                                                                    <input type="number" className="w-12 text-center rounded border p-1 outline-none" placeholder="分母" value={fractionDen} onChange={e=>setFractionDen(e.target.value)} />
                                                                    <button type="button" onClick={() => { if(fractionNum && fractionDen) { const newAns = [...(currentQ.fillAnswers || [''])]; newAns[idx] = (newAns[idx] || '') + `${fractionNum}/${fractionDen}`; setCurrentQ({...currentQ, fillAnswers: newAns}); setFractionNum(''); setFractionDen(''); } }} className="ml-auto px-3 py-1 bg-blue-500 text-white rounded font-bold text-sm">插入</button>
                                                                </div>
                                                            </div>
                                                        )}
                                                    </div>
                                                ))}
                                            </div>
                                            <button onClick={() => setCurrentQ({...currentQ, fillAnswers: [...(currentQ.fillAnswers || ['']), '']})} className="mt-4 text-blue-600 font-bold flex items-center"><Plus size={20} className="mr-1" /> 新增其他答案</button>
                                            <div className="flex items-center mt-6 bg-gray-50 p-4 rounded-xl border"><input type="checkbox" checked={currentQ.caseSensitive || false} onChange={e => setCurrentQ({...currentQ, caseSensitive: e.target.checked})} className="w-6 h-6 mr-3" /><label className="font-medium text-gray-700 cursor-pointer">區分大小寫</label></div>
                                        </div>
                                    ) : (
                                        <div>
                                            <label className="block font-medium text-gray-700 mb-3">選項設定 (勾選為正確答案)</label>
                                            <div className="space-y-4">
                                                {currentQ.options.map((opt, index) => (
                                                    <div key={opt.id} className={`flex flex-col gap-3 p-4 rounded-xl border-2 ${opt.isCorrect ? 'border-green-400 bg-green-50' : 'border-gray-200'}`}>
                                                        <div className="flex items-center gap-3">
                                                            <input type={currentQ.type === 'single' ? 'radio' : 'checkbox'} className="w-6 h-6 text-green-600 cursor-pointer flex-shrink-0" checked={opt.isCorrect} onChange={(e) => updateOption(opt.id, 'isCorrect', e.target.checked)} />
                                                            <input type="text" className="flex-1 p-3 text-lg border rounded-md outline-none focus:border-blue-500" placeholder={`選項 ${String.fromCharCode(65 + index)}`} value={opt.text} onChange={e => updateOption(opt.id, 'text', e.target.value)} />
                                                            <label className="cursor-pointer p-3 bg-gray-100 hover:text-blue-600 rounded-md"><ImagePlus size={24} /><input type="file" accept="image/*" className="hidden" onChange={async (e) => { const file = e.target.files[0]; if (file) updateOption(opt.id, 'imageBase64', await compressImage(file, 250)); e.target.value = null; }} /></label>
                                                            <button onClick={() => removeOption(opt.id)} className="p-3 text-gray-400 hover:text-red-500"><Trash2 size={24} /></button>
                                                        </div>
                                                        {opt.imageBase64 && (<div className="relative inline-block ml-10 border p-2 bg-white w-max rounded"><img src={opt.imageBase64} className="h-20 rounded" /><button onClick={() => updateOption(opt.id, 'imageBase64', '')} className="absolute -top-3 -right-3 bg-red-500 text-white rounded-full p-1"><X size={14} /></button></div>)}
                                                    </div>
                                                ))}
                                            </div>
                                            <button onClick={addOption} className="mt-4 text-blue-600 font-bold flex items-center"><Plus size={20} className="mr-1" /> 加入選項</button>
                                        </div>
                                    )}

                                    <div className="flex gap-3 pt-4">
                                        {editingId && <button onClick={cancelEdit} className="w-1/3 py-4 bg-gray-200 text-gray-700 text-lg font-bold rounded-xl hover:bg-gray-300">取消</button>}
                                        <button onClick={saveQuestion} className={`${editingId ? 'w-2/3 bg-blue-600' : 'w-full bg-gray-800'} py-4 text-white text-lg font-bold rounded-xl shadow-md hover:opacity-90`}>{editingId ? '更新題目' : '儲存題目'}</button>
                                    </div>
                                </div>
                            </div>

                            {/* 右側：題庫列表 */}
                            <div className="bg-white p-6 md:p-8 rounded-2xl shadow-xl border border-gray-100 flex flex-col">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl md:text-2xl font-bold flex items-center"><CheckCircle2 className="mr-2 text-green-500" /> 已建立題庫 ({questions.length})</h2>
                                    <div className="flex gap-3">
                                        <button onClick={() => downloadFile('single,題目內容,,20,,false,選項A,true,,選項B,false,', '範本.csv')} className="p-3 bg-gray-100 rounded-xl hover:text-blue-600" title="下載範本"><FileText size={20}/></button>
                                        <button onClick={() => fileInputRef.current.click()} className="p-3 bg-gray-100 rounded-xl hover:text-green-600" title="匯入 CSV"><Upload size={20}/></button>
                                        <input type="file" accept=".csv" multiple ref={fileInputRef} onChange={e => { if(e.target.files.length) setImportFiles(Array.from(e.target.files)); e.target.value=null; }} className="hidden" />
                                        <button onClick={exportQuestions} className="p-3 bg-gray-100 rounded-xl hover:text-purple-600" title="匯出 CSV"><Download size={20}/></button>
                                    </div>
                                </div>
                                
                                <div className="flex-1 overflow-y-auto space-y-4 mb-6 min-h-[300px] lg:max-h-[600px] custom-scrollbar pr-2">
                                    {questions.length === 0 ? (
                                        <div className="h-full flex flex-col items-center justify-center text-gray-400 italic">題庫是空的，快來新增吧！</div>
                                    ) : (
                                        questions.map((q, i) => (
                                            <div key={q.id} draggable onDragStart={(e) => handleQDragStart(e, i)} onDragEnter={(e) => handleQDragEnter(e, i)} onDragEnd={handleQDragEnd} onDragOver={(e) => e.preventDefault()} onClick={() => { setEditingId(q.id); setCurrentQ(JSON.parse(JSON.stringify(q))); }} className={`p-5 pl-10 border-2 cursor-pointer relative group transition-all rounded-2xl ${editingId === q.id ? 'border-blue-400 bg-blue-50 shadow-md ring-2 ring-blue-400' : 'border-gray-100 hover:border-blue-300'} ${draggedQIndex === i ? 'opacity-40 scale-[0.98]' : ''} ${dragOverQIndex === i && draggedQIndex !== i ? 'border-dashed border-blue-500 bg-blue-50' : ''}`}>
                                                <div className="absolute left-2 top-1/2 transform -translate-y-1/2 text-gray-300 group-hover:text-blue-500 cursor-grab p-2"><GripVertical size={20} /></div>
                                                <span className="absolute top-3 right-3 text-sm font-bold px-3 py-1 bg-blue-100 text-blue-800 rounded-full">{q.type === 'single' ? '單選' : q.type === 'multiple' ? '多選' : '填空'}</span>
                                                <h3 className="text-lg font-bold mb-3 pr-16 leading-relaxed">Q{i + 1}. <FormattedText text={q.text || '(圖片題)'} /></h3>
                                                {q.imageBase64 && <div className="text-sm text-blue-500 font-bold mb-2">📎 包含圖片</div>}
                                                <div className="text-gray-600 text-sm">
                                                    {q.type === 'fill' ? (
                                                        <div className="text-green-700 font-bold bg-green-50 p-2 rounded">正確答案: {(q.fillAnswers||[]).map((a,ai)=><span key={ai}><FormattedText text={a}/>{ai<q.fillAnswers.length-1?' / ':''}</span>)}</div>
                                                    ) : (
                                                        q.options.map((o, oi) => <div key={oi} className={`${o.isCorrect?'text-green-700 font-bold bg-green-50 p-1 rounded':''}`}>{String.fromCharCode(65 + oi)}. <FormattedText text={o.text||'(圖片)'}/> {o.isCorrect&&'✓'}</div>)
                                                    )}
                                                </div>
                                                <div className="absolute bottom-3 right-3 flex gap-2 opacity-0 group-hover:opacity-100 transition">
                                                    <button onClick={(e) => { e.stopPropagation(); const dup = JSON.parse(JSON.stringify(q)); dup.id = Date.now().toString(); setQuestions([...questions, dup]); setEditingId(dup.id); setCurrentQ(dup); }} className="p-2 bg-blue-100 text-blue-600 rounded-lg hover:bg-blue-200"><Copy size={16} /></button>
                                                    <button onClick={(e) => { e.stopPropagation(); setQuestions(questions.filter(xq => xq.id !== q.id)); if (editingId === q.id) cancelEdit(); }} className="p-2 bg-red-100 text-red-600 rounded-lg hover:bg-red-200"><Trash2 size={16} /></button>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>

                                <button onClick={createGame} disabled={questions.length === 0 || isCreating} className={`w-full py-5 font-black rounded-2xl flex justify-center items-center text-xl transition shadow-xl ${questions.length > 0 && !isCreating ? 'bg-gradient-to-r from-blue-600 to-purple-600 hover:opacity-90 text-white transform hover:-translate-y-1' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}>
                                    {isCreating ? <><Clock className="animate-spin mr-3" size={28} /> 生成房間中...</> : <><Play className="mr-3" size={28} fill="currentColor" /> 開始遊戲並生成連結</>}
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* 匯入 CSV 提示窗 */}
                    {importFiles && (
                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[100] p-4">
                            <div className="bg-white p-8 rounded-3xl max-w-md w-full animate-fade-in-up text-center">
                                <h3 className="text-2xl font-black mb-4">處理匯入的題目</h3>
                                <p className="mb-6 text-gray-600">偵測到 {importFiles.length} 份檔案，請選擇匯入方式：</p>
                                <button onClick={() => processImportFiles('replace')} className="w-full py-4 mb-3 bg-red-500 text-white font-bold rounded-xl hover:bg-red-600 flex items-center justify-center"><Trash2 className="mr-2" /> 替換並清空現有題庫</button>
                                <button onClick={() => processImportFiles('append')} className="w-full py-4 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 flex items-center justify-center"><Plus className="mr-2" /> 直接加入現有題庫</button>
                                <button onClick={() => setImportFiles(null)} className="w-full py-3 mt-4 text-gray-500 font-bold hover:bg-gray-100 rounded-xl">取消</button>
                            </div>
                        </div>
                    )}
                    {customAlert && (
                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[100] p-4">
                            <div className="bg-white p-8 rounded-3xl max-w-sm w-full text-center animate-fade-in-up">
                                <h3 className="text-xl font-bold mb-6">{customAlert}</h3>
                                <button onClick={() => setCustomAlert(null)} className="w-full py-4 bg-blue-600 text-white font-bold rounded-xl">確定</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function JoinGame({ user, onSetGameId, onNavigateCreate, db, appId, safeUpdateUrl, gameState }) {
            const [nickname, setNickname] = useState('');
            const [pin, setPin] = useState('');
            const [isJoining, setIsJoining] = useState(false);
            const isDirectLink = !!new URLSearchParams(window.location.search).get('gameId');

            // --- 新增：主持人接管狀態 ---
            const [showHostLogin, setShowHostLogin] = useState(false);
            const [hostPassword, setHostPassword] = useState('');

            const handleJoin = async (e) => {
                e.preventDefault();
                if (!nickname.trim() || (!isDirectLink && !pin.trim()) || isJoining) return;

                setIsJoining(true);
                try {
                    const targetGameId = isDirectLink ? new URLSearchParams(window.location.search).get('gameId') : pin.trim().toUpperCase();
                    const gameRef = doc(db, 'artifacts', appId, 'public', 'data', 'games', targetGameId);
                    const gameSnap = await getDoc(gameRef);
                    
                    if (!gameSnap.exists()) {
                        alert("找不到此遊戲房間代碼！");
                        setIsJoining(false); return;
                    }

                    const gameData = gameSnap.data();
                    let assignedTeamId = null;
                    
                    if (gameData.mode === 'team') {
                        // 找出人數最少的隊伍 (team_1, team_2...)
                        const teamTotals = {};
                        Object.keys(gameData.teamNames || {}).forEach(tid => teamTotals[tid] = 0);
                        Object.values(gameData.players || {}).forEach(p => { if (p.team && teamTotals[p.team] !== undefined) teamTotals[p.team]++; });
                        const teamIds = Object.keys(teamTotals);
                        if (teamIds.length > 0) {
                            assignedTeamId = teamIds.reduce((a, b) => teamTotals[a] < teamTotals[b] ? a : b);
                        }
                    }

                    const newPlayerData = { nickname: nickname.trim(), score: 0, joinedAt: Date.now() };
                    if (assignedTeamId) newPlayerData.team = assignedTeamId;

                    await updateDoc(gameRef, { [`players.${user.uid}`]: newPlayerData });

                    if (!isDirectLink) {
                        safeUpdateUrl(targetGameId);
                        onSetGameId(targetGameId);
                    }
                } catch (error) {
                    alert("連線錯誤，請稍後重試。");
                    setIsJoining(false);
                }
            };

            // --- 新增：接管主持人邏輯 ---
            const handleHostTakeover = async (e) => {
                e.preventDefault();
                if (hostPassword === 'hkkeung') {
                    try {
                        const targetGameId = isDirectLink ? new URLSearchParams(window.location.search).get('gameId') : pin.trim().toUpperCase();
                        const gameRef = doc(db, 'artifacts', appId, 'public', 'data', 'games', targetGameId);
                        const gameSnap = await getDoc(gameRef);
                        
                        if (!gameSnap.exists()) {
                            alert("找不到此遊戲房間代碼！");
                            return;
                        }

                        // 將自己設為主持人
                        await updateDoc(gameRef, { hostId: user.uid });
                        
                        if (!isDirectLink) {
                            safeUpdateUrl(targetGameId);
                        }
                        onSetGameId(targetGameId);
                        setShowHostLogin(false);
                    } catch (error) {
                        alert("切換主持人失敗，請稍後重試。");
                    }
                } else {
                    alert("密碼錯誤！");
                    setHostPassword('');
                }
            };

            return (
                <div className="min-h-screen bg-gray-900 flex flex-col items-center justify-center p-4">
                    <div className="bg-white max-w-md w-full p-8 md:p-12 rounded-3xl shadow-2xl">
                        <div className="text-center mb-8">
                            <div className="inline-flex items-center justify-center w-20 h-20 rounded-full bg-blue-100 text-blue-600 mb-6"><Trophy size={40} /></div>
                            <h1 className="text-3xl font-extrabold text-gray-800">準備加入遊戲！</h1>
                            {gameState ? <p className="text-gray-500 mt-2">目前已有 {Object.keys(gameState.players||{}).length} 人在等待室</p> : <p className="text-gray-500 mt-2">請輸入資訊加入遊戲</p>}
                        </div>

                        <form onSubmit={handleJoin} className="space-y-6">
                            {!isDirectLink && (
                                <div>
                                    <label className="block font-bold text-gray-700 mb-2">輸入 6 碼遊戲代碼 (PIN)</label>
                                    <input type="text" className="w-full px-5 py-4 text-2xl border-2 rounded-2xl outline-none text-center font-bold uppercase tracking-widest focus:border-blue-500" placeholder="例如：123456" value={pin} onChange={e => setPin(e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, ''))} />
                                </div>
                            )}
                            <div>
                                <label className="block font-bold text-gray-700 mb-2">輸入你的專屬暱稱</label>
                                <input type="text" maxLength="12" className="w-full px-5 py-4 text-2xl border-2 rounded-2xl outline-none text-center font-bold focus:border-blue-500" placeholder="你的名字" value={nickname} onChange={e => setNickname(e.target.value)} autoFocus={isDirectLink} />
                            </div>
                            <button type="submit" disabled={!nickname.trim() || (!isDirectLink && !pin.trim()) || isJoining} className="w-full py-5 bg-gradient-to-r from-blue-600 to-indigo-600 text-white text-xl font-bold rounded-2xl shadow-xl hover:opacity-90 transition disabled:opacity-50">
                                {isJoining ? <span className="flex items-center justify-center"><Clock className="animate-spin mr-3" /> 加入中...</span> : "確認加入"}
                            </button>
                        </form>
                    </div>
                    
                    <div className="mt-10 text-center flex flex-col items-center gap-4">
                        {!isDirectLink ? (
                            <Fragment>
                                <p className="text-gray-400">尚未建立遊戲？</p>
                                <button onClick={onNavigateCreate} className="px-8 py-3 bg-white/10 hover:bg-white/20 text-white text-lg rounded-2xl font-bold transition border border-white/20">建立新遊戲 / 題庫</button>
                            </Fragment>
                        ) : (
                            <button type="button" onClick={() => setShowHostLogin(true)} className="text-gray-400 hover:text-white underline text-lg font-bold transition">我是主持人？</button>
                        )}
                    </div>

                    {/* 主持人接管驗證彈窗 */}
                    {showHostLogin && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-[100] p-4 backdrop-blur-sm">
                            <form onSubmit={handleHostTakeover} className="bg-white p-8 rounded-3xl max-w-sm w-full text-center animate-fade-in-up">
                                <h3 className="text-2xl font-black text-gray-800 mb-4">主持人驗證</h3>
                                <p className="text-gray-500 mb-6">請輸入密碼以進入主持人模式</p>
                                <input type="password" autoFocus className="w-full px-5 py-4 text-2xl border-2 border-gray-200 rounded-2xl outline-none text-center font-bold focus:border-blue-500 mb-6" placeholder="輸入密碼" value={hostPassword} onChange={e => setHostPassword(e.target.value)} />
                                <div className="flex gap-3">
                                    <button type="button" onClick={() => { setShowHostLogin(false); setHostPassword(''); }} className="flex-1 py-4 bg-gray-200 text-gray-700 font-bold rounded-xl hover:bg-gray-300 transition">取消</button>
                                    <button type="submit" className="flex-1 py-4 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition">確認</button>
                                </div>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        function Lobby({ user, gameState, gameId, db, appId }) {
            const joinUrl = `${window.location.origin}${window.location.pathname}?gameId=${gameId}`;
            const playersStr = JSON.stringify(gameState.players || {});
            const playersArray = useMemo(() => Object.entries(gameState.players || {}).map(([uid, data]) => ({ uid, ...data })).sort((a,b)=>a.joinedAt - b.joinedAt), [playersStr]);
            
            const isHost = user.uid === gameState.hostId;
            const isPlayer = Boolean(gameState.players?.[user.uid]);
            const [hostNickname, setHostNickname] = useState('');
            const [isStarting, setIsStarting] = useState(false);
            
            // 編輯暱稱或隊名
            const [editingUid, setEditingUid] = useState(null);
            const [editNameValue, setEditNameValue] = useState('');
            const [editingTeamId, setEditingTeamId] = useState(null);

            // 背景圖片預載
            const hasPreloaded = useRef(false);
            const qStr = JSON.stringify(gameState.questions?.map(q=>q.id));
            useEffect(() => {
                if(hasPreloaded.current || !gameState.questions) return;
                hasPreloaded.current = true;
                gameState.questions.forEach(q => {
                    if (q.imageBase64) { const img = new Image(); img.src = q.imageBase64; }
                    (q.options || []).forEach(o => { if (o.imageBase64) { const img = new Image(); img.src = o.imageBase64; } });
                });
            }, [qStr]);

            // 勵志語錄動畫
            const quotes = [
                "每個人的花期不同，不必焦慮有人比你提前擁有", "成功就是在緊要處多一份堅持", "每個人都是天才，但如果靠爬樹的本領評斷一隻魚，那隻魚會一輩子相信自己會一事無成",
                "再長的路，一步步也能走完", "把困難舉在頭上，它就是滅頂石；把困難踩在腳下，它就是墊腳石", "才能一旦讓懶惰支配，它就一無可為",
                "只要站起來比倒下去多一次就是成功", "當命運交給你一棵酸檸檬，你要想辦法把他做成一杯可口的檸檬汁", "世界上兩種最耀眼的光，一種是太陽，另一種是你努力的樣子",
                "海壓竹枝低復舉 風吹山角晦還明", "失敗是命運發的體驗卡，用完即焚", "過錯是暫時的遺憾，而錯過則是永遠的遺憾",
                "寶劍鋒從磨礪出，梅花香自苦寒來", "大雨可以延遲我們到達的時間，但不能阻止前進的步伐", "每天多努力一點，成為自己想要的樣子"
            ];
            const [quoteIndex, setQuoteIndex] = useState(Math.floor(Math.random() * quotes.length));
            const [quoteFade, setQuoteFade] = useState(true);
            useEffect(() => {
                if (isHost) return;
                const interval = setInterval(() => {
                    setQuoteFade(false);
                    setTimeout(() => { setQuoteIndex(prev => (prev + 1) % quotes.length); setQuoteFade(true); }, 500); 
                }, 9000);
                return () => clearInterval(interval);
            }, [isHost]);

            // 主持人操作：更改隊伍數量 / 玩家改名 / 移動隊伍
            const changeTeamCount = async (delta) => {
                const newCount = gameState.teamCount + delta;
                if (newCount < 2 || newCount > 10) return;
                const updates = { teamCount: newCount };
                const teamNames = { ...gameState.teamNames };
                if (delta > 0) { teamNames[`team_${newCount}`] = `隊伍${newCount}`; } 
                else {
                    delete teamNames[`team_${gameState.teamCount}`];
                    // 將多餘隊伍的玩家移回 team_1
                    const players = { ...gameState.players };
                    let changed = false;
                    Object.entries(players).forEach(([uid, p]) => {
                        if (p.team === `team_${gameState.teamCount}`) { players[uid].team = 'team_1'; changed = true; }
                    });
                    if (changed) updates.players = players;
                }
                updates.teamNames = teamNames;
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId), updates);
            };

            const saveNickname = async (uid) => {
                if (editNameValue.trim() && editNameValue.trim() !== gameState.players[uid].nickname) {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId), { [`players.${uid}.nickname`]: editNameValue.trim() });
                }
                setEditingUid(null);
            };

            const saveTeamName = async (teamId) => {
                if (editNameValue.trim() && editNameValue.trim() !== gameState.teamNames?.[teamId]) {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId), { [`teamNames.${teamId}`]: editNameValue.trim() });
                }
                setEditingTeamId(null);
            };

            const handleDrop = async (e, teamId) => {
                e.preventDefault();
                const uid = e.dataTransfer.getData('text/plain');
                if (uid && gameState.players[uid]?.team !== teamId) {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId), { [`players.${uid}.team`]: teamId });
                }
            };

            // --- 新增：移除玩家邏輯 ---
            const removePlayer = async (uid, nickname) => {
                if (window.confirm(`確定要將玩家「${nickname}」移除嗎？`)) {
                    try {
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId), {
                            [`players.${uid}`]: deleteField()
                        });
                    } catch (e) {
                        alert("移除玩家失敗");
                    }
                }
            };

            const startGame = async () => {
                if (playersArray.length === 0) return alert("需要至少一位玩家！");
                if (isStarting) return; setIsStarting(true);
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId), { status: 'starting_countdown', countdownDeadline: Date.now() + 3500 });
            };

            if (!isHost) {
                // 一般玩家的等待畫面 (極簡化省效能)
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-4 text-white relative">
                        <div className="absolute inset-0 bg-gradient-to-br from-blue-900 to-indigo-900 opacity-50"></div>
                        <div className="bg-white/10 backdrop-blur-xl rounded-[3rem] shadow-2xl p-10 md:p-16 text-center border border-white/20 animate-fade-in-up max-w-lg w-full z-10">
                            <Music className="mx-auto mb-6 text-blue-400 animate-pulse w-16 h-16" />
                            <h2 className="text-3xl font-bold mb-8">等待遊戲開始</h2>
                            
                            <div className="h-28 flex items-center justify-center mb-8 px-4">
                               <p className={`text-lg md:text-xl text-blue-200/90 font-medium transition-opacity duration-500 leading-relaxed ${quoteFade ? 'opacity-100' : 'opacity-0'}`}>{quotes[quoteIndex]}</p>
                            </div>
                            
                            <div className="bg-black/30 rounded-2xl p-6 border border-white/10">
                                <p className="text-sm text-gray-400 font-bold mb-3 uppercase tracking-widest">你的身分 (點擊修改)</p>
                                {editingUid === user.uid ? (
                                    <input type="text" autoFocus className="w-full bg-transparent border-b-2 border-white/50 focus:border-white text-center outline-none font-black text-3xl text-white" value={editNameValue} onChange={e => setEditNameValue(e.target.value)} onBlur={() => saveNickname(user.uid)} onKeyDown={e => e.key === 'Enter' && saveNickname(user.uid)} maxLength="12" />
                                ) : (
                                    <div className="flex justify-center items-center gap-3 cursor-pointer group" onClick={() => { setEditNameValue(gameState.players[user.uid]?.nickname); setEditingUid(user.uid); }}>
                                        <p className="text-3xl font-black">{gameState.players[user.uid]?.nickname}</p>
                                        <Edit size={20} className="opacity-50 group-hover:opacity-100" />
                                    </div>
                                )}
                                {gameState.mode === 'team' && <div className="mt-4 inline-block px-5 py-2 bg-blue-500/30 rounded-full text-blue-100 font-bold shadow">{gameState.teamNames?.[gameState.players[user.uid]?.team] || '隊伍'}</div>}
                            </div>
                        </div>
                    </div>
                );
            }

            // 主持人畫面
            return (
                <div className="min-h-screen p-6 md:p-10">
                    <div className="max-w-7xl mx-auto grid md:grid-cols-12 gap-8">
                        {/* 左側：房間代碼區 */}
                        <div className="md:col-span-4 space-y-6">
                            <div className="bg-white p-8 rounded-3xl shadow-xl text-center">
                                <h2 className="text-lg font-bold text-gray-500 mb-2 uppercase">遊戲房間代碼 (PIN)</h2>
                                <div className="text-6xl font-black text-blue-600 mb-6 bg-blue-50 py-6 rounded-2xl border-2 border-blue-200">{gameState.pin}</div>
                                <h3 className="font-bold text-gray-800 mb-4">掃描 QR Code 加入</h3>
                                <div className="bg-gray-100 p-4 rounded-3xl inline-block border-2 border-dashed border-gray-300"><img src={`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(joinUrl)}&margin=10`} alt="QR Code" className="w-48 h-48 rounded-xl object-contain" /></div>
                            </div>
                            
                            {!isPlayer && (
                                <div className="bg-white/10 backdrop-blur-md rounded-3xl p-6 border border-white/20 text-white">
                                    <h3 className="text-xl font-bold text-yellow-400 mb-3">您也要一起玩嗎？</h3>
                                    <div className="flex gap-3">
                                        <input type="text" className="flex-1 px-4 py-3 rounded-xl text-gray-800 font-bold outline-none" placeholder="輸入暱稱..." value={hostNickname} onChange={e => setHostNickname(e.target.value)} />
                                        <button onClick={async () => { if(hostNickname.trim()){ await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'games', gameId), { [`players.${user.uid}`]: { nickname: hostNickname.trim(), score: 0, joinedAt: Date.now(), team: gameState.mode==='team' ? 'team_1' : null } }); } }} className="px-5 bg-blue-600 rounded-xl font-bold hover:bg-blue-700">加入</button>
                                    </div>
                                </div>
                            )}

                            <button onClick={startGame} disabled={isStarting} className="w-full py-6 bg-green-500 hover:bg-green-600 text-white text-2xl font-extrabold rounded-3xl shadow-xl flex items-center justify-center disabled:opacity-50">
                                {isStarting ? <Clock className="animate-spin mr-3" size={28} /> : <Play fill="currentColor" className="mr-3" size={28} />} 開始遊戲
                            </button>
                        </div>

                        {/* 右側：玩家列表 */}
                        <div className="md:col-span-8 bg-white/10 backdrop-blur-md rounded-3xl p-8 border border-white/20 min-h-[60vh] flex flex-col text-white">
                            <div className="flex justify-between items-center mb-8 border-b border-white/10 pb-4">
                                <h2 className="text-3xl font-bold flex items-center"><Users className="mr-4 text-blue-400 w-10 h-10" /> 已加入玩家 ({playersArray.length})</h2>
                                {gameState.mode === 'team' && (
                                    <div className="flex items-center gap-4 bg-black/20 px-4 py-2 rounded-xl">
                                        <span className="font-bold">隊伍數：{gameState.teamCount}</span>
                                        <button onClick={()=>changeTeamCount(-1)} className="w-8 h-8 bg-white/20 hover:bg-red-500 rounded-lg flex items-center justify-center font-black">-</button>
                                        <button onClick={()=>changeTeamCount(1)} className="w-8 h-8 bg-white/20 hover:bg-green-500 rounded-lg flex items-center justify-center font-black">+</button>
                                    </div>
                                )}
                            </div>

                            <div className="flex-1 overflow-y-auto custom-scrollbar pr-2">
                                {gameState.mode === 'team' ? (
                                    <div className="grid grid-cols-2 gap-6">
                                        {Array.from({ length: gameState.teamCount }).map((_, i) => {
                                            const teamId = `team_${i + 1}`;
                                            const teamName = gameState.teamNames?.[teamId] || `隊伍${i + 1}`;
                                            const members = playersArray.filter(p => p.team === teamId);
